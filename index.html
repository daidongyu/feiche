<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>翠翠飞车 3D - Cuicui Speed Racing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    #game-container { width: 100%; height: 100%; }

    .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
    .screen.hidden { opacity: 0; pointer-events: none; }

    #menuScreen { background: linear-gradient(180deg, #0a0a20 0%, #1a1a3e 50%, #0a2a3e 100%); }

    .title-wrap { text-align: center; margin-bottom: 20px; }
    .title { font-size: clamp(36px, 10vw, 72px); font-weight: 900; background: linear-gradient(135deg, #00ffaa, #00ccff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(0,255,170,0.5)); letter-spacing: 6px; }
    .subtitle { font-size: clamp(12px, 3vw, 18px); color: #ffcc00; letter-spacing: 4px; margin-top: 8px; text-shadow: 0 0 10px #ffcc00; }

    .avatar-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .avatar-item { text-align: center; }
    .avatar-item .label { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .avatar-circle { width: clamp(50px, 12vw, 70px); height: clamp(50px, 12vw, 70px); border-radius: 50%; border: 3px solid #00ffaa; box-shadow: 0 0 15px rgba(0,255,170,0.4); overflow: hidden; }
    .avatar-circle:first-child { border-color: #00ff77; box-shadow: 0 0 20px rgba(0,255,120,0.5); }
    .avatar-circle img, .avatar-circle canvas { width: 100%; height: 100%; object-fit: cover; }

    .track-list { display: flex; flex-direction: column; gap: 10px; width: clamp(280px, 80vw, 400px); }
    .track-btn { position: relative; padding: 14px 25px; font-size: clamp(14px, 3.5vw, 17px); border: none; border-radius: 14px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
    .track-btn:nth-child(1) { background: linear-gradient(135deg, #1a4a2a, #2ecc71); color: white; box-shadow: 0 5px 20px rgba(46,204,113,0.4); }
    .track-btn:nth-child(2) { background: linear-gradient(135deg, #2a1a4a, #9b59b6); color: white; box-shadow: 0 5px 20px rgba(155,89,182,0.4); }
    .track-btn:nth-child(3) { background: linear-gradient(135deg, #4a2a1a, #e74c3c); color: white; box-shadow: 0 5px 20px rgba(231,76,60,0.4); }
    .track-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
    .track-btn:active { transform: scale(0.98); }
    .track-btn .desc { display: block; font-size: 11px; opacity: 0.7; margin-top: 3px; font-weight: normal; }

    #resultScreen { background: rgba(0,0,0,0.92); }
    .result-rank { font-size: clamp(100px, 25vw, 150px); font-weight: 900; animation: rankPop 0.5s ease-out; }
    @keyframes rankPop { from{transform:scale(0);} to{transform:scale(1);} }
    .rank-S { color: #ffd700; text-shadow: 0 0 50px #ffd700, 0 0 100px #ff8c00; }
    .rank-A { color: #ff4444; text-shadow: 0 0 40px #ff4444; }
    .rank-B { color: #44aaff; text-shadow: 0 0 40px #44aaff; }
    .rank-C { color: #44ff88; text-shadow: 0 0 30px #44ff88; }
    .rank-D { color: #aaaaaa; text-shadow: 0 0 20px #aaaaaa; }
    .result-time { font-size: clamp(22px, 5vw, 36px); color: white; margin: 10px 0 5px; }
    .result-kills { font-size: 15px; color: #ff8888; margin-bottom: 20px; }
    .restart-btn { padding: 14px 50px; font-size: 18px; background: linear-gradient(135deg, #00ffaa, #00cc88); border: none; border-radius: 30px; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 5px 25px rgba(0,255,170,0.5); }

    /* HUD */
    #hud { position: fixed; top: 5px; left: 0; right: 0; display: none; justify-content: space-between; padding: 5px 10px; z-index: 50; pointer-events: none; }
    .hud-item { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 8px; border: 2px solid #00ffaa; color: white; font-size: clamp(10px, 2vw, 13px); font-weight: bold; white-space: nowrap; }
    .hud-item span { color: #00ffaa; }

    .nitro-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: clamp(150px, 40vw, 250px); height: 18px; background: rgba(0,0,0,0.8); border-radius: 9px; border: 2px solid #e67e22; overflow: hidden; display: none; z-index: 50; }
    .nitro-fill { height: 100%; background: linear-gradient(90deg, #e67e22, #f39c12, #ff4444); transition: width 0.05s; box-shadow: 0 0 10px #e67e22; }

    #startHint { position: fixed; bottom: 50%; left: 50%; transform: translate(-50%,50%); font-size: 18px; color: #ffcc00; text-shadow: 0 0 15px #ffcc00; display: none; z-index: 40; animation: blink 1s ease-in-out infinite; white-space: nowrap; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* 手机控制 */
    #leftControls { position: fixed; bottom: 60px; left: 10px; display: none; gap: 6px; z-index: 60; }
    .dir-btn { width: clamp(50px, 13vw, 65px); height: clamp(50px, 13vw, 65px); border-radius: 50%; background: rgba(52,152,219,0.75); border: 3px solid #3498db; display: flex; align-items: center; justify-content: center; font-size: clamp(16px, 4vw, 22px); color: white; cursor: pointer; touch-action: manipulation; user-select: none; }
    .dir-btn:active, .dir-btn.active { background: rgba(41,128,185,0.9); transform: scale(0.88); }

    #rightControls { position: fixed; bottom: 60px; right: 10px; display: none; flex-direction: column; gap: 8px; z-index: 60; }
    .action-btn { width: clamp(50px, 13vw, 65px); height: clamp(50px, 13vw, 65px); border-radius: 50%; border: 3px solid; display: flex; align-items: center; justify-content: center; font-size: clamp(10px, 2.5vw, 13px); font-weight: bold; color: white; cursor: pointer; touch-action: manipulation; user-select: none; }
    .action-btn:active { transform: scale(0.85); }
    .action-btn.nitro { background: rgba(230,126,34,0.8); border-color: #e67e22; }
    .action-btn.drift { background: rgba(241,196,15,0.8); border-color: #f1c40f; }
    .action-btn.reset { background: rgba(200,60,60,0.8); border-color: #e74c3c; }

    .minimap { position: fixed; bottom: 15px; right: 15px; width: clamp(70px, 17vw, 100px); height: clamp(50px, 13vw, 75px); background: rgba(0,0,0,0.8); border: 2px solid #00ffaa; border-radius: 6px; display: none; z-index: 50; }
    #minimapCanvas { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="menuScreen" class="screen">
    <div class="title-wrap">
      <div class="title">翠翠飞车 3D</div>
      <div class="subtitle">CUI CUI RACING 3D</div>
    </div>
    <div class="avatar-row">
      <div class="avatar-item"><div class="avatar-circle"><img src="./cuicui.jpg" alt="" onerror="this.style.display='none'"></div><div class="label">翠翠</div></div>
      <div class="avatar-item"><div class="avatar-circle"><canvas id="npc2" width="80" height="80"></canvas></div><div class="label">二叔</div></div>
      <div class="avatar-item"><div class="avatar-circle"><canvas id="npc3" width="80" height="80"></canvas></div><div class="label">二婶</div></div>
      <div class="avatar-item"><div class="avatar-circle"><canvas id="npc4" width="80" height="80"></canvas></div><div class="label">嘉姐</div></div>
      <div class="avatar-item"><div class="avatar-circle"><canvas id="npc5" width="80" height="80"></canvas></div><div class="label">万总</div></div>
    </div>
    <div class="track-list">
      <button class="track-btn" onclick="startGame(1)">🌈 彩虹风车岛<span class="desc">岛屿桥梁 风车旋转</span></button>
      <button class="track-btn" onclick="startGame(2)">🏙️ 穿梭之城<span class="desc">城市霓虹 8字赛道</span></button>
      <button class="track-btn" onclick="startGame(3)">🏖️ 极速海滨<span class="desc">海岸公路 灯塔棕榈</span></button>
    </div>
  </div>

  <div id="resultScreen" class="screen hidden">
    <div class="title-wrap"><div class="title" style="font-size:clamp(24px,7vw,42px)">完赛!</div></div>
    <div id="resultRank" class="result-rank rank-S">S</div>
    <div id="resultTime" class="result-time">00:00.00</div>
    <div id="resultKills" class="result-kills">撞毁 0 辆车</div>
    <button class="restart-btn" onclick="showMenu()">再来一局</button>
  </div>

  <div id="hud">
    <div class="hud-item">⏱ <span id="hudTime">00:00</span></div>
    <div class="hud-item">🏁 <span id="hudLap">1/3</span></div>
    <div class="hud-item">⚡ <span id="hudSpeed">0</span> km/h</div>
    <div class="hud-item">💥 <span id="hudKills">0</span></div>
  </div>
  <div class="nitro-bar"><div class="nitro-fill" id="nitroFill"></div></div>
  <div id="startHint">←→转向 空格漂移 Shift喷气</div>

  <div id="leftControls">
    <button class="dir-btn" id="btnLeft">◀</button>
    <button class="dir-btn" id="btnRight">▶</button>
  </div>
  <div id="rightControls">
    <button class="action-btn nitro" id="btnNitro">🔥喷</button>
    <button class="action-btn drift" id="btnDrift">💨漂</button>
    <button class="action-btn reset" id="btnReset">↩</button>
  </div>
  <div class="minimap"><canvas id="minimapCanvas" width="120" height="90"></canvas></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ============== 工具函数 ==============
const rnd = () => Math.random();
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const hypot = (x, y) => Math.sqrt(x * x + y * y);
const dist = (ax, ay, bx, by) => hypot(ax - bx, ay - by);
function cr(p0, p1, p2, p3, t) {
  return 0.5 * (2 * p1 + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t + (-p0 + 3 * p1 - 3 * p2 + p3) * t * t * t);
}
function fmtTime(t) {
  const m = Math.floor(t / 60), s = Math.floor(t % 60), ms = Math.floor((t % 1) * 100);
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
}

// ============== Three.js 核心 ==============
let scene, camera, renderer, clock;
let playerCar, npcCars = [], trackGroup;
let currentTrackId = 1;
let gameState = 'menu';
let keys = { left: false, right: false, drift: false, nitro: false };
let startTime = 0, raceTime = 0;
const avatarImg = new Image();
avatarImg.src = './cuicui.jpg';

function initThree() {
  const container = document.getElementById('game-container');
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0a0a1a, 100, 800);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.set(0, 15, 20);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // 光照
  const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(100, 200, 100);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 10;
  dirLight.shadow.camera.far = 500;
  dirLight.shadow.camera.left = -300;
  dirLight.shadow.camera.right = 300;
  dirLight.shadow.camera.top = 300;
  dirLight.shadow.camera.bottom = -300;
  scene.add(dirLight);

  // 移动端检测
  if (/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768) {
    document.getElementById('leftControls').style.display = 'flex';
    document.getElementById('rightControls').style.display = 'flex';
    document.querySelector('.minimap').style.display = 'block';
    setupMobileControls();
  }

  window.addEventListener('resize', onWindowResize);
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onKeyDown(e) {
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.right = true;
  if (e.key === ' ') { keys.drift = true; e.preventDefault(); }
  if (e.key === 'Shift') keys.nitro = true;
  if (e.key === 'r' || e.key === 'R') { if (gameState === 'playing') resetCar(); }
}
function onKeyUp(e) {
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.right = false;
  if (e.key === ' ') keys.drift = false;
  if (e.key === 'Shift') keys.nitro = false;
}

function setupMobileControls() {
  const btnL = document.getElementById('btnLeft');
  const btnR = document.getElementById('btnRight');
  btnL.addEventListener('touchstart', e => { e.preventDefault(); keys.left = true; btnL.classList.add('active'); }, { passive: false });
  btnL.addEventListener('touchend', e => { e.preventDefault(); keys.left = false; btnL.classList.remove('active'); }, { passive: false });
  btnL.addEventListener('touchcancel', e => { keys.left = false; btnL.classList.remove('active'); });
  btnR.addEventListener('touchstart', e => { e.preventDefault(); keys.right = true; btnR.classList.add('active'); }, { passive: false });
  btnR.addEventListener('touchend', e => { e.preventDefault(); keys.right = false; btnR.classList.remove('active'); }, { passive: false });
  btnR.addEventListener('touchcancel', e => { keys.right = false; btnR.classList.remove('active'); });

  ['btnNitro', 'btnDrift'].forEach((id, i) => {
    const btn = document.getElementById(id);
    const key = ['nitro', 'drift'][i];
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, { passive: false });
    btn.addEventListener('touchcancel', e => { keys[key] = false; });
  });
  document.getElementById('btnReset').addEventListener('touchstart', e => { e.preventDefault(); resetCar(); }, { passive: false });
}

// ============== 赛道定义 ==============
const TRACKS = {
  1: { name: '彩虹风车岛', worldW: 600, worldH: 400, roadW: 18, bgColor: 0x1a4a7a, roadColor: 0x333333, wallColor: 0xff3333,
    ctrl: [[80,320],[100,280],[150,240],[200,200],[280,180],[360,170],[420,180],[480,200],[500,250],[490,300],[450,340],[380,360],[300,365],[220,360],[150,350],[90,330]],
    decorations: [
      {type:'windmill', x:150, y:120, h:25, color:0xff4444},
      {type:'windmill', x:480, y:100, h:30, color:0x44ff44},
      {type:'windmill', x:300, y:80, h:28, color:0x4444ff},
      {type:'rainbow', count:15},
    ]
  },
  2: { name: '穿梭之城', worldW: 600, worldH: 400, roadW: 16, bgColor: 0x0a0a20, roadColor: 0x222233, wallColor: 0x00ffff,
    ctrl: [[80,350],[150,340],[220,320],[280,280],[300,230],[280,180],[240,140],[180,120],[120,130],[80,170],[100,220],[140,260],[100,300],[80,340]],
    decorations: [
      {type:'building', x:50, y:100, w:30, h:60, color:0xff00ff},
      {type:'building', x:520, y:80, w:35, h:70, color:0x00ffff},
      {type:'neon_sign', x:300, y:60, text:'穿梭之城', color:0xffff00},
      {type:'building', x:550, y:200, w:25, h:50, color:0xff6600},
      {type:'building', x:40, y:220, w:28, h:55, color:0x00ff66},
    ]
  },
  3: { name: '极速海滨', worldW: 600, worldH: 400, roadW: 17, bgColor: 0x0a2040, roadColor: 0x2a2a2a, wallColor: 0x00ff88,
    ctrl: [[80,360],[180,340],[280,310],[380,300],[460,320],[500,350],[490,380],[400,385],[300,380],[200,370],[100,375],[60,360]],
    decorations: [
      {type:'palm', x:50, y:100, h:35, color:0x228B22},
      {type:'palm', x:550, y:120, h:38, color:0x2E8B57},
      {type:'palm', x:100, y:280, h:32, color:0x32CD32},
      {type:'lighthouse', x:520, y:300, h:40, color:0xffdd44},
      {type:'palm', x:450, y:150, h:36, color:0x006400},
    ]
  }
};

// ============== 赛道构建 ==============
function buildTrack(trackId) {
  const track = TRACKS[trackId];
  if (trackGroup) scene.remove(trackGroup);
  trackGroup = new THREE.Group();

  // 平滑路径
  const path = [];
  const ctrl = track.ctrl;
  for (let s = 0; s < ctrl.length; s++) {
    const p0 = ctrl[(s - 1 + ctrl.length) % ctrl.length];
    const p1 = ctrl[s];
    const p2 = ctrl[(s + 1) % ctrl.length];
    const p3 = ctrl[(s + 2) % ctrl.length];
    for (let t = 0; t < 1; t += 0.08) {
      path.push({ x: cr(p0[0], p1[0], p2[0], p3[0], t), y: cr(p0[1], p1[1], p2[1], p3[1], t) });
    }
  }
  track.path = path;

  // 地面
  const groundGeo = new THREE.PlaneGeometry(track.worldW + 100, track.worldH + 100);
  const groundMat = new THREE.MeshLambertMaterial({ color: track.bgColor });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(track.worldW / 2, -0.5, track.worldH / 2);
  ground.receiveShadow = true;
  trackGroup.add(ground);

  // 赛道地面
  for (let i = 0; i < path.length; i++) {
    const curr = path[i];
    const next = path[(i + 1) % path.length];
    const dx = next.x - curr.x, dy = next.y - curr.y;
    const len = hypot(dx, dy) || 1;
    const angle = Math.atan2(dy, dx);

    const segGeo = new THREE.PlaneGeometry(len + 1, track.roadW);
    const segMat = new THREE.MeshLambertMaterial({ color: track.roadColor });
    const seg = new THREE.Mesh(segGeo, segMat);
    seg.rotation.x = -Math.PI / 2;
    seg.rotation.z = -angle;
    seg.position.set(curr.x + dx / 2, 0.01, curr.y + dy / 2);
    seg.receiveShadow = true;
    trackGroup.add(seg);

    // 边线
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    const lineGeo = new THREE.PlaneGeometry(len + 1, 0.5);
    const leftLine = new THREE.Mesh(lineGeo, lineMat);
    leftLine.rotation.x = -Math.PI / 2;
    leftLine.rotation.z = -angle;
    leftLine.position.set(curr.x + dx / 2 - Math.cos(angle) * track.roadW / 2, 0.05, curr.y + dy / 2 - Math.sin(angle) * track.roadW / 2);
    trackGroup.add(leftLine);

    const rightLine = new THREE.Mesh(lineGeo, lineMat.clone());
    rightLine.rotation.x = -Math.PI / 2;
    rightLine.rotation.z = -angle;
    rightLine.position.set(curr.x + dx / 2 + Math.cos(angle) * track.roadW / 2, 0.05, curr.y + dy / 2 + Math.sin(angle) * track.roadW / 2);
    trackGroup.add(rightLine);

    // 墙壁
    const wallGeo = new THREE.BoxGeometry(1.5, 3, track.roadW + 4);
    const wallMat = new THREE.MeshLambertMaterial({ color: track.wallColor, emissive: track.wallColor, emissiveIntensity: 0.3 });
    const leftWall = new THREE.Mesh(wallGeo, wallMat);
    leftWall.rotation.y = -angle;
    leftWall.position.set(curr.x + dx / 2 - Math.cos(angle) * track.roadW / 2, 1.5, curr.y + dy / 2 - Math.sin(angle) * track.roadW / 2);
    trackGroup.add(leftWall);

    const rightWall = new THREE.Mesh(wallGeo, wallMat.clone());
    rightWall.rotation.y = -angle;
    rightWall.position.set(curr.x + dx / 2 + Math.cos(angle) * track.roadW / 2, 1.5, curr.y + dy / 2 + Math.sin(angle) * track.roadW / 2);
    trackGroup.add(rightWall);
  }

  // 起点线
  const startGeo = new THREE.PlaneGeometry(track.roadW, 4);
  const startMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
  const startLine = new THREE.Mesh(startGeo, startMat);
  startLine.rotation.x = -Math.PI / 2;
  startLine.position.set(path[0].x, 0.1, path[0].y);
  trackGroup.add(startLine);

  // 装饰物
  for (const d of track.decorations) {
    if (d.type === 'windmill') {
      // 风车塔
      const towerGeo = new THREE.CylinderGeometry(1.5, 2, d.h, 8);
      const towerMat = new THREE.MeshLambertMaterial({ color: 0xf5f5dc });
      const tower = new THREE.Mesh(towerGeo, towerMat);
      tower.position.set(d.x, d.h / 2, d.y);
      tower.castShadow = true;
      trackGroup.add(tower);

      // 风车叶片
      const bladeGroup = new THREE.Group();
      bladeGroup.position.set(d.x, d.h, d.y);
      bladeGroup.userData.blades = true;
      for (let i = 0; i < 4; i++) {
        const bladeGeo = new THREE.BoxGeometry(1, d.h * 0.8, 0.3);
        const bladeMat = new THREE.MeshLambertMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 0.3 });
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.position.y = -d.h * 0.4;
        const bladeHolder = new THREE.Group();
        bladeHolder.add(blade);
        bladeHolder.rotation.z = (i * Math.PI) / 2;
        bladeGroup.add(bladeHolder);
      }
      trackGroup.add(bladeGroup);

    } else if (d.type === 'building') {
      const bGeo = new THREE.BoxGeometry(d.w, d.h, d.w);
      const bMat = new THREE.MeshLambertMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 0.2 });
      const building = new THREE.Mesh(bGeo, bMat);
      building.position.set(d.x, d.h / 2, d.y);
      building.castShadow = true;
      trackGroup.add(building);

      // 窗户
      const windowMat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
      for (let wy = 5; wy < d.h - 5; wy += 8) {
        for (let wx = -d.w / 2 + 4; wx < d.w / 2 - 4; wx += 6) {
          const wGeo = new THREE.PlaneGeometry(3, 4);
          const win = new THREE.Mesh(wGeo, windowMat);
          win.position.set(d.x + wx, wy, d.y + d.w / 2 + 0.1);
          trackGroup.add(win);
        }
      }

    } else if (d.type === 'neon_sign') {
      // 霓虹招牌用3D文字代替
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 256, 64);
      ctx.font = 'bold 40px sans-serif';
      ctx.fillStyle = '#' + d.color.toString(16).padStart(6, '0');
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 15;
      ctx.textAlign = 'center';
      ctx.fillText(d.text, 128, 45);
      try {
        const tex = new THREE.CanvasTexture(canvas);
        const signGeo = new THREE.PlaneGeometry(30, 8);
        const signMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true });
        const sign = new THREE.Mesh(signGeo, signMat);
        sign.position.set(d.x, 20, d.y);
        trackGroup.add(sign);
      } catch(e) {}

    } else if (d.type === 'palm') {
      // 棕榈树
      const trunkGeo = new THREE.CylinderGeometry(0.8, 1.2, d.h, 6);
      const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.set(d.x, d.h / 2, d.y);
      trunk.castShadow = true;
      trackGroup.add(trunk);

      // 树叶
      for (let i = 0; i < 8; i++) {
        const leafGeo = new THREE.ConeGeometry(2, d.h * 0.5, 4);
        const leafMat = new THREE.MeshLambertMaterial({ color: d.color });
        const leaf = new THREE.Mesh(leafGeo, leafMat);
        leaf.position.set(d.x + Math.cos(i) * 2, d.h + 2, d.y + Math.sin(i) * 2);
        leaf.rotation.z = Math.cos(i) * 0.5;
        leaf.rotation.x = Math.sin(i) * 0.5;
        trackGroup.add(leaf);
      }

    } else if (d.type === 'lighthouse') {
      const lhGeo = new THREE.CylinderGeometry(2, 4, d.h, 8);
      const lhMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
      const lh = new THREE.Mesh(lhGeo, lhMat);
      lh.position.set(d.x, d.h / 2, d.y);
      lh.castShadow = true;
      trackGroup.add(lh);

      // 灯
      const lightGeo = new THREE.SphereGeometry(2, 8, 8);
      const lightMat = new THREE.MeshBasicMaterial({ color: d.color });
      const light = new THREE.Mesh(lightGeo, lightMat);
      light.position.set(d.x, d.h, d.y);
      trackGroup.add(light);

      const pointLight = new THREE.PointLight(d.color, 2, 50);
      pointLight.position.set(d.x, d.h, d.y);
      trackGroup.add(pointLight);
    }
  }

  scene.add(trackGroup);
  return track;
}

// ============== 3D 车辆 ==============
function createCar(config, isPlayer = false) {
  const carGroup = new THREE.Group();

  // 车身
  const bodyGeo = new THREE.BoxGeometry(4, 1.5, 7);
  const bodyMat = new THREE.MeshLambertMaterial({ color: config.color });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.5;
  body.castShadow = true;
  carGroup.add(body);

  // 车顶
  const roofGeo = new THREE.BoxGeometry(3, 1.2, 3.5);
  const roof = new THREE.Mesh(roofGeo, bodyMat);
  roof.position.set(0, 2.8, -0.5);
  roof.castShadow = true;
  carGroup.add(roof);

  // 挡风玻璃
  const glassMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.6 });
  const glassGeo = new THREE.BoxGeometry(2.8, 1, 0.2);
  const glass = new THREE.Mesh(glassGeo, glassMat);
  glass.position.set(0, 2.7, 1.2);
  glass.rotation.x = 0.3;
  carGroup.add(glass);

  // 玩家头像
  if (isPlayer) {
    // 使用圆形背景代替头像
    const avatarGeo = new THREE.CircleGeometry(1.2, 16);
    const avatarMat = new THREE.MeshBasicMaterial({ color: 0x00cc77, side: THREE.DoubleSide });
    const avatar = new THREE.Mesh(avatarGeo, avatarMat);
    avatar.position.set(0, 2.7, -0.5);
    avatar.rotation.y = Math.PI;
    carGroup.add(avatar);
  }

  // 车轮
  const wheelGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.6, 12);
  const wheelMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const wheelPositions = [[-2, 0.8, 2], [2, 0.8, 2], [-2, 0.8, -2.5], [2, 0.8, -2.5]];
  for (const pos of wheelPositions) {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(...pos);
    wheel.rotation.z = Math.PI / 2;
    carGroup.add(wheel);
  }

  // 前灯
  const lightGeo = new THREE.BoxGeometry(0.8, 0.4, 0.2);
  const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
  const leftLight = new THREE.Mesh(lightGeo, lightMat);
  leftLight.position.set(-1.2, 1.5, 3.6);
  carGroup.add(leftLight);
  const rightLight = new THREE.Mesh(lightGeo, lightMat);
  rightLight.position.set(1.2, 1.5, 3.6);
  carGroup.add(rightLight);

  // 尾灯
  const tailGeo = new THREE.BoxGeometry(0.6, 0.3, 0.2);
  const tailMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const leftTail = new THREE.Mesh(tailGeo, tailMat);
  leftTail.position.set(-1.5, 1.5, -3.6);
  carGroup.add(leftTail);
  const rightTail = new THREE.Mesh(tailGeo, tailMat);
  rightTail.position.set(1.5, 1.5, -3.6);
  carGroup.add(rightTail);

  // 喷焰（玩家）
  if (isPlayer) {
    const flameGeo = new THREE.ConeGeometry(0.8, 4, 8);
    const flameMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0 });
    const flame = new THREE.Mesh(flameGeo, flameMat);
    flame.position.set(0, 1.2, -5);
    flame.rotation.x = Math.PI / 2;
    flame.userData.isFlame = true;
    carGroup.add(flame);
  }

  // NPC名称
  if (!isPlayer) {
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 128; labelCanvas.height = 32;
    const ctx = labelCanvas.getContext('2d');
    const colorHex = '#' + config.color.toString(16).padStart(6, '0');
    ctx.fillStyle = colorHex;
    ctx.fillRect(0, 0, 128, 32);
    ctx.font = 'bold 20px sans-serif';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.fillText(config.name, 64, 24);
    try {
      const labelTex = new THREE.CanvasTexture(labelCanvas);
      const labelGeo = new THREE.PlaneGeometry(4, 1);
      const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, side: THREE.DoubleSide, transparent: true });
      const label = new THREE.Mesh(labelGeo, labelMat);
      label.position.set(0, 4.5, 0);
      label.userData.isLabel = true;
      carGroup.add(label);
    } catch(e) {}
  }

  return carGroup;
}

// ============== 游戏状态 ==============
const NPC_TYPES = [
  { name:'二叔', color:0xe74c3c, speed:0.35 },
  { name:'二婶', color:0x9b59b6, speed:0.28 },
  { name:'嘉姐', color:0x3498db, speed:0.38 },
  { name:'万总', color:0xf39c12, speed:0.45 }
];

let player = {
  x: 80, z: 320,
  angle: 0,
  speed: 0,
  minSpeed: 0.3,
  maxSpeed: 1.2,
  turnSpeed: 0.04,
  nitro: 100,
  isDrifting: false,
  driftAngle: 0,
  driftTime: 0,
  lap: 1,
  checkpoint: 0,
  kills: 0,
  mesh: null,
  finished: false
};
let npcs = [];
let currentTrack;
let effects = []; // 粒子效果

// ============== 游戏流程 ==============
function startGame(trackId) {
  currentTrackId = trackId;
  currentTrack = buildTrack(trackId);

  const start = currentTrack.path[0];
  const next = currentTrack.path[1];
  player.x = start.x;
  player.z = start.y;
  player.angle = Math.atan2(next.x - start.x, -(next.y - start.y));
  player.speed = player.minSpeed;
  player.nitro = 100;
  player.lap = 1;
  player.checkpoint = 0;
  player.kills = 0;
  player.finished = false;
  player.isDrifting = false;
  player.driftAngle = 0;
  player.driftTime = 0;

  if (player.mesh) scene.remove(player.mesh);
  player.mesh = createCar({ color: 0x00cc77 }, true);
  player.mesh.position.set(player.x, 0, player.z);
  player.mesh.rotation.y = player.angle;
  scene.add(player.mesh);

  // 创建NPC
  npcs = [];
  for (let i = 0; i < 4; i++) {
    const idx = Math.floor((i + 1) * currentTrack.path.length / 5);
    const pt = currentTrack.path[idx];
    const npcMesh = createCar(NPC_TYPES[i]);
    npcMesh.position.set(pt.x + (rnd() - 0.5) * 5, 0, pt.y + (rnd() - 0.5) * 5);
    npcMesh.rotation.y = player.angle;
    scene.add(npcMesh);
    npcs.push({
      x: pt.x, z: pt.y,
      angle: player.angle,
      speed: NPC_TYPES[i].speed,
      health: 100,
      alive: true,
      mesh: npcMesh,
      pathIdx: idx,
      kills: 0
    });
  }

  effects = [];
  startTime = Date.now();
  raceTime = 0;

  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.querySelector('.nitro-bar').style.display = 'block';
  document.getElementById('startHint').style.display = 'block';
  gameState = 'playing';
}

function showMenu() {
  document.getElementById('menuScreen').classList.remove('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'none';
  document.querySelector('.nitro-bar').style.display = 'none';
  document.getElementById('startHint').style.display = 'none';
  gameState = 'menu';
}

function showResult() {
  const rank = player.lap > 3 ? (raceTime < 30 ? 'S' : raceTime < 50 ? 'A' : raceTime < 70 ? 'B' : raceTime < 90 ? 'C' : 'D') : 'D';
  const rankEl = document.getElementById('resultRank');
  rankEl.textContent = rank; rankEl.className = `result-rank rank-${rank}`;
  document.getElementById('resultTime').textContent = fmtTime(raceTime);
  document.getElementById('resultKills').textContent = `撞毁 ${player.kills} 辆车`;
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  document.querySelector('.nitro-bar').style.display = 'none';
  gameState = 'result';
}

function resetCar() {
  if (!currentTrack) return;
  const start = currentTrack.path[0];
  const next = currentTrack.path[1];
  player.x = start.x;
  player.z = start.y;
  player.angle = Math.atan2(next.x - start.x, -(next.y - start.y));
  player.speed = player.minSpeed;
  player.isDrifting = false;
  player.driftAngle = 0;
  player.driftTime = 0;
}

// ============== 碰撞检测 ==============
function checkWallCollision(x, z) {
  const roadW = currentTrack.roadW / 2 - 2;
  let minDist = Infinity;
  let nearestPt = null;
  let nearestIdx = 0;

  for (let i = 0; i < currentTrack.path.length; i++) {
    const p = currentTrack.path[i];
    const d = dist(x, z, p.x, p.y);
    if (d < minDist) { minDist = d; nearestPt = p; nearestIdx = i; }
  }

  if (minDist > roadW) {
    // 推回赛道
    const prev = currentTrack.path[(nearestIdx - 1 + currentTrack.path.length) % currentTrack.path.length];
    const next = currentTrack.path[(nearestIdx + 1) % currentTrack.path.length];
    const dx = next.x - prev.x, dz = next.y - prev.y;
    const len = hypot(dx, dz) || 1;
    const nx = -dz / len, nz = dx / len;
    const perpDist = (x - nearestPt.x) * nx + (z - nearestPt.y) * nz;
    const sign = perpDist > 0 ? 1 : -1;
    const pushX = nearestPt.x + nx * (roadW - 2) * sign;
    const pushZ = nearestPt.y + nz * (roadW - 2) * sign;
    player.speed *= 0.5;
    return { x: pushX, z: pushZ, hit: true };
  }
  return { x, z, hit: false };
}

function checkNPCCollision() {
  for (const npc of npcs) {
    if (!npc.alive) continue;
    const d = dist(player.x, player.z, npc.x, npc.z);
    if (d < 5) {
      const ang = Math.atan2(npc.z - player.z, npc.x - player.x);
      player.x -= Math.cos(ang) * 0.5;
      player.z -= Math.sin(ang) * 0.5;
      npc.x += Math.cos(ang) * 0.3;
      npc.z += Math.sin(ang) * 0.3;
      player.speed *= 0.6;
      npc.speed *= 0.4;
      npc.health -= 35;
      if (npc.health <= 0) {
        npc.alive = false;
        scene.remove(npc.mesh);
        player.kills++;
        // 爆炸效果
        createExplosion(npc.x, npc.z);
      }
    }
  }
}

function createExplosion(x, z) {
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.BoxGeometry(1, 1, 1);
    const mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xff6600 : 0xffff00 });
    const particle = new THREE.Mesh(geo, mat);
    particle.position.set(x + (rnd() - 0.5) * 5, 2, z + (rnd() - 0.5) * 5);
    particle.userData.vx = (rnd() - 0.5) * 0.5;
    particle.userData.vy = rnd() * 0.3;
    particle.userData.vz = (rnd() - 0.5) * 0.5;
    particle.userData.life = 40;
    effects.push(particle);
    scene.add(particle);
  }
}

// ============== 更新 ==============
function updatePlayer() {
  if (player.finished) return;

  // 转向
  if (keys.left) player.angle -= player.turnSpeed * (player.speed > 0 ? 1.2 : 0.5);
  if (keys.right) player.angle += player.turnSpeed * (player.speed > 0 ? 1.2 : 0.5);

  // 漂移
  player.isDrifting = keys.drift && player.speed > 0.15;
  if (player.isDrifting) {
    player.driftTime++;
    player.driftAngle = Math.sin(player.driftTime * 0.15) * 0.3;
    player.speed *= 0.97;
    player.nitro = Math.min(100, player.nitro + 0.3);
  } else {
    player.driftAngle *= 0.85;
    if (player.driftTime > 0) {
      player.nitro = Math.min(100, player.nitro + Math.min(30, player.driftTime * 0.4));
      player.driftTime = 0;
    }
  }

  // 速度
  if (!player.isDrifting) {
    player.speed += (player.minSpeed - player.speed) * 0.03;
  }
  if (keys.nitro && player.nitro > 0) {
    player.speed += 0.08;
    player.speed = Math.min(player.speed, player.maxSpeed + 0.5);
    player.nitro -= 2;
  }

  // 移动
  const moveAngle = player.angle + player.driftAngle;
  const nx = player.x + Math.sin(moveAngle) * player.speed;
  const nz = player.z - Math.cos(moveAngle) * player.speed;

  // 碰撞
  const col = checkWallCollision(nx, nz);
  player.x = col.x;
  player.z = col.z;

  // 检查点
  let minDist = Infinity, nearestIdx = 0;
  for (let i = 0; i < currentTrack.path.length; i++) {
    const d = dist(player.x, player.z, currentTrack.path[i].x, currentTrack.path[i].y);
    if (d < minDist) { minDist = d; nearestIdx = i; }
  }
  const segs = 8;
  const seg = Math.floor(nearestIdx / (currentTrack.path.length / segs));
  if (seg !== player.checkpoint && (seg - player.checkpoint > 0 && seg - player.checkpoint < segs / 2 || seg < 1 && player.checkpoint >= segs - 1)) {
    player.checkpoint = seg;
    if (seg < 1 && player.checkpoint >= segs - 1) {
      player.lap++;
      if (player.lap > 3) { player.finished = true; }
    }
  }

  // 更新mesh
  player.mesh.position.set(player.x, 0, player.z);
  player.mesh.rotation.y = player.angle + player.driftAngle;

  // 喷焰
  const flame = player.mesh.children.find(c => c.userData.isFlame);
  if (flame) {
    flame.material.opacity = keys.nitro && player.nitro > 0 ? 0.8 : 0;
    if (keys.nitro && player.nitro > 0) {
      flame.scale.y = 1 + Math.random() * 0.5;
    }
  }
}

function updateNPCs() {
  for (const npc of npcs) {
    if (!npc.alive) continue;

    // 跟随路径
    const target = currentTrack.path[(npc.pathIdx + 5) % currentTrack.path.length];
    const ta = Math.atan2(target.x - npc.x, -(target.y - npc.z));
    let diff = ta - npc.angle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    npc.angle += Math.sign(diff) * Math.min(Math.abs(diff), 0.05);
    npc.speed = lerp(npc.speed, NPC_TYPES[npcs.indexOf(npc)]?.speed || 0.3, 0.05);

    const nx = npc.x + Math.sin(npc.angle) * npc.speed;
    const nz = npc.z - Math.cos(npc.angle) * npc.speed;

    // 简单边界检测
    let minDist = Infinity;
    for (const p of currentTrack.path) {
      const d = dist(nx, nz, p.x, p.y);
      if (d < minDist) minDist = d;
    }
    if (minDist < currentTrack.roadW / 2) {
      npc.x = nx;
      npc.z = nz;
    }

    npc.mesh.position.set(npc.x, 0, npc.z);
    npc.mesh.rotation.y = npc.angle;

    // 更新路径索引
    let minD = Infinity, nearestIdx = 0;
    for (let i = 0; i < currentTrack.path.length; i++) {
      const d = dist(npc.x, npc.z, currentTrack.path[i].x, currentTrack.path[i].y);
      if (d < minD) { minD = d; nearestIdx = i; }
    }
    npc.pathIdx = nearestIdx;
  }
}

function updateEffects() {
  effects = effects.filter(e => {
    e.position.x += e.userData.vx;
    e.position.y += e.userData.vy;
    e.position.z += e.userData.vz;
    e.userData.vy -= 0.01;
    e.userData.life--;
    e.material.opacity = e.userData.life / 40;
    if (e.userData.life <= 0) { scene.remove(e); return false; }
    return true;
  });
}

function updateCamera() {
  const camDist = 25;
  const camHeight = 12;
  const targetX = player.x - Math.sin(player.angle) * camDist;
  const targetZ = player.z + Math.cos(player.angle) * camDist;
  const targetY = camHeight;

  camera.position.x = lerp(camera.position.x, targetX, 0.05);
  camera.position.y = lerp(camera.position.y, targetY, 0.05);
  camera.position.z = lerp(camera.position.z, targetZ, 0.05);
  camera.lookAt(player.x, 2, player.z);
}

function updateHUD() {
  document.getElementById('hudTime').textContent = fmtTime(raceTime).substring(0, 8);
  document.getElementById('hudLap').textContent = `${Math.min(player.lap, 3)}/3`;
  document.getElementById('hudSpeed').textContent = Math.floor(player.speed * 200);
  document.getElementById('hudKills').textContent = player.kills;
  document.getElementById('nitroFill').style.width = `${player.nitro}%`;
  const hint = document.getElementById('startHint');
  if (keys.left || keys.right || keys.drift) hint.style.display = 'none';

  // 更新风车旋转
  if (trackGroup) {
    trackGroup.children.forEach(child => {
      if (child.userData.blades) {
        child.rotation.y += 0.03;
      }
    });
  }
}

function drawMinimap() {
  if (!currentTrack) return;
  const miniCanvas = document.getElementById('minimapCanvas');
  const ctx = miniCanvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 120, 90);

  // 赛道
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let i = 0; i < currentTrack.path.length; i++) {
    const x = (currentTrack.path[i].x / currentTrack.worldW) * 120;
    const y = (currentTrack.path[i].y / currentTrack.worldH) * 90;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();

  // 玩家
  ctx.fillStyle = '#00ff77';
  ctx.beginPath();
  ctx.arc((player.x / currentTrack.worldW) * 120, (player.z / currentTrack.worldH) * 90, 4, 0, Math.PI * 2);
  ctx.fill();

  // NPC
  ctx.fillStyle = '#ff4444';
  for (const npc of npcs) {
    if (!npc.alive) continue;
    ctx.beginPath();
    ctx.arc((npc.x / currentTrack.worldW) * 120, (npc.z / currentTrack.worldH) * 90, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============== 主循环 ==============
function animate() {
  requestAnimationFrame(animate);

  if (gameState === 'playing') {
    raceTime = (Date.now() - startTime) / 1000;
    updatePlayer();
    updateNPCs();
    checkNPCCollision();
    updateEffects();
    updateCamera();
    updateHUD();
    drawMinimap();

    if (player.finished) showResult();
  }

  renderer.render(scene, camera);
}

// ============== NPC头像 ==============
function drawNPCAvatars() {
  NPC_TYPES.forEach((npc, i) => {
    const cvs = document.getElementById(`npc${i + 2}`);
    if (!cvs) return;
    const c = cvs.getContext('2d');
    const g = c.createRadialGradient(40, 30, 5, 40, 40, 40);
    g.addColorStop(0, '#' + npc.color.toString(16).padStart(6, '0'));
    g.addColorStop(1, '#' + npc.color.toString(16).padStart(6, '0'));
    c.fillStyle = g;
    c.beginPath(); c.arc(40, 40, 38, 0, Math.PI * 2); c.fill();
    c.fillStyle = 'white';
    c.font = 'bold 14px sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(npc.name, 40, 42);
  });
}

// ============== 初始化 ==============
initThree();
drawNPCAvatars();
animate();
</script>
