<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>翠泣2.0</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
      }

      #gameContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* 游戏画布区域 - 移动端占60% */
      #gameCanvas {
        width: 100%;
        height: 60vh;
        background: #0a0a12;
        display: block;
      }

      /* 控制区域 - 移动端占40% */
      #controlArea {
        width: 100%;
        height: 40vh;
        background: linear-gradient(
          180deg,
          rgba(10, 10, 20, 0.95) 0%,
          rgba(5, 5, 10, 1) 100%
        );
        display: none;
        flex-direction: column;
        padding: 10px 15px 20px;
        gap: 10px;
      }

      /* 控制区第一行 */
      .control-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex: 1;
      }

      /* 方向键区域 */
      .dpad-area {
        display: flex;
        gap: 12px;
      }

      /* 技能区域 */
      .skills-area {
        display: flex;
        gap: 10px;
      }
      
      .finisher-area {
        display: flex;
        gap: 8px;
        margin-left: 10px;
      }
      
      .finisher-btn {
        width: 40px;
        height: 40px;
        font-size: 14px;
        border-radius: 50%;
        background: rgba(255, 0, 255, 0.2);
        border: 2px solid rgba(255, 0, 255, 0.5);
        color: #ff88ff;
        position: relative;
      }
      
      .finisher-btn.ready {
        background: rgba(255, 0, 255, 0.5);
        border-color: #ff00ff;
        box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        animation: finisherPulse 1s ease-in-out infinite;
      }
      
      @keyframes finisherPulse {
        0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 255, 0.4); }
        50% { box-shadow: 0 0 25px rgba(255, 0, 255, 0.8); }
      }

      /* 动作键区域 */
      .action-area {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }

      /* 按键基础样式 */
      .game-btn {
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: white;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        -webkit-touch-action: manipulation;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        box-shadow:
          0 4px 15px rgba(0, 0, 0, 0.4),
          inset 0 2px 5px rgba(255, 255, 255, 0.1);
      }

      .game-btn:active {
        transform: scale(0.92);
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.4),
          inset 0 1px 3px rgba(0, 0, 0, 0.3);
      }

      /* 方向键 */
      .dpad-btn {
        width: 65px;
        height: 65px;
        font-size: 26px;
        background: rgba(100, 100, 100, 0.25);
      }

      .dpad-btn:active {
        background: rgba(0, 255, 136, 0.4);
        border-color: #00ff88;
      }

      /* 技能键 */
      .skill-btn {
        width: 55px;
        height: 55px;
        font-size: 22px;
        background: rgba(0, 150, 255, 0.25);
        border-color: rgba(0, 200, 255, 0.5);
      }

      .skill-btn.ready {
        background: rgba(0, 200, 255, 0.45);
        border-color: #00ffff;
        box-shadow:
          0 0 15px rgba(0, 255, 255, 0.4),
          inset 0 2px 5px rgba(255, 255, 255, 0.2);
        animation: skillPulse 1.5s ease-in-out infinite;
      }

      @keyframes skillPulse {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        50% {
          box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }
      }

      .skill-btn .cd-text {
        font-size: 14px;
        color: #ff8888;
      }

      /* 动作键 */
      .action-btn {
        width: 58px;
        height: 58px;
        font-size: 16px;
      }

      .btn-jump {
        background: rgba(0, 100, 255, 0.3);
        border-color: rgba(0, 150, 255, 0.6);
      }

      .btn-dodge {
        background: rgba(0, 255, 200, 0.25);
        border-color: rgba(0, 255, 200, 0.5);
      }

      .btn-attack {
        width: 75px;
        height: 75px;
        font-size: 18px;
        background: rgba(255, 60, 60, 0.35);
        border-color: rgba(255, 80, 80, 0.7);
        box-shadow: 0 4px 20px rgba(255, 60, 60, 0.3);
      }

      .btn-attack:active {
        background: rgba(255, 80, 80, 0.55);
        box-shadow: 0 0 25px rgba(255, 80, 80, 0.6);
      }

      /* 武器切换 */
      .weapon-row {
        display: flex;
        justify-content: center;
        gap: 15px;
        padding: 5px 0;
      }

      .weapon-btn {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        border: 2px solid #444;
        background: rgba(0, 0, 0, 0.5);
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .weapon-btn.active {
        border-color: currentColor;
        box-shadow: 0 0 15px currentColor;
        transform: scale(1.1);
      }

      /* UI层 */
      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 60vh;
        pointer-events: none;
      }

      .health-bar-container {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 40vw;
        max-width: 200px;
      }

      .health-bar {
        height: 14px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #555;
        border-radius: 7px;
        overflow: hidden;
      }

      .health-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff3333, #ff6666);
        transition: width 0.2s;
        box-shadow: 0 0 8px #ff3333;
      }

      .progress-bar {
        margin-top: 4px;
        height: 6px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #444;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff00ff, #ff66ff);
        transition: width 0.1s;
      }

      .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8px;
        color: #fff;
        text-shadow: 0 0 2px #000;
      }

      .combo-display {
        position: absolute;
        top: 5px;
        right: 10px;
        text-align: right;
      }

      .combo-number {
        font-size: clamp(40px, 10vw, 60px);
        font-weight: 900;
        color: #ffdd00;
        text-shadow:
          0 0 10px #ff6600,
          0 0 20px #ff3300;
        line-height: 1;
        animation: comboPulse 0.3s ease-out;
      }

      .combo-text {
        font-size: 12px;
        color: #ff8844;
        letter-spacing: 2px;
      }

      @keyframes comboPulse {
        0% {
          transform: scale(1.5);
        }
        100% {
          transform: scale(1);
        }
      }

      .kill-counter {
        position: absolute;
        top: 50px;
        left: 8px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 12px;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .kill-counter .target {
        color: #00ff88;
        font-weight: bold;
      }

      .boss-bar {
        position: absolute;
        top: 45px;
        left: 50%;
        transform: translateX(-50%);
        width: 70vw;
        max-width: 350px;
        display: none;
      }

      .boss-bar.active {
        display: block;
      }

      .boss-name {
        text-align: center;
        color: #ff4444;
        font-size: 12px;
        font-weight: bold;
        text-shadow: 0 0 5px #ff0000;
        margin-bottom: 2px;
      }

      .boss-health {
        height: 10px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #ff4444;
        border-radius: 5px;
        overflow: hidden;
      }

      .boss-health-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff0000, #ff4444);
        transition: width 0.3s;
        box-shadow: 0 0 10px #ff0000;
      }

      .level-badge {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 255, 136, 0.5);
        border-radius: 15px;
        padding: 3px 12px;
        color: #00ff88;
        font-size: 11px;
        font-weight: bold;
      }

      /* 伤害数字 */
      .damage-number {
        position: absolute;
        font-size: 20px;
        font-weight: bold;
        color: #ffdd00;
        text-shadow: 0 0 5px #ff6600;
        pointer-events: none;
        animation: damageFloat 0.8s ease-out forwards;
      }

      @keyframes damageFloat {
        0% {
          transform: translateY(0) scale(0.8);
          opacity: 0;
        }
        20% {
          transform: translateY(-15px) scale(1.1);
          opacity: 1;
        }
        100% {
          transform: translateY(-40px) scale(1);
          opacity: 0;
        }
      }

      /* 终结技文字 */
      .finisher-text {
        position: fixed;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: clamp(32px, 10vw, 56px);
        font-weight: 900;
        color: #fff;
        text-shadow:
          0 0 20px #ff00ff,
          0 0 40px #ff00ff,
          0 0 80px #ff00ff;
        pointer-events: none;
        animation: finisherText 2.5s ease-out forwards;
        text-align: center;
        white-space: nowrap;
        z-index: 1000;
        width: 100%;
      }

      @keyframes finisherText {
        0% {
          transform: translate(-50%, -50%) scale(0);
          opacity: 0;
        }
        20% {
          transform: translate(-50%, -50%) scale(1.2);
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0;
        }
      }

      /* 开始界面 */
      .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #0a1a2a 0%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .start-avatar {
        width: min(280px, 60vw);
        height: min(280px, 60vw);
        border-radius: 50%;
        border: 4px solid #00ff88;
        overflow: hidden;
        box-shadow: 0 0 60px rgba(0, 255, 136, 0.4);
        margin-bottom: 30px;
        position: relative;
      }

      .start-avatar::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        animation: shine 3s infinite;
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) rotate(45deg);
        }
      }

      .start-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .start-title {
        font-size: clamp(60px, 15vw, 100px);
        font-weight: 900;
        color: #00ff88;
        text-shadow:
          0 0 30px #00ff88,
          0 0 60px #00aa66;
        letter-spacing: 20px;
        margin-bottom: 40px;
        animation: titleGlow 2s ease-in-out infinite;
      }

      @keyframes titleGlow {
        0%,
        100% {
          text-shadow: 0 0 30px #00ff88;
        }
        50% {
          text-shadow:
            0 0 50px #00ff88,
            0 0 80px #00aa66;
        }
      }

      .start-btn {
        padding: 18px 60px;
        font-size: 24px;
        background: linear-gradient(135deg, #00ff88, #00aa66);
        border: none;
        border-radius: 40px;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
        animation: btnPulse 2s ease-in-out infinite;
      }

      @keyframes btnPulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 60px rgba(0, 255, 136, 0.6);
        }
      }

      /* 关卡过渡 */
      .level-transition {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 500;
      }

      .level-transition.active {
        display: flex;
      }

      .level-transition h2 {
        font-size: 36px;
        color: #00ff88;
        margin-bottom: 20px;
      }

      .level-transition p {
        font-size: 18px;
        color: #fff;
      }

      /* 检测移动端 */
      @media (hover: none) and (pointer: coarse) {
        #controlArea {
          display: flex;
        }
      }

      /* PC端按键说明 */
      .pc-controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(0, 255, 136, 0.3);
        border-radius: 12px;
        padding: 12px 20px;
        display: none;
        z-index: 200;
      }
      
      .pc-key-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .pc-key-row {
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .pc-key-row .key {
        display: inline-block;
        min-width: 24px;
        padding: 3px 6px;
        background: rgba(0, 255, 136, 0.2);
        border: 1px solid rgba(0, 255, 136, 0.5);
        border-radius: 4px;
        color: #00ff88;
        font-weight: bold;
        text-align: center;
        font-size: 12px;
      }
      
      /* PC端适配 */
      @media (min-width: 1024px) {
        #gameCanvas {
          height: 100vh;
        }
        #ui {
          height: 100vh;
        }
        .pc-controls {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <canvas id="gameCanvas"></canvas>

      <div id="ui">
        <div class="level-badge" id="levelBadge">关卡 1</div>

        <div class="health-bar-container">
          <div class="health-bar">
            <div class="health-fill" id="healthFill" style="width: 100%"></div>
          </div>
          <div class="progress-bar">
            <div
              class="progress-fill"
              id="progressFill"
              style="width: 0%"
            ></div>
            <div class="progress-text" id="progressText">0/10</div>
          </div>
        </div>

        <div class="kill-counter" id="killCounter">
          击杀: <span id="killCount">0</span> /
          <span class="target" id="targetCount">10</span>
        </div>

        <div class="boss-bar" id="bossBar">
          <div class="boss-name" id="bossName">BOSS</div>
          <div class="boss-health">
            <div
              class="boss-health-fill"
              id="bossHealthFill"
              style="width: 100%"
            ></div>
          </div>
        </div>

        <div class="combo-display" id="comboDisplay" style="opacity: 0">
          <div class="combo-number" id="comboNumber">0</div>
          <div class="combo-text">连击</div>
        </div>
      </div>

      <!-- 移动端控制区域 -->
      <div id="controlArea">
        <!-- 第一行：方向键(左) + 技能(右) -->
        <div class="control-row">
          <div class="dpad-area">
            <button class="game-btn dpad-btn" id="btnLeft">←</button>
            <button class="game-btn dpad-btn" id="btnRight">→</button>
          </div>
          <div class="skills-area">
            <button class="game-btn skill-btn ready" id="btnSkill1">⚡</button>
            <button class="game-btn skill-btn ready" id="btnSkill2">💨</button>
            <button class="game-btn skill-btn ready" id="btnSkill3">💪</button>
          </div>
          <div class="finisher-area">
            <button class="game-btn finisher-btn" id="btnFinisherSmall">U</button>
            <button class="game-btn finisher-btn" id="btnFinisherBig">I</button>
          </div>
        </div>

        <!-- 第二行：武器切换 -->
        <div class="weapon-row">
          <button class="weapon-btn active" id="weapon1" style="color: #00ff88">
            ⚔️
          </button>
          <button class="weapon-btn" id="weapon2" style="color: #ff4444">
            🗡️
          </button>
          <button class="weapon-btn" id="weapon3" style="color: #ffaa00">
            🪝
          </button>
        </div>

        <!-- 第三行：动作键(技能正下方) -->
        <div class="action-area">
          <button class="game-btn action-btn btn-jump" id="btnJump">跳</button>
          <button class="game-btn action-btn btn-dodge" id="btnDodge">
            闪
          </button>
          <button class="game-btn action-btn btn-attack" id="btnAttack">
            攻击
          </button>
        </div>
      </div>

      <!-- 开始界面 -->
      <div class="start-screen" id="startScreen">
        <div class="start-avatar">
          <img
            src="./cuicui.jpg"
            alt="翠翠"
            id="avatarImg"
            crossorigin="anonymous"
          />
        </div>
        <h1 class="start-title">翠泣</h1>
        <button class="start-btn" id="startBtn">点击开始</button>
      </div>

      <!-- 关卡过渡 -->
      <div class="level-transition" id="levelTransition">
        <h2 id="transitionTitle">关卡完成!</h2>
        <p id="transitionDesc">准备进入下一关...</p>
      </div>
      
      <!-- PC端按键说明 -->
      <div class="pc-controls" id="pcControls">
        <div class="pc-key-group">
          <div class="pc-key-row"><span class="key">A</span><span class="key">D</span> 移动</div>
          <div class="pc-key-row"><span class="key">J</span> 攻击 <span class="key">K</span> 跳跃 <span class="key">L</span> 闪避</div>
          <div class="pc-key-row"><span class="key">Q</span><span class="key">W</span><span class="key">E</span> 切武器</div>
          <div class="pc-key-row"><span class="key">1</span><span class="key">2</span><span class="key">3</span> 技能</div>
          <div class="pc-key-row"><span class="key">U</span> 小终结(30连) <span class="key">I</span> 大终结(100连)</div>
        </div>
      </div>
    </div>

    <script>
      // ==================== 音频系统 ====================
      class AudioSystem {
        constructor() {
          this.ctx = null
          this.enabled = false
        }

        init() {
          try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)()
            this.enabled = true
          } catch (e) {}
        }

        playHitSound(combo) {
          if (!this.enabled || !this.ctx) return
          const osc = this.ctx.createOscillator()
          const gain = this.ctx.createGain()
          const freq = 80 + Math.min(combo * 5, 600)
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(
            freq * 0.3,
            this.ctx.currentTime + 0.08,
          )
          gain.gain.setValueAtTime(0.2, this.ctx.currentTime)
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            this.ctx.currentTime + 0.08,
          )
          osc.connect(gain)
          gain.connect(this.ctx.destination)
          osc.start()
          osc.stop(this.ctx.currentTime + 0.08)
        }

        playSkillSound() {
          if (!this.enabled || !this.ctx) return
          const osc = this.ctx.createOscillator()
          const gain = this.ctx.createGain()
          osc.type = 'sawtooth'
          osc.frequency.setValueAtTime(200, this.ctx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(
            600,
            this.ctx.currentTime + 0.3,
          )
          gain.gain.setValueAtTime(0.3, this.ctx.currentTime)
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            this.ctx.currentTime + 0.3,
          )
          osc.connect(gain)
          gain.connect(this.ctx.destination)
          osc.start()
          osc.stop(this.ctx.currentTime + 0.3)
        }

        playFinisherSound(isBig) {
          if (!this.enabled || !this.ctx) return
          const duration = isBig ? 1.2 : 0.7
          const osc = this.ctx.createOscillator()
          const gain = this.ctx.createGain()
          osc.type = 'sawtooth'
          osc.frequency.setValueAtTime(isBig ? 150 : 200, this.ctx.currentTime)
          osc.frequency.exponentialRampToValueAtTime(
            600,
            this.ctx.currentTime + duration * 0.5,
          )
          gain.gain.setValueAtTime(0.4, this.ctx.currentTime)
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            this.ctx.currentTime + duration,
          )
          osc.connect(gain)
          gain.connect(this.ctx.destination)
          osc.start()
          osc.stop(this.ctx.currentTime + duration)
        }
      }

      // ==================== 输入处理 ====================
      class InputHandler {
        constructor() {
          this.keys = {}
          this.keysPressed = {}

          window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true
            if (!this.keysPressed[e.code]) this.keysPressed[e.code] = true
          })

          window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false
            this.keysPressed[e.code] = false
          })
        }

        isDown(code) {
          return !!this.keys[code]
        }
        isPressed(code) {
          if (this.keysPressed[code]) {
            this.keysPressed[code] = false
            return true
          }
          return false
        }
      }

      // ==================== 粒子系统 ====================
      class ParticleSystem {
        constructor() {
          this.particles = []
        }

        emit(x, y, color, count, speed, life) {
          for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.8
            const vel = speed * (0.5 + Math.random() * 0.8)
            this.particles.push({
              x,
              y,
              vx: Math.cos(angle) * vel,
              vy: Math.sin(angle) * vel,
              life: life * (0.7 + Math.random() * 0.6),
              maxLife: life,
              color,
              size: 3 + Math.random() * 5,
            })
          }
        }

        update() {
          for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i]
            p.x += p.vx
            p.y += p.vy
            p.vy += 0.4
            p.vx *= 0.98
            p.life--
            if (p.life <= 0) this.particles.splice(i, 1)
          }
        }

        draw(ctx) {
          for (const p of this.particles) {
            const alpha = p.life / p.maxLife
            ctx.globalAlpha = alpha
            ctx.fillStyle = p.color
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2)
            ctx.fill()
          }
          ctx.globalAlpha = 1
        }
      }

      // ==================== 刀光效果 ====================
      class SlashEffect {
        constructor() {
          this.slashes = []
        }

        add(x, y, angle, width, color, duration) {
          this.slashes.push({
            x,
            y,
            angle,
            width,
            color,
            life: duration,
            maxLife: duration,
          })
        }

        addUltimateSlash(x, y) {
          for (let i = 0; i < 8; i++) {
            this.add(x, y, (Math.PI / 4) * i, 400, '#ff00ff', 25)
          }
        }

        update() {
          for (let i = this.slashes.length - 1; i >= 0; i--) {
            this.slashes[i].life--
            if (this.slashes[i].life <= 0) this.slashes.splice(i, 1)
          }
        }

        draw(ctx) {
          for (const s of this.slashes) {
            const alpha = s.life / s.maxLife
            ctx.save()
            ctx.translate(s.x, s.y)
            ctx.rotate(s.angle)
            ctx.strokeStyle = s.color
            ctx.lineWidth = 6
            ctx.globalAlpha = alpha
            ctx.shadowBlur = 20
            ctx.shadowColor = s.color
            ctx.beginPath()
            ctx.moveTo(-s.width / 2, 0)
            ctx.lineTo(s.width / 2, 0)
            ctx.stroke()
            ctx.restore()
          }
          ctx.globalAlpha = 1
          ctx.shadowBlur = 0
        }
      }

      // ==================== 冲击波效果 ====================
      class ShockWave {
        constructor() {
          this.waves = [];
        }
        
        add(x, y, color, maxRadius) {
          this.waves.push({
            x, y, color, 
            radius: 10, 
            maxRadius: maxRadius || 100,
            alpha: 1,
            width: 8
          });
        }
        
        update() {
          for (let i = this.waves.length - 1; i >= 0; i--) {
            const w = this.waves[i];
            w.radius += 8;
            w.alpha -= 0.08;
            w.width -= 0.3;
            if (w.alpha <= 0 || w.width <= 0) {
              this.waves.splice(i, 1);
            }
          }
        }
        
        draw(ctx) {
          for (const w of this.waves) {
            ctx.save();
            ctx.strokeStyle = w.color.replace(')', `, ${w.alpha})`).replace('rgb', 'rgba');
            ctx.lineWidth = Math.max(1, w.width);
            ctx.shadowBlur = 20;
            ctx.shadowColor = w.color;
            ctx.beginPath();
            ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
          ctx.shadowBlur = 0;
        }
      }
