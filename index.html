<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>翠泣 - 极致连击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050508;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .combo-display {
            position: absolute;
            top: 10px;
            right: 10px;
            text-align: right;
        }
        
        .combo-number {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            color: #ffdd00;
            text-shadow: 0 0 10px #ff6600, 0 0 30px #ff3300, 0 0 60px #ff0000;
            line-height: 1;
            animation: comboPulse 0.3s ease-out;
            font-style: italic;
        }
        
        .combo-text {
            font-size: clamp(12px, 3vw, 20px);
            color: #ff8844;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
        }
        
        @keyframes comboPulse {
            0% { transform: scale(1.8) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        .health-bar-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: min(350px, 40vw);
        }
        
        .health-bar {
            height: clamp(16px, 3vh, 24px);
            background: rgba(0,0,0,0.6);
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666, #ff9999);
            transition: width 0.2s;
            box-shadow: 0 0 15px #ff3333;
        }
        
        .finisher-bar {
            margin-top: 8px;
            height: clamp(10px, 2vh, 16px);
            background: rgba(0,0,0,0.6);
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .finisher-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #ff66ff, #ff99ff);
            transition: width 0.1s;
            box-shadow: 0 0 10px #ff00ff;
        }
        
        .finisher-ready {
            animation: finisherGlow 0.4s ease-in-out infinite alternate;
        }
        
        @keyframes finisherGlow {
            from { box-shadow: 0 0 10px #ff00ff; }
            to { box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff88ff; }
        }
        
        .weapon-indicator {
            position: absolute;
            bottom: 100px;
            left: 10px;
            display: flex;
            gap: 10px;
        }
        
        .weapon-icon {
            width: clamp(50px, 10vw, 70px);
            height: clamp(50px, 10vw, 70px);
            border: 3px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 5vw, 28px);
            background: rgba(0,0,0,0.7);
            color: #666;
            transition: all 0.2s;
        }
        
        .weapon-icon.active {
            border-color: currentColor;
            transform: scale(1.15);
            box-shadow: 0 0 30px currentColor;
        }
        
        .skill-bar {
            position: absolute;
            bottom: 160px;
            left: 10px;
            display: flex;
            gap: 8px;
        }
        
        .skill-icon {
            width: clamp(40px, 8vw, 55px);
            height: clamp(40px, 8vw, 55px);
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 4vw, 22px);
            background: rgba(0,0,0,0.7);
            color: #888;
            position: relative;
        }
        
        .skill-icon.ready {
            border-color: #00ffff;
            box-shadow: 0 0 15px #00ffff;
            color: #00ffff;
        }
        
        .skill-icon .cooldown {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
        }
        
        .level-info {
            position: absolute;
            top: 70px;
            left: 10px;
            color: rgba(255,255,255,0.6);
            font-size: clamp(12px, 3vw, 16px);
        }
        
        .boss-bar {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: min(500px, 60vw);
            display: none;
        }
        
        .boss-bar.active {
            display: block;
        }
        
        .boss-name {
            text-align: center;
            color: #ff4444;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 5px;
        }
        
        .boss-health {
            height: clamp(12px, 2vh, 16px);
            background: rgba(0,0,0,0.6);
            border: 2px solid #ff4444;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .boss-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
            box-shadow: 0 0 20px #ff0000;
        }
        
        /* 移动端控制 */
        #mobileControls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: none;
            pointer-events: auto;
            padding: 10px;
        }
        
        .mobile-section {
            position: absolute;
            bottom: 10px;
            display: flex;
            gap: 10px;
        }
        
        .mobile-left {
            left: 10px;
        }
        
        .mobile-right {
            right: 10px;
            flex-wrap: wrap;
            width: 160px;
            justify-content: flex-end;
        }
        
        .mobile-btn {
            width: clamp(55px, 15vw, 70px);
            height: clamp(55px, 15vw, 70px);
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .mobile-btn:active {
            background: rgba(0,255,136,0.4);
            border-color: #00ff88;
            transform: scale(0.95);
        }
        
        .mobile-btn.attack {
            background: rgba(255,68,68,0.3);
            border-color: #ff4444;
        }
        
        .mobile-btn.skill {
            background: rgba(0,255,255,0.3);
            border-color: #00ffff;
            width: clamp(45px, 12vw, 55px);
            height: clamp(45px, 12vw, 55px);
            font-size: clamp(12px, 3vw, 14px);
        }
        
        .damage-number {
            position: absolute;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;
            color: #ffdd00;
            text-shadow: 0 0 10px #ff6600, 0 0 20px #ff3300;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
            font-style: italic;
        }
        
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        
        .finisher-text {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(36px, 10vw, 72px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff, 0 0 100px #ff00ff;
            pointer-events: none;
            animation: finisherText 2.5s ease-out forwards;
            text-transform: uppercase;
            letter-spacing: 4px;
            white-space: nowrap;
            text-align: center;
        }
        
        @keyframes finisherText {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }
        
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(10,20,30,0.95) 0%, rgba(0,0,0,0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        
        .menu-title {
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88, 0 0 60px #00aa66, 0 0 100px #006633;
            margin-bottom: 20px;
            letter-spacing: 20px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 30px #00ff88, 0 0 60px #00aa66; }
            50% { text-shadow: 0 0 50px #00ff88, 0 0 100px #00aa66, 0 0 150px #006633; }
        }
        
        .menu-subtitle {
            font-size: clamp(16px, 4vw, 28px);
            color: #ff8844;
            margin-bottom: 30px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        
        .avatar-container {
            width: clamp(120px, 25vw, 180px);
            height: clamp(120px, 25vw, 180px);
            border-radius: 50%;
            border: 4px solid #00ff88;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(0,255,136,0.4);
            position: relative;
        }
        
        .avatar-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: avatarShine 3s infinite;
        }
        
        @keyframes avatarShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .level-select {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .level-btn {
            padding: 15px 30px;
            font-size: clamp(16px, 4vw, 20px);
            background: rgba(0,255,136,0.2);
            border: 2px solid #00ff88;
            border-radius: 10px;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level-btn:hover, .level-btn.selected {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
        }
        
        .menu-btn {
            padding: clamp(15px, 4vw, 25px) clamp(40px, 10vw, 80px);
            font-size: clamp(20px, 5vw, 32px);
            background: linear-gradient(135deg, #00ff88, #00aa66);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(0,255,136,0.4);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(0,255,136,0.6);
        }
        
        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: clamp(10px, 2.5vw, 14px);
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            max-width: 90vw;
        }
        
        .pause-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            color: white;
            font-size: 20px;
            display: none;
            pointer-events: auto;
        }
        
        .pause-btn.visible {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 检测移动端 */
        @media (hover: none) and (pointer: coarse) {
            #mobileControls {
                display: block;
            }
            .controls-hint {
                display: none !important;
            }
            .pause-btn.visible {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="health-bar-container">
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                </div>
                <div class="finisher-bar">
                    <div class="finisher-fill" id="finisherFill" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="level-info" id="levelInfo">关卡 1 - 训练场</div>

                <div class="boss-name" id="bossName">BOSS</div>
                <div class="boss-health">
                    <div class="boss-health-fill" id="bossHealthFill" style="width: 100%"></div>
                </div>
            </div>
            
            <div class="combo-display" id="comboDisplay" style="opacity: 0">
                <div class="combo-number" id="comboNumber">0</div>
                <div class="combo-text">HIT COMBO</div>
            </div>
            
            <div class="weapon-indicator">
                <div class="weapon-icon active" id="weapon1" style="color: #00ff88">⚔️</div>

            </div>
            
            <div class="skill-bar">
                <div class="skill-icon ready" id="skill1" title="旋风斩">⚡</div>
                <div class="skill-icon ready" id="skill2" title="冲刺斩">💨</div>
                <div class="skill-icon ready" id="skill3" title="投技">💪</div>

                [A/D]移动 [J]攻击 [K]跳跃 [L]闪避 [Q/W/E]切武器 [U/I]终结技 [1/2/3]技能

            <div class="mobile-section mobile-right">
                <button class="mobile-btn skill" id="btnSkill1">1</button>
                <button class="mobile-btn skill" id="btnSkill2">2</button>
                <button class="mobile-btn skill" id="btnSkill3">3</button>
                <button class="mobile-btn" id="btnJump">跳</button>

        <div class="menu-screen" id="menuScreen">
            <h1 class="menu-title">翠泣</h1>

                <img src="cuicui.jpg" alt="翠翠" id="avatarImg" crossorigin="anonymous">
            </div>
            <p class="menu-subtitle">Devil May Cry Style</p>
            <div class="level-select">
                <button class="level-btn selected" data-level="0">训练场</button>
                <button class="level-btn" data-level="1">废墟都市</button>
                <button class="level-btn" data-level="2">深渊</button>
            </div>
            <button class="menu-btn" id="startBtn">开始游戏</button>
        </div>
    </div>

<script>
// ==================== 音频系统 ====================
class AudioSystem {
    constructor() {
        this.ctx = null;
        this.enabled = false;
    }
    
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.enabled = true;
        } catch(e) {
            console.warn('音频初始化失败');
        }
    }
    
    playHitSound(combo) {
        if (!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const baseFreq = 80 + Math.min(combo * 5, 600);
        osc.frequency.setValueAtTime(baseFreq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.3, this.ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.08);
    }
    
    playSkillSound() {
        if (!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
    }
    
    playFinisherSound(isBig) {
        if (!this.enabled || !this.ctx) return;
        const duration = isBig ? 1.5 : 0.8;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        const startFreq = isBig ? 150 : 200;
        osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(startFreq * 4, this.ctx.currentTime + duration * 0.3);
        osc.frequency.exponentialRampToValueAtTime(startFreq * 0.5, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
}

// ==================== 输入处理 ====================
class InputHandler {
    constructor() {
        this.keys = {};
        this.keysPressed = {};
        this.keysReleased = {};
        
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            if (!this.keysPressed[e.code]) {
                this.keysPressed[e.code] = true;
            }
        });
        
        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
            this.keysPressed[e.code] = false;
            this.keysReleased[e.code] = true;
        });
    }
    
    isDown(code) { return !!this.keys[code]; }
    isPressed(code) {
        if (this.keysPressed[code]) {
            this.keysPressed[code] = false;
            return true;
        }
        return false;
    }
}

// ==================== 粒子系统 ====================
class ParticleSystem {
    constructor() {
        this.particles = [];
    }
    
    emit(x, y, color, count, speed, life, type = 'normal') {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.8;
            const vel = speed * (0.5 + Math.random() * 0.8);
            this.particles.push({
                x, y, vx: Math.cos(angle) * vel, vy: Math.sin(angle) * vel,
                life: life * (0.7 + Math.random() * 0.6),
                maxLife: life, color, size: 3 + Math.random() * 5,
                type, rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.3
            });
        }
    }
    
    update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.4;
            p.vx *= 0.98;
            p.rotation += p.rotationSpeed;
            p.life--;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }
    
    draw(ctx) {
        for (const p of this.particles) {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            if (p.type === 'spark') {
                ctx.fillRect(-p.size, -p.size/3, p.size*2, p.size/1.5);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        ctx.globalAlpha = 1;
    }
}

// ==================== 刀光效果 ====================
class SlashEffect {
    constructor() {
        this.slashes = [];
    }
    
    add(x, y, angle, width, color, duration, type = 'normal') {
        const points = [];
        const segments = type === 'ult' ? 20 : 12;
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const wave = Math.sin(t * Math.PI * (type === 'ult' ? 5 : 3)) * width * 0.15;
            points.push({ x: (t - 0.5) * width, y: wave });
        }
        this.slashes.push({ x, y, angle, width, color, type, life: duration, maxLife: duration, points, scale: 1 });
    }
    
    addUltimateSlash(x, y) {
        for (let i = 0; i < 8; i++) {
            const angle = (Math.PI / 4) * i;
            this.add(x, y, angle, 500, '#ff00ff', 30, 'ult');
        }
    }
    
    update() {
        for (let i = this.slashes.length - 1; i >= 0; i--) {
            const s = this.slashes[i];
            s.life--;
            s.scale = 1 + (1 - s.life / s.maxLife) * 0.5;
            if (s.life <= 0) this.slashes.splice(i, 1);
        }
    }
    
    draw(ctx) {
        for (const s of this.slashes) {
            const alpha = s.life / s.maxLife;
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            ctx.scale(s.scale, s.scale);
            
            const gradient = ctx.createLinearGradient(-s.width/2, 0, s.width/2, 0);
            gradient.addColorStop(0, `rgba(255,255,255,${alpha * 0.1})`);
            gradient.addColorStop(0.5, s.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba'));
            gradient.addColorStop(1, `rgba(255,255,255,${alpha * 0.1})`);
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = s.type === 'ult' ? 10 : 5;
            ctx.lineCap = 'round';
            ctx.shadowBlur = s.type === 'ult' ? 50 : 25;
            ctx.shadowColor = s.color;
            
            ctx.beginPath();
            for (let i = 0; i < s.points.length; i++) {
                const p = s.points[i];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
            
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
            ctx.lineWidth = s.type === 'ult' ? 4 : 2;
            ctx.shadowBlur = 15;
            ctx.stroke();
            
            ctx.restore();
        }
        ctx.shadowBlur = 0;
    }
}

// ==================== 武器配置 ====================
const WEAPONS = {
    DUAL_BLADE: { name: '双刀', damage: 22, attackSpeed: 0.08, range: 110, color: '#00ff88', knockback: 5, airCombo: true },
    DUAL_DAGGER: { name: '双匕', damage: 35, attackSpeed: 0.12, range: 75, color: '#ff4444', knockback: 2, backstabBonus: 3.5, airCombo: false },
    DUAL_HOOK: { name: '双钩', damage: 28, attackSpeed: 0.15, range: 160, color: '#ffaa00', knockback: 12, pullEnemy: true, airCombo: true }
};

// ==================== 关卡配置 ====================
const LEVELS = [
    { name: '训练场', enemyCount: 3, eliteChance: 0, boss: null, bg: 'city' },
    { name: '废墟都市', enemyCount: 5, eliteChance: 0.3, boss: 'destroyer', bg: 'ruins' },
    { name: '深渊', enemyCount: 7, eliteChance: 0.5, boss: 'abyss_king', bg: 'abyss' }
];

// ==================== 玩家类 ====================
class Player {
    constructor(x, y, avatarImg) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 40;
        this.height = 70;
        this.facing = 1;
        this.avatarImg = avatarImg;
        
        this.state = 'idle';
        this.stateTimer = 0;
        this.onGround = false;
        
        this.currentWeapon = 'DUAL_BLADE';
        this.attackCombo = 0;
        this.maxCombo = 8;
        this.canCancel = false;
        
        this.combo = 0;
        this.comboTimer = 0;
        this.comboDecayTime = 200;
        
        this.maxHealth = 100;
        this.health = 100;
        this.moveSpeed = 7;
        this.jumpPower = -17;
        this.dodgeSpeed = 20;
        
        this.dodgeCooldown = 0;
        this.isInvincible = false;
        this.invincibleTimer = 0;
        
        this.animFrame = 0;
        this.airJumps = 0;
        this.maxAirJumps = 2;
        
        // 技能冷却
        this.skills = {
            spin: { cd: 0, maxCd: 180, name: '旋风斩' },
            dash: { cd: 0, maxCd: 120, name: '冲刺斩' },
            grab: { cd: 0, maxCd: 240, name: '投技' }
        };
    }
    
    update(input, game) {
        this.stateTimer++;
        this.animFrame++;
        if (this.dodgeCooldown > 0) this.dodgeCooldown--;
        if (this.invincibleTimer > 0) {
            this.invincibleTimer--;
            if (this.invincibleTimer <= 0) this.isInvincible = false;
        }
        
        // 技能冷却
        for (let key in this.skills) {
            if (this.skills[key].cd > 0) this.skills[key].cd--;
        }
        
        if (this.combo > 0) {
            this.comboTimer++;
            if (this.comboTimer > this.comboDecayTime) {
                this.combo = Math.max(0, this.combo - 1);
                this.comboTimer = 0;
            }
        }
        
        this.vy += 0.65;
        
        switch(this.state) {
            case 'idle':
            case 'run':
                this.handleGroundMovement(input, game);
                break;
            case 'attack':
                this.handleAttack(input, game);
                break;
            case 'skill_spin':
                this.handleSpinSkill(game);
                break;
            case 'skill_dash':
                this.handleDashSkill(game);
                break;
            case 'skill_grab':
                this.handleGrabSkill(game);
                break;
            case 'jump':
            case 'air_attack':
                this.handleAirState(input, game);
                break;
            case 'dodge':
                this.handleDodge();
                break;
        }
        
        this.x += this.vx;
        this.y += this.vy;
        
        const groundY = game.groundY;
        if (this.y + this.height > groundY) {
            this.y = groundY - this.height;
            this.vy = 0;
            this.onGround = true;
            this.airJumps = 0;
            if (['jump', 'air_attack'].includes(this.state)) {
                this.state = 'idle';
            }
        } else {
            this.onGround = false;
        }
        
        this.x = Math.max(40, Math.min(game.width - 40, this.x));
        
        if (!['dodge', 'attack', 'skill_dash'].includes(this.state)) {
            this.vx *= 0.88;
        }
    }
    
    handleGroundMovement(input, game) {
        if (input.isDown('KeyA') || input.isDown('ArrowLeft')) {
            this.vx = -this.moveSpeed;
            this.facing = -1;
            this.state = 'run';
        } else if (input.isDown('KeyD') || input.isDown('ArrowRight')) {
            this.vx = this.moveSpeed;
            this.facing = 1;
            this.state = 'run';
        } else {
            this.state = 'idle';
        }
        
        if (input.isPressed('KeyK')) this.jump();
        if (input.isPressed('KeyJ')) this.startAttack(game);
        if ((input.isPressed('KeyL') || input.isPressed('ShiftLeft')) && this.dodgeCooldown <= 0) {
            this.startDodge();
        }
        
        // 技能
        if (input.isPressed('Digit1') && this.skills.spin.cd <= 0) this.startSpinSkill(game);
        if (input.isPressed('Digit2') && this.skills.dash.cd <= 0) this.startDashSkill(game);
        if (input.isPressed('Digit3') && this.skills.grab.cd <= 0) this.startGrabSkill(game);
        
        // 武器切换
        if (input.isPressed('KeyQ')) this.switchWeapon('DUAL_BLADE', game);
        if (input.isPressed('KeyW')) this.switchWeapon('DUAL_DAGGER', game);
        if (input.isPressed('KeyE')) this.switchWeapon('DUAL_HOOK', game);
        
        // 终结技
        if (input.isPressed('KeyU')) this.tryFinisher(false, game);
        if (input.isPressed('KeyI')) this.tryFinisher(true, game);
    }
    
    handleAttack(input, game) {
        this.vx *= 0.92;
        this.canCancel = this.stateTimer > 3;
        
        if (this.stateTimer === 2) {
            this.performAttackHit(game);
        }
        
        if (this.stateTimer > 5 && this.stateTimer < 16) {
            if (input.isPressed('KeyJ') && this.attackCombo < this.maxCombo) {
                this.attackCombo++;
                this.stateTimer = 0;
                this.canCancel = false;
            }
        }
        
        if ((input.isPressed('KeyL') || input.isPressed('ShiftLeft')) && this.canCancel && this.dodgeCooldown <= 0) {
            this.startDodge();
            return;
        }
        if (input.isPressed('KeyK') && this.canCancel) {
            this.jump();
            return;
        }
        
        if (this.stateTimer > 18) {
            this.state = 'idle';
            this.attackCombo = 0;
        }
    }
    
    // 旋风斩技能
    startSpinSkill(game) {
        this.state = 'skill_spin';
        this.stateTimer = 0;
        this.skills.spin.cd = this.skills.spin.maxCd;
        game.audio.playSkillSound();
        game.updateSkillUI();
    }
    
    handleSpinSkill(game) {
        // 旋转移动
        this.vx = this.facing * 4;
        
        // 持续伤害
        if (this.stateTimer % 5 === 0) {
            const weapon = WEAPONS[this.currentWeapon];
            for (const enemy of game.enemies) {
                const dist = Math.abs(enemy.x - this.x);
                if (dist < 100) {
                    const damage = weapon.damage * 0.8;
                    enemy.takeDamage(damage, this.facing * 3);
                    game.particles.emit(enemy.x, enemy.y - 30, weapon.color, 5, 4, 12, 'spark');
                    this.addCombo(1);
                }
            }
            game.slash.add(this.x, this.y - 30, this.stateTimer * 0.5, 150, '#00ffff', 8);
        }
        
        if (this.stateTimer > 40) {
            this.state = 'idle';
        }
    }
    
    // 冲刺斩技能
    startDashSkill(game) {
        this.state = 'skill_dash';
        this.stateTimer = 0;
        this.skills.dash.cd = this.skills.dash.maxCd;
        this.isInvincible = true;
        this.invincibleTimer = 20;
        game.audio.playSkillSound();
        game.updateSkillUI();
    }
    
    handleDashSkill(game) {
        this.vx = this.facing * 25;
        
        // 穿透伤害
        if (this.stateTimer === 5 || this.stateTimer === 10) {
            const weapon = WEAPONS[this.currentWeapon];
            for (const enemy of game.enemies) {
                const dist = Math.abs(enemy.x - this.x);
                if (dist < 80) {
                    const damage = weapon.damage * 2;
                    enemy.takeDamage(damage, this.facing * 15);
                    enemy.hitStun = 30;
                    game.slash.add(enemy.x, enemy.y - 30, this.facing > 0 ? 0 : Math.PI, 120, '#ff00ff', 12);
                    game.spawnDamageNumber(enemy.x, enemy.y - 60, Math.floor(damage), true);
                    this.addCombo(2);
                }
            }
            game.particles.emit(this.x, this.y - 30, '#ff00ff', 10, 6, 15);
        }
        
        if (this.stateTimer > 15) {
            this.state = 'idle';
            this.vx *= 0.3;
        }
    }
    
    // 投技技能
    startGrabSkill(game) {
        this.state = 'skill_grab';
        this.stateTimer = 0;
        this.skills.grab.cd = this.skills.grab.maxCd;
        game.audio.playSkillSound();
        game.updateSkillUI();
    }
    
    handleGrabSkill(game) {
        if (this.stateTimer === 8) {
            // 抓取判定
            for (const enemy of game.enemies) {
                const dist = Math.abs(enemy.x - this.x);
                if (dist < 70 && !enemy.isBoss) {
                    const damage = 150;
                    enemy.takeDamage(damage, 0);
                    enemy.vy = -20;
                    enemy.vx = this.facing * 10;
                    game.screenShake = 20;
                    game.particles.emit(enemy.x, enemy.y, '#ff6600', 25, 10, 40);
                    game.spawnDamageNumber(enemy.x, enemy.y - 60, damage, true);
                    this.addCombo(5);
                    break; // 只抓取一个
                }
            }
        }
        
        if (this.stateTimer > 25) {
            this.state = 'idle';
        }
    }
    
    handleAirState(input, game) {
        if (input.isDown('KeyA') || input.isDown('ArrowLeft')) {
            this.vx = -this.moveSpeed * 0.85;
            this.facing = -1;
        } else if (input.isDown('KeyD') || input.isDown('ArrowRight')) {
            this.vx = this.moveSpeed * 0.85;
            this.facing = 1;
        }
        
        if (input.isPressed('KeyJ')) this.startAirAttack(game);
        if ((input.isPressed('KeyL') || input.isPressed('ShiftLeft')) && this.dodgeCooldown <= 0) {
            this.startDodge();
        }
    }
    
    handleDodge() {
        this.isInvincible = true;
        this.invincibleTimer = 10;
        this.vx = this.facing * this.dodgeSpeed;
        
        if (this.stateTimer > 8) {
            this.state = this.onGround ? 'idle' : 'jump';
            this.vx *= 0.25;
        }
    }
    
    jump() {
        if (this.onGround) {
            this.vy = this.jumpPower;
            this.state = 'jump';
            this.onGround = false;
        } else if (this.airJumps < this.maxAirJumps) {
            this.vy = this.jumpPower * 0.85;
            this.airJumps++;
            game.particles.emit(this.x, this.y + this.height, '#00ff88', 8, 4, 15);
        }
    }
    
    startAttack(game) {
        this.state = 'attack';
        this.stateTimer = 0;
    }
    
    startAirAttack(game) {
        const weapon = WEAPONS[this.currentWeapon];
        if (!weapon.airCombo) return;
        this.state = 'air_attack';
        this.stateTimer = 0;
        this.performAttackHit(game);
        this.vy = Math.max(this.vy, -3);
        this.vy *= 0.6;
    }
    
    performAttackHit(game) {
        const weapon = WEAPONS[this.currentWeapon];
        const hitX = this.x + this.facing * weapon.range * 0.6;
        const hitY = this.y + this.height * 0.4;
        
        let hitCount = 0;
        
        for (const enemy of game.enemies) {
            const distX = Math.abs(enemy.x - hitX);
            const distY = Math.abs(enemy.y - hitY);
            
            if (distX < weapon.range && distY < 70) {
                let damage = weapon.damage;
                let isBackstab = false;
                
                if (this.currentWeapon === 'DUAL_DAGGER') {
                    const enemyFacingRight = enemy.vx > 0 || enemy.facing > 0;
                    const attackFromBehind = (this.facing === 1 && !enemyFacingRight) || 
                                            (this.facing === -1 && enemyFacingRight);
                    if (attackFromBehind) {
                        damage *= weapon.backstabBonus;
                        isBackstab = true;
                    }
                }
                
                damage *= (1 + this.attackCombo * 0.15);
                const killed = enemy.takeDamage(damage, this.facing * weapon.knockback);
                
                if (killed) {
                    this.addCombo(5);
                } else {
                    this.addCombo(1);
                    hitCount++;
                    
                    if (this.currentWeapon === 'DUAL_BLADE' || enemy.launched) {
                        enemy.vy = -6;
                        enemy.launched = true;
                    }
                    
                    if (weapon.pullEnemy) {
                        enemy.x -= this.facing * 50;
                        enemy.hitStun = 25;
                    }
                }
                
                const slashColor = isBackstab ? '#ff0066' : weapon.color;
                const slashWidth = isBackstab ? 140 : 110;
                game.slash.add(enemy.x, enemy.y - 25, this.facing > 0 ? 0 : Math.PI, slashWidth, slashColor, 10);
                game.particles.emit(enemy.x, enemy.y - 30, slashColor, isBackstab ? 12 : 8, 6, 20, 'spark');
                game.spawnDamageNumber(enemy.x, enemy.y - 60, Math.floor(damage), isBackstab);
            }
        }
        
        if (hitCount > 0) game.audio.playHitSound(this.combo);
    }
    
    startDodge() {
        this.state = 'dodge';
        this.stateTimer = 0;
        this.dodgeCooldown = 20;
        this.canCancel = false;
        game.audio.playHitSound(10);
        game.particles.emit(this.x, this.y + 30, '#00ffff', 6, 5, 12);
    }
    
    switchWeapon(type, game) {
        if (this.currentWeapon === type) return;
        this.currentWeapon = type;
        game.updateWeaponUI();
        game.particles.emit(this.x, this.y - 20, WEAPONS[type].color, 10, 4, 15);
    }
    
    tryFinisher(isBig, game) {
        const required = isBig ? 100 : 30;
        if (this.combo >= required) {
            this.executeFinisher(isBig, game);
        }
    }
    
    executeFinisher(isBig, game) {
        if (isBig) {
            game.screenShake = 50;
            game.showFinisherText("∞ ULTIMATE FINISHER ∞");
            game.slash.addUltimateSlash(this.x, this.y - 30);
            game.particles.emit(this.x, this.y - 40, '#ff00ff', 80, 15, 100);
            
            for (const enemy of game.enemies) {
                const damage = 1000;
                enemy.takeDamage(damage, 0);
                enemy.vy = -30;
                enemy.vx = (enemy.x - this.x) * 0.15;
                game.spawnDamageNumber(enemy.x, enemy.y - 60, damage, true);
            }
        } else {
            game.screenShake = 25;
            game.showFinisherText("⚔ COMBO FINISHER ⚔");
            const weapon = WEAPONS[this.currentWeapon];
            game.slash.add(this.x, this.y - 30, this.facing > 0 ? 0.3 : Math.PI - 0.3, 300, weapon.color, 25, 'ult');
            game.particles.emit(this.x, this.y - 40, weapon.color, 50, 12, 60);
            
            for (const enemy of game.enemies) {
                const dist = Math.abs(enemy.x - this.x);
                if (dist < 300) {
                    const damage = 200;
                    enemy.takeDamage(damage, this.facing * 20);
                    game.spawnDamageNumber(enemy.x, enemy.y - 60, damage, true);
                }
            }
        }
        
        game.audio.playFinisherSound(isBig);
        this.combo = 0;
    }
    
    addCombo(amount) {
        this.combo += amount;
        this.comboTimer = 0;
    }
    
    takeDamage(damage) {
        if (this.isInvincible) return;
        this.health -= damage;
        this.isInvincible = true;
        this.invincibleTimer = 50;
        if (this.health <= 0) this.health = 0;
    }
    
    draw(ctx) {
        ctx.save();
        
        if (this.isInvincible && Math.floor(this.animFrame / 3) % 2 === 0) {
            ctx.globalAlpha = 0.4;
        }
        
        ctx.translate(this.x, this.y + this.height);
        
        // 技能特效
        if (this.state === 'skill_spin') {
            ctx.save();
            ctx.rotate(this.stateTimer * 0.8);
            ctx.globalAlpha = 0.6;
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, -30, 80, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
        
        if (this.state === 'skill_dash') {
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(-this.facing * 100, -60, this.facing * 100, 60);
            ctx.globalAlpha = this.isInvincible ? 0.4 : 1;
        }
        
        // 闪避拖尾
        if (this.state === 'dodge') {
            ctx.globalAlpha = 0.3;
            ctx.translate(-this.vx * 2, 0);
            this.drawBody(ctx, true);
            ctx.translate(this.vx * 2, 0);
            ctx.globalAlpha = this.isInvincible ? 0.4 : 1;
        }
        
        this.drawBody(ctx, false);
        ctx.restore();
    }
    
    drawBody(ctx, isGhost) {
        const weapon = WEAPONS[this.currentWeapon];
        const isAttacking = ['attack', 'air_attack'].includes(this.state);
        const animProgress = isAttacking ? this.stateTimer / 18 : 0;
        
        const bobOffset = this.state === 'run' ? Math.sin(this.animFrame * 0.3) * 3 : 
                         this.state === 'idle' ? Math.sin(this.animFrame * 0.1) * 1 : 0;
        
        // 腿部
        if (this.state === 'run' || this.state === 'skill_spin') {
            const legSwing = Math.sin(this.animFrame * 0.5) * (this.state === 'skill_spin' ? 2 : 1);
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(-10, -15);
            ctx.lineTo(-14 + legSwing * 10, 0);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(10, -15);
            ctx.lineTo(14 - legSwing * 10, 0);
            ctx.stroke();
        } else {
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-10, -15);
            ctx.lineTo(-12, 0);
            ctx.moveTo(10, -15);
            ctx.lineTo(12, 0);
            ctx.stroke();
        }
        
        // 身体
        const bodyY = -38 + bobOffset;
        const grad = ctx.createLinearGradient(-16, bodyY, 16, bodyY + 35);
        grad.addColorStop(0, '#3d3d3d');
        grad.addColorStop(0.5, '#2d2d2d');
        grad.addColorStop(1, '#1a1a1a');
        ctx.fillStyle = grad;
        ctx.fillRect(-16, bodyY, 32, 35);
        
        // 装甲发光
        ctx.strokeStyle = weapon.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5;
        ctx.strokeRect(-12, bodyY + 4, 24, 25);
        ctx.globalAlpha = isGhost ? 0.4 : 1;
        
        // ===== 头像 =====
        const headY = -62 + bobOffset;
        if (this.avatarImg && this.avatarImg.complete) {
            // 头像背景圆圈
            ctx.beginPath();
            ctx.arc(0, headY, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 裁剪并绘制头像
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, headY, 12, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(this.avatarImg, -12, headY - 12, 24, 24);
            ctx.restore();
            
            // 头像发光效果
            ctx.shadowBlur = 15;
            ctx.shadowColor = weapon.color;
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, headY, 14, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else {
            // 备用头像
            ctx.fillStyle = '#ffeaa7';
            ctx.beginPath();
            ctx.arc(0, headY, 12, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 围巾
        if (this.state === 'dodge' || this.state === 'jump' || this.state === 'skill_dash') {
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 5;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.moveTo(0, bodyY + 5);
            ctx.quadraticCurveTo(-this.facing * 25, bodyY + 12, -this.facing * 40, bodyY + 30);
            ctx.stroke();
            ctx.globalAlpha = isGhost ? 0.4 : 1;
        }
        
        // 武器绘制
        ctx.translate(0, bodyY + 18);
        this.drawWeapon(ctx, weapon, isAttacking ? animProgress : 0);
    }
    
    drawWeapon(ctx, weapon, animProgress) {
        const swing = Math.sin(animProgress * Math.PI) * 0.9;
        const baseAngle = this.facing > 0 ? 0 : Math.PI;
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = weapon.color;
        
        if (this.currentWeapon === 'DUAL_BLADE') {
            // 左刀 - 更大更华丽
            ctx.save();
            ctx.rotate(baseAngle + swing - 0.4);
            // 刀柄
            ctx.fillStyle = '#333';
            ctx.fillRect(-30, -6, 25, 12);
            // 护手
            ctx.fillStyle = '#666';
            ctx.fillRect(-8, -10, 6, 20);
            // 刀刃 - 更大
            const bladeGrad = ctx.createLinearGradient(0, -8, 0, 8);
            bladeGrad.addColorStop(0, '#e8e8e8');
            bladeGrad.addColorStop(0.3, '#fff');
            bladeGrad.addColorStop(0.7, '#c0c0c0');
            bladeGrad.addColorStop(1, '#808080');
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-2, -8);
            ctx.lineTo(70, 0);
            ctx.lineTo(-2, 8);
            ctx.closePath();
            ctx.fill();
            // 刀光边缘
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            // 刀纹
            ctx.strokeStyle = 'rgba(0,255,136,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(50, 0);
            ctx.stroke();
            ctx.restore();
            
            // 右刀
            ctx.save();
            ctx.rotate(baseAngle - swing + 0.4);
            ctx.fillStyle = '#333';
            ctx.fillRect(-30, -6, 25, 12);
            ctx.fillStyle = '#666';
            ctx.fillRect(-8, -10, 6, 20);
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-2, -8);
            ctx.lineTo(70, 0);
            ctx.lineTo(-2, 8);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.strokeStyle = 'rgba(0,255,136,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(50, 0);
            ctx.stroke();
            ctx.restore();
            
        } else if (this.currentWeapon === 'DUAL_DAGGER') {
            const isBackstab = this.combo > 50;
            const color = isBackstab ? '#ff0044' : weapon.color;
            ctx.shadowColor = color;
            
            // 左匕
            ctx.save();
            ctx.rotate(baseAngle - 0.5);
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(-18, -4, 15, 8);
            // 刀刃
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.moveTo(-3, -5);
            ctx.lineTo(40, 0);
            ctx.lineTo(-3, 5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
            // 血槽
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(5, -1, 25, 2);
            ctx.globalAlpha = 1;
            ctx.restore();
            
            // 右匕
            ctx.save();
            ctx.rotate(baseAngle + 0.5);
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(-18, -4, 15, 8);
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.moveTo(-3, -5);
            ctx.lineTo(40, 0);
            ctx.lineTo(-3, 5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(5, -1, 25, 2);
            ctx.globalAlpha = 1;
            ctx.restore();
            
        } else if (this.currentWeapon === 'DUAL_HOOK') {
            const extend = Math.sin(animProgress * Math.PI) * 30;
            
            // 左钩
            ctx.save();
            ctx.rotate(baseAngle - 0.6);
            ctx.translate(extend, 0);
            // 锁链
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 4;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.arc(-20 + i*7, (i%2===0?-4:4), 4, 0, Math.PI*2);
            }
            ctx.stroke();
            // 钩刃
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(25, 0);
            ctx.lineTo(50, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(65, 0, 18, 2.8, 5.6, true);
            ctx.stroke();
            // 钩尖
            ctx.fillStyle = weapon.color;
            ctx.beginPath();
            ctx.moveTo(78, 8);
            ctx.lineTo(88, 15);
            ctx.lineTo(75, 12);
            ctx.fill();
            ctx.restore();
            
            // 右钩
            ctx.save();
            ctx.rotate(baseAngle + 0.6);
            ctx.translate(extend, 0);
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 4;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.arc(-20 + i*7, (i%2===0?4:-4), 4, 0, Math.PI*2);
            }
            ctx.stroke();
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(25, 0);
            ctx.lineTo(50, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(65, 0, 18, 0.7, 3.5);
            ctx.stroke();
            ctx.fillStyle = weapon.color;
            ctx.beginPath();
            ctx.moveTo(78, -8);
            ctx.lineTo(88, -15);
            ctx.lineTo(75, -12);
            ctx.fill();
            ctx.restore();
        }
        
        ctx.shadowBlur = 0;
    }
}

// ==================== 普通敌人类 ====================
class Enemy {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = 50;
        this.height = 60;
        this.type = type;
        this.isBoss = false;
        
        this.maxHealth = type === 'elite' ? 300 : 120;
        this.health = this.maxHealth;
        this.damage = type === 'elite' ? 20 : 10;
        
        this.vx = 0;
        this.vy = 0;
        this.facing = -1;
        this.moveSpeed = type === 'elite' ? 1.8 : 2.8;
        
        this.state = 'idle';
        this.stateTimer = 0;
        this.hitStun = 0;
        this.launched = false;
        this.animFrame = 0;
        
        this.colors = type === 'elite' ? 
            { body: '#6c5ce7', dark: '#4834d4', accent: '#a29bfe' } :
            { body: '#e74c3c', dark: '#c0392b', accent: '#ff7675' };
    }
    
    update(player, game) {
        this.animFrame++;
        
        if (this.hitStun > 0) {
            this.hitStun--;
            this.vy += 0.65;
            this.x += this.vx;
            this.y += this.vy;
            if (this.y + this.height > game.groundY) {
                this.y = game.groundY - this.height;
                this.vy = -this.vy * 0.5;
                this.launched = false;
            }
            return;
        }
        
        const dist = player.x - this.x;
        const absDist = Math.abs(dist);
        
        if (absDist > 500) {
            this.state = 'idle';
            this.vx *= 0.9;
        } else if (absDist > 60) {
            this.state = 'chase';
            this.facing = dist > 0 ? 1 : -1;
            this.vx = this.facing * this.moveSpeed;
        } else {
            this.state = 'attack';
            this.vx *= 0.5;
            if (this.stateTimer % 45 === 0) {
                player.takeDamage(this.damage);
                game.particles.emit(player.x, player.y, '#ff0000', 6, 4, 12);
            }
        }
        
        this.vy += 0.65;
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.y + this.height > game.groundY) {
            this.y = game.groundY - this.height;
            this.vy = 0;
            this.launched = false;
        }
        
        this.stateTimer++;
    }
    
    takeDamage(damage, knockbackX) {
        this.health -= damage;
        this.hitStun = 12;
        this.vx = knockbackX;
        return this.health <= 0;
    }
    
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + this.height);
        
        const c = this.colors;
        const bob = Math.sin(this.animFrame * 0.15) * 2;
        
        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(0, 5, 25, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // 腿部
        const legOffset = this.state === 'chase' ? Math.sin(this.animFrame * 0.3) * 6 : 0;
        ctx.strokeStyle = c.dark;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        
        ctx.beginPath();
        ctx.moveTo(-10, -20);
        ctx.lineTo(-12 + legOffset, 0);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(10, -20);
        ctx.lineTo(12 - legOffset, 0);
        ctx.stroke();
        
        // 身体
        const bodyY = -45 + bob;
        const grad = ctx.createLinearGradient(-18, bodyY, 18, bodyY + 30);
        grad.addColorStop(0, c.body);
        grad.addColorStop(1, c.dark);
        ctx.fillStyle = grad;
        ctx.fillRect(-18, bodyY, 36, 30);
        
        // 装甲
        ctx.strokeStyle = c.accent;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5;
        ctx.strokeRect(-14, bodyY + 5, 28, 20);
        ctx.globalAlpha = 1;
        
        // 头部
        const headY = -62 + bob;
        ctx.fillStyle = c.accent;
        ctx.beginPath();
        ctx.arc(0, headY, 12, 0, Math.PI * 2);
        ctx.fill();
        
        // 角
        if (this.type === 'elite') {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(-8, headY - 8);
            ctx.lineTo(-14, headY - 22);
            ctx.lineTo(-3, headY - 10);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(8, headY - 8);
            ctx.lineTo(14, headY - 22);
            ctx.lineTo(3, headY - 10);
            ctx.fill();
        }
        
        // 眼睛
        ctx.fillStyle = '#fff';
        const eyeX = this.facing > 0 ? 4 : -4;
        ctx.beginPath();
        ctx.arc(eyeX, headY + 2, 4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = this.type === 'elite' ? '#ffd700' : '#ff0000';
        ctx.beginPath();
        ctx.arc(eyeX + this.facing * 2, headY + 2, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // 血条
        const barY = -82;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(-28, barY, 56, 6);
        const healthPct = Math.max(0, this.health / this.maxHealth);
        const barColor = healthPct > 0.6 ? '#00ff88' : healthPct > 0.3 ? '#ffaa00' : '#ff3333';
        ctx.fillStyle = barColor;
        ctx.fillRect(-28, barY, 56 * healthPct, 6);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(-28, barY, 56, 6);
        
        if (this.hitStun > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('!', 0, bodyY - 12);
        }
        
        ctx.restore();
    }
}

// ==================== Boss类 ====================
class Boss {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = 90;
        this.height = 110;
        this.type = type;
        this.isBoss = true;
        
        this.name = type === 'destroyer' ? '毁灭者·泰坦' : '深渊之王';
        this.maxHealth = type === 'destroyer' ? 2000 : 3500;
        this.health = this.maxHealth;
        this.damage = type === 'destroyer' ? 35 : 50;
        
        this.vx = 0;
        this.vy = 0;
        this.facing = -1;
        
        this.state = 'idle';
        this.stateTimer = 0;
        this.phase = 1;
        this.animFrame = 0;
    }
    
    update(player, game) {
        this.animFrame++;
        
        // 阶段转换
        const healthPct = this.health / this.maxHealth;
        if (healthPct < 0.5 && this.phase === 1) {
            this.phase = 2;
            this.enterPhase2(game);
        }
        
        const dist = Math.abs(player.x - this.x);
        
        switch(this.state) {
            case 'idle':
                if (dist < 500) this.state = 'chase';
                break;
            case 'chase':
                this.facing = player.x > this.x ? 1 : -1;
                if (dist > 100) {
                    this.vx = this.facing * (this.phase === 1 ? 2 : 4);
                } else {
                    this.state = 'attack';
                    this.stateTimer = 0;
                }
                break;
            case 'attack':
                this.vx *= 0.8;
                if (this.stateTimer % 40 === 0) {
                    // 范围攻击
                    if (dist < 120) {
                        player.takeDamage(this.damage);
                        game.screenShake = 10;
                        game.particles.emit(player.x, player.y, '#ff0000', 10, 6, 20);
                    }
                    // 冲击波
                    game.slash.add(this.x, this.y, this.facing > 0 ? 0 : Math.PI, 200, '#ff4444', 15);
                }
                if (this.stateTimer > 60) {
                    this.state = this.phase === 2 && Math.random() > 0.5 ? 'skill' : 'chase';
                    this.stateTimer = 0;
                }
                break;
            case 'skill':
                this.performSkill(player, game);
                break;
        }
        
        this.vy += 0.65;
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.y + this.height > game.groundY) {
            this.y = game.groundY - this.height;
            this.vy = 0;
        }
        
        this.x = Math.max(100, Math.min(game.width - 100, this.x));
        this.stateTimer++;
    }
    
    performSkill(player, game) {
        if (this.stateTimer === 20) {
            if (this.type === 'destroyer') {
                // 震地技能
                game.screenShake = 25;
                game.particles.emit(this.x, this.y, '#ff6600', 40, 12, 60);
                if (Math.abs(player.x - this.x) < 250) {
                    player.vy = -15;
                    player.takeDamage(this.damage * 1.5);
                }
            } else {
                // 暗影冲击
                game.slash.add(this.x, this.y - 50, 0, 400, '#6600ff', 20, 'ult');
                game.slash.add(this.x, this.y - 50, Math.PI/2, 400, '#6600ff', 20, 'ult');
                if (Math.abs(player.x - this.x) < 200) {
                    player.takeDamage(this.damage * 2);
                }
            }
        }
        if (this.stateTimer > 50) {
            this.state = 'chase';
        }
    }
    
    enterPhase2(game) {
        game.showFinisherText(`${this.name} 进入狂暴状态!`);
        game.screenShake = 30;
        game.particles.emit(this.x, this.y - 50, '#ff0000', 50, 15, 80);
    }
    
    takeDamage(damage, knockbackX) {
        this.health -= damage;
        this.vx = knockbackX * 0.3;
        return this.health <= 0;
    }
    
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + this.height);
        
        const bob = Math.sin(this.animFrame * 0.1) * 3;
        const isPhase2 = this.phase === 2;
        
        // 巨大阴影
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(0, 8, 50, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // 腿部
        const legOffset = this.state === 'chase' ? Math.sin(this.animFrame * 0.2) * 8 : 0;
        ctx.strokeStyle = isPhase2 ? '#440044' : '#2a0000';
        ctx.lineWidth = 16;
        ctx.lineCap = 'round';
        
        ctx.beginPath();
        ctx.moveTo(-25, -40);
        ctx.lineTo(-30 + legOffset, 0);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(25, -40);
        ctx.lineTo(30 - legOffset, 0);
        ctx.stroke();
        
        // 身体 - 巨大
        const bodyY = -90 + bob;
        const bodyGrad = ctx.createLinearGradient(-40, bodyY, 40, bodyY + 70);
        bodyGrad.addColorStop(0, isPhase2 ? '#8800ff' : '#660000');
        bodyGrad.addColorStop(0.5, isPhase2 ? '#440088' : '#440000');
        bodyGrad.addColorStop(1, isPhase2 ? '#220044' : '#220000');
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(-40, bodyY, 80, 70);
        
        // 装甲纹路
        ctx.strokeStyle = isPhase2 ? '#ff00ff' : '#ff4444';
        ctx.lineWidth = 4;
        ctx.globalAlpha = 0.7;
        ctx.strokeRect(-32, bodyY + 8, 64, 54);
        ctx.globalAlpha = 1;
        
        // 核心发光
        ctx.fillStyle = isPhase2 ? '#ff00ff' : '#ff0000';
        ctx.shadowBlur = 30;
        ctx.shadowColor = isPhase2 ? '#ff00ff' : '#ff0000';
        ctx.beginPath();
        ctx.arc(0, bodyY + 35, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // 头部
        const headY = -115 + bob;
        ctx.fillStyle = isPhase2 ? '#6600aa' : '#440000';
        ctx.beginPath();
        ctx.arc(0, headY, 20, 0, Math.PI * 2);
        ctx.fill();
        
        // 巨角
        ctx.fillStyle = isPhase2 ? '#aa00ff' : '#ff4444';
        ctx.beginPath();
        ctx.moveTo(-15, headY - 12);
        ctx.lineTo(-35, headY - 50);
        ctx.lineTo(-8, headY - 18);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(15, headY - 12);
        ctx.lineTo(35, headY - 50);
        ctx.lineTo(8, headY - 18);
        ctx.fill();
        
        // 眼睛 - 发光
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = isPhase2 ? '#ff00ff' : '#ff0000';
        const eyeX = this.facing > 0 ? 8 : -8;
        ctx.beginPath();
        ctx.arc(eyeX, headY + 2, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // 武器 - 巨剑/魔杖
        ctx.save();
        ctx.translate(this.facing > 0 ? 50 : -50, bodyY + 30);
        ctx.rotate(this.facing > 0 ? 0.3 : Math.PI - 0.3);
        
        if (this.type === 'destroyer') {
            // 巨剑
            ctx.fillStyle = '#444';
            ctx.fillRect(-8, -60, 16, 60);
            ctx.fillStyle = '#666';
            ctx.fillRect(-15, -10, 30, 8);
            const bladeGrad = ctx.createLinearGradient(0, -60, 0, -180);
            bladeGrad.addColorStop(0, '#888');
            bladeGrad.addColorStop(0.5, '#fff');
            bladeGrad.addColorStop(1, '#aaa');
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-8, -60);
            ctx.lineTo(0, -180);
            ctx.lineTo(8, -60);
            ctx.closePath();
            ctx.fill();
        } else {
            // 魔杖
            ctx.strokeStyle = '#6600ff';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -120);
            ctx.stroke();
            ctx.fillStyle = '#ff00ff';
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#ff00ff';
            ctx.beginPath();
            ctx.arc(0, -120, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        ctx.restore();
        
        ctx.restore();
    }
}

// ==================== 主游戏类 ====================
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = 1280;
        this.height = 720;
        this.groundY = this.height - 100;
        
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        
        this.audio = new AudioSystem();
        this.input = new InputHandler();
        this.particles = new ParticleSystem();
        this.slash = new SlashEffect();
        
        this.player = null;
        this.enemies = [];
        this.boss = null;
        
        this.gameState = 'menu';
        this.currentLevel = 0;
        this.screenShake = 0;
        this.frameCount = 0;
        this.bgOffset = 0;
        
        // 加载头像
        this.avatarImg = new Image();
        this.avatarImg.crossOrigin = 'anonymous';
        this.avatarImg.src = 'cuicui.jpg';
        
        this.setupUI();
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }
    
    setupUI() {
        // 关卡选择
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                this.currentLevel = parseInt(btn.dataset.level);
            });
        });
        
        document.getElementById('startBtn').addEventListener('click', () => {
            this.startGame();
        });
        
        this.setupMobileControls();
    }
    
    setupMobileControls() {
        const addTouch = (id, code) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                this.input.keys[code] = true;
                this.input.keysPressed[code] = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                this.input.keys[code] = false;
                this.input.keysReleased[code] = true;
            });
        };
        
        addTouch('btnLeft', 'ArrowLeft');
        addTouch('btnRight', 'ArrowRight');
        addTouch('btnAttack', 'KeyJ');
        addTouch('btnJump', 'KeyK');
        addTouch('btnDodge', 'KeyL');
        addTouch('btnSkill1', 'Digit1');
        addTouch('btnSkill2', 'Digit2');
        addTouch('btnSkill3', 'Digit3');
        
        // 暂停按钮
        document.getElementById('pauseBtn').addEventListener('click', () => {
            this.togglePause();
        });
    }
    
    togglePause() {
        if (this.gameState === 'playing') {
            this.gameState = 'paused';
        } else if (this.gameState === 'paused') {
            this.gameState = 'playing';
            this.gameLoop();
        }
    }
    
    resize() {
        const container = document.getElementById('gameContainer');
        const aspect = this.width / this.height;
        let w = window.innerWidth;
        let h = window.innerHeight;
        
        if (w / h > aspect) {
            w = h * aspect;
        } else {
            h = w / aspect;
        }
        
        container.style.width = w + 'px';
        container.style.height = h + 'px';
    }
    
    startGame() {
        this.audio.init();
        this.gameState = 'playing';
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('pauseBtn').classList.add('visible');
        
        this.player = new Player(300, this.groundY - 150, this.avatarImg);
        this.enemies = [];
        this.boss = null;
        this.frameCount = 0;
        
        const level = LEVELS[this.currentLevel];
        document.getElementById('levelInfo').textContent = `关卡 ${this.currentLevel + 1} - ${level.name}`;
        
        this.spawnWave();
        this.gameLoop();
    }
    
    spawnWave() {
        const level = LEVELS[this.currentLevel];
        
        // 生成Boss
        if (level.boss && this.enemies.length === 0 && !this.boss) {
            this.boss = new Boss(this.width - 300, this.groundY - 150, level.boss);
            document.getElementById('bossBar').classList.add('active');
            document.getElementById('bossName').textContent = this.boss.name;
            return;
        }
        
        // 生成普通敌人
        const count = level.enemyCount;
        for (let i = 0; i < count; i++) {
            const x = 600 + Math.random() * 500;
            const isElite = Math.random() < level.eliteChance;
            this.enemies.push(new Enemy(x, this.groundY - 100, isElite ? 'elite' : 'normal'));
        }
    }
    
    spawnDamageNumber(x, y, value, isCrit) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = rect.width / this.width;
        
        const el = document.createElement('div');
        el.className = 'damage-number';
        el.textContent = value;
        el.style.left = (x * scaleX) + 'px';
        el.style.top = (y / this.height * rect.height) + 'px';
        
        if (isCrit) {
            el.style.fontSize = '42px';
            el.style.color = '#ff00ff';
            el.textContent = value + '!';
        }
        
        document.getElementById('ui').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    
    showFinisherText(text) {
        const el = document.createElement('div');
        el.className = 'finisher-text';
        el.textContent = text;
        document.getElementById('ui').appendChild(el);
        setTimeout(() => el.remove(), 2500);
    }
    
    updateWeaponUI() {
        const weapons = ['DUAL_BLADE', 'DUAL_DAGGER', 'DUAL_HOOK'];
        weapons.forEach((w, i) => {
            const el = document.getElementById('weapon' + (i + 1));
            if (this.player.currentWeapon === w) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }
    
    updateSkillUI() {
        const skills = ['spin', 'dash', 'grab'];
        skills.forEach((s, i) => {
            const el = document.getElementById('skill' + (i + 1));
            const cd = this.player.skills[s].cd;
            const maxCd = this.player.skills[s].maxCd;
            
            if (cd <= 0) {
                el.classList.add('ready');
                el.innerHTML = ['⚡', '💨', '💪'][i];
            } else {
                el.classList.remove('ready');
                el.innerHTML = `<div class="cooldown">${Math.ceil(cd/60)}</div>`;
            }
        });
    }
    
    update() {
        if (this.gameState !== 'playing') return;
        
        this.frameCount++;
        this.bgOffset += 0.5;
        
        if (this.screenShake > 0) this.screenShake *= 0.92;
        if (this.screenShake < 0.5) this.screenShake = 0;
        
        this.player.update(this.input, this);
        
        // 更新敌人
        for (let i = this.enemies.length - 1; i >= 0; i--) {
            const enemy = this.enemies[i];
            enemy.update(this.player, this);
            
            if (enemy.health <= 0) {
                this.particles.emit(enemy.x, enemy.y, '#ff4444', 20, 7, 35);
                this.enemies.splice(i, 1);
            }
        }
        
        // 更新Boss
        if (this.boss) {
            this.boss.update(this.player, this);
            if (this.boss.health <= 0) {
                this.particles.emit(this.boss.x, this.boss.y, '#ff00ff', 60, 15, 80);
                this.showFinisherText(`${this.boss.name} 被击败!`);
                this.boss = null;
                document.getElementById('bossBar').classList.remove('active');
            }
        }
        
        // 生成新波次
        if (this.enemies.length === 0 && !this.boss && this.frameCount % 180 === 0) {
            this.spawnWave();
        }
        
        this.particles.update();
        this.slash.update();
        this.updateUI();
        this.updateSkillUI();
    }
    
    updateUI() {
        const healthPct = (this.player.health / this.player.maxHealth) * 100;
        document.getElementById('healthFill').style.width = healthPct + '%';
        
        const comboEl = document.getElementById('comboDisplay');
        const comboNum = document.getElementById('comboNumber');
        
        if (this.player.combo > 0) {
            comboEl.style.opacity = '1';
            comboNum.textContent = this.player.combo;
            
            if (this.player.combo >= 100) {
                comboNum.style.color = '#ff00ff';
                comboNum.style.textShadow = '0 0 30px #ff00ff';
                document.querySelector('.finisher-bar').classList.add('finisher-ready');
            } else if (this.player.combo >= 30) {
                comboNum.style.color = '#00ffff';
                comboNum.style.textShadow = '0 0 20px #00ffff';
                document.querySelector('.finisher-bar').classList.remove('finisher-ready');
            } else {
                comboNum.style.color = '#ffdd00';
                comboNum.style.textShadow = '0 0 20px #ff6600';
                document.querySelector('.finisher-bar').classList.remove('finisher-ready');
            }
        } else {
            comboEl.style.opacity = '0';
        }
        
        const finisherPct = Math.min((this.player.combo / 100) * 100, 100);
        document.getElementById('finisherFill').style.width = finisherPct + '%';
        
        // Boss血条
        if (this.boss) {
            const bossPct = (this.boss.health / this.boss.maxHealth) * 100;
            document.getElementById('bossHealthFill').style.width = bossPct + '%';
        }
    }
    
    draw() {
        this.ctx.fillStyle = '#0a0a12';
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        this.ctx.save();
        if (this.screenShake > 0) {
            this.ctx.translate(
                (Math.random() - 0.5) * this.screenShake,
                (Math.random() - 0.5) * this.screenShake
            );
        }
        
        this.drawBackground();
        
        // 地面
        const groundGrad = this.ctx.createLinearGradient(0, this.groundY, 0, this.height);
        groundGrad.addColorStop(0, '#2d2d3d');
        groundGrad.addColorStop(1, '#1a1a2a');
        this.ctx.fillStyle = groundGrad;
        this.ctx.fillRect(0, this.groundY, this.width, this.height - this.groundY);
        
        this.ctx.shadowBlur = 25;
        this.ctx.shadowColor = '#00ff88';
        this.ctx.strokeStyle = '#00ff88';
        this.ctx.lineWidth = 3;
        this.ctx.beginPath();
        this.ctx.moveTo(0, this.groundY);
        this.ctx.lineTo(this.width, this.groundY);
        this.ctx.stroke();
        this.ctx.shadowBlur = 0;
        
        // 绘制敌人
        for (const enemy of this.enemies) {
            enemy.draw(this.ctx);
        }
        
        // 绘制Boss
        if (this.boss) {
            this.boss.draw(this.ctx);
        }
        
        // 绘制玩家
        if (this.player) {
            this.player.draw(this.ctx);
        }
        
        this.slash.draw(this.ctx);
        this.particles.draw(this.ctx);
        
        this.ctx.restore();
    }
    
    drawBackground() {
        const level = LEVELS[this.currentLevel];
        
        // 网格
        this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
        this.ctx.lineWidth = 1;
        const gridSize = 60;
        const offset = this.bgOffset % gridSize;
        
        for (let x = -offset; x < this.width; x += gridSize) {
            this.ctx.beginPath();
            this.ctx.moveTo(x, 0);
            this.ctx.lineTo(x, this.groundY);
            this.ctx.stroke();
        }
        for (let y = 0; y < this.groundY; y += gridSize) {
            this.ctx.beginPath();
            this.ctx.moveTo(0, y);
            this.ctx.lineTo(this.width, y);
            this.ctx.stroke();
        }
        
        // 远景
        this.ctx.fillStyle = 'rgba(0, 30, 40, 0.5)';
        for (let i = 0; i < 8; i++) {
            const x = ((i * 200) - this.bgOffset * 0.3) % (this.width + 300);
            const drawX = x < -150 ? x + this.width + 300 : x;
            const h = 100 + i * 25;
            this.ctx.fillRect(drawX, this.groundY - h, 120, h);
        }
        
        // 月亮
        const moonX = this.width - 150;
        const moonY = 100;
        const moonGrad = this.ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
        moonGrad.addColorStop(0, 'rgba(0, 255, 136, 0.15)');
        moonGrad.addColorStop(0.5, 'rgba(0, 255, 136, 0.05)');
        moonGrad.addColorStop(1, 'transparent');
        this.ctx.fillStyle = moonGrad;
        this.ctx.beginPath();
        this.ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
        this.ctx.fill();
    }
    
    gameLoop() {
        if (this.gameState !== 'playing') return;
        
        this.update();
        this.draw();
        
        requestAnimationFrame(() => this.gameLoop());
    }
}

// 启动
const game = new Game();
</script>
