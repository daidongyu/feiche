<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>翠泣 - 极致连击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: #050508;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16/9;
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.2);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .combo-display {
            position: absolute;
            top: 30px;
            right: 40px;
            text-align: right;
            transition: transform 0.1s;
        }
        
        .combo-number {
            font-size: 96px;
            font-weight: 900;
            color: #ffdd00;
            text-shadow: 
                0 0 10px #ff6600,
                0 0 30px #ff3300,
                0 0 60px #ff0000;
            line-height: 1;
            animation: comboPulse 0.3s ease-out;
            font-style: italic;
        }
        
        .combo-text {
            font-size: 20px;
            color: #ff8844;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: bold;
        }
        
        @keyframes comboPulse {
            0% { transform: scale(1.8) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        .weapon-indicator {
            position: absolute;
            bottom: 120px;
            left: 30px;
            display: flex;
            gap: 15px;
        }
        
        .weapon-icon {
            width: 70px;
            height: 70px;
            border: 3px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(0,0,0,0.7);
            color: #666;
            transition: all 0.2s;
            position: relative;
        }
        
        .weapon-icon.active {
            border-color: currentColor;
            background: rgba(0,0,0,0.9);
            transform: scale(1.15);
            box-shadow: 0 0 30px currentColor;
        }
        
        .weapon-icon::after {
            content: attr(data-key);
            position: absolute;
            bottom: -20px;
            font-size: 12px;
            color: #888;
        }
        
        .health-bar-container {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 350px;
        }
        
        .health-bar {
            height: 24px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666, #ff9999);
            transition: width 0.2s;
            box-shadow: 0 0 15px #ff3333;
            position: relative;
        }
        
        .health-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
        }
        
        .finisher-bar {
            margin-top: 10px;
            height: 16px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .finisher-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #ff66ff, #ff99ff);
            transition: width 0.1s;
            box-shadow: 0 0 10px #ff00ff;
        }
        
        .finisher-ready {
            animation: finisherGlow 0.4s ease-in-out infinite alternate;
        }
        
        @keyframes finisherGlow {
            from { box-shadow: 0 0 10px #ff00ff; }
            to { box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff88ff; }
        }
        
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(10,20,30,0.95) 0%, rgba(0,0,0,0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        
        .menu-title {
            font-size: 120px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 
                0 0 30px #00ff88,
                0 0 60px #00aa66,
                0 0 100px #006633;
            margin-bottom: 20px;
            letter-spacing: 30px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 30px #00ff88, 0 0 60px #00aa66; }
            50% { text-shadow: 0 0 50px #00ff88, 0 0 100px #00aa66, 0 0 150px #006633; }
        }
        
        .menu-subtitle {
            font-size: 28px;
            color: #ff8844;
            margin-bottom: 40px;
            letter-spacing: 12px;
            text-transform: uppercase;
        }
        
        .avatar-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00ff88;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 0 40px rgba(0,255,136,0.4);
            position: relative;
        }
        
        .avatar-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: avatarShine 3s infinite;
        }
        
        @keyframes avatarShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .menu-btn {
            padding: 25px 80px;
            font-size: 32px;
            background: linear-gradient(135deg, #00ff88, #00aa66);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(0,255,136,0.4);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(0,255,136,0.6);
        }
        
        .damage-number {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #ffdd00;
            text-shadow: 0 0 10px #ff6600, 0 0 20px #ff3300;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
            font-style: italic;
        }
        
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        
        .finisher-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 30px #ff00ff,
                0 0 60px #ff00ff,
                0 0 100px #ff00ff;
            pointer-events: none;
            animation: finisherText 2.5s ease-out forwards;
            text-transform: uppercase;
            letter-spacing: 8px;
            white-space: nowrap;
        }
        
        @keyframes finisherText {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }

        #mobileControls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none;
            pointer-events: auto;
            padding: 0 20px;
        }

        .mobile-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            backdrop-filter: blur(10px);
        }

        .mobile-btn:active {
            background: rgba(0,255,136,0.4);
            border-color: #00ff88;
        }

        .weapon-hint {
            position: absolute;
            bottom: 200px;
            left: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
                justify-content: space-between;
            }
            .controls-hint {
                display: none;
            }
            .menu-title {
                font-size: 60px;
                letter-spacing: 15px;
            }
            .combo-number {
                font-size: 60px;
            }
        }
    </style>
</head>

<script>
// ==================== 音频系统 ====================
class AudioSystem {
    constructor() {
        this.ctx = null;
        this.enabled = false;
        this.comboSounds = [];
    }
    
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.enabled = true;
        } catch(e) {
            console.warn('音频初始化失败');
        }
    }
    
    playHitSound(combo) {
        if (!this.enabled || !this.ctx) return;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        const baseFreq = 80 + Math.min(combo * 5, 600);
        osc.frequency.setValueAtTime(baseFreq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.3, this.ctx.currentTime + 0.08);
        
        gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.08);
    }
    
    playHeavyHit() {
        if (!this.enabled || !this.ctx) return;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + 0.25);
        
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.25);
    }
    
    playDodgeSound() {
        if (!this.enabled || !this.ctx) return;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.2);
        
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
    }
    
    playFinisherSound(isBig) {
        if (!this.enabled || !this.ctx) return;
        
        const duration = isBig ? 1.5 : 0.8;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        const startFreq = isBig ? 150 : 200;
        osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(startFreq * 4, this.ctx.currentTime + duration * 0.3);
        osc.frequency.exponentialRampToValueAtTime(startFreq * 0.5, this.ctx.currentTime + duration);
        
        gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.3, this.ctx.currentTime + duration * 0.5);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
    
    playWeaponSwitch() {
        if (!this.enabled || !this.ctx) return;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(600, this.ctx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    }
}

// ==================== 输入处理 ====================
class InputHandler {
    constructor() {
        this.keys = {};
        this.keysPressed = {};
        this.keysReleased = {};
        
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            if (!this.keysPressed[e.code]) {
                this.keysPressed[e.code] = true;
            }
        });
        
        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
            this.keysPressed[e.code] = false;
            this.keysReleased[e.code] = true;
        });
    }
    
    isDown(code) { return !!this.keys[code]; }
    isPressed(code) {
        if (this.keysPressed[code]) {
            this.keysPressed[code] = false;
            return true;
        }
        return false;
    }
}

// ==================== 粒子系统 ====================
class ParticleSystem {
    constructor() {
        this.particles = [];
        this.trails = [];
    }
    
    emit(x, y, color, count, speed, life, type = 'normal') {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.8;
            const vel = speed * (0.5 + Math.random() * 0.8);
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * vel,
                vy: Math.sin(angle) * vel,
                life: life * (0.7 + Math.random() * 0.6),
                maxLife: life,
                color,
                size: 3 + Math.random() * 5,
                type,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.3
            });
        }
    }
    
    emitTrail(x, y, color, width) {
        this.trails.push({
            x, y, color, width,
            life: 20,
            maxLife: 20
        });
    }
    
    update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.4;
            p.vx *= 0.98;
            p.rotation += p.rotationSpeed;
            p.life--;
            
            if (p.life <= 0) this.particles.splice(i, 1);
        }
        
        for (let i = this.trails.length - 1; i >= 0; i--) {
            this.trails[i].life--;
            if (this.trails[i].life <= 0) this.trails.splice(i, 1);
        }
    }
    
    draw(ctx) {
        // 绘制拖尾
        for (const t of this.trails) {
            const alpha = t.life / t.maxLife;
            ctx.globalAlpha = alpha * 0.5;
            ctx.fillStyle = t.color;
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.width * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 绘制粒子
        for (const p of this.particles) {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            
            if (p.type === 'spark') {
                ctx.fillRect(-p.size, -p.size/3, p.size*2, p.size/1.5);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        ctx.globalAlpha = 1;
    }
}

// ==================== 刀光效果 ====================
class SlashEffect {
    constructor() {
        this.slashes = [];
    }
    
    add(x, y, angle, width, color, duration, type = 'normal') {
        const points = [];
        const segments = type === 'ult' ? 20 : 12;
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const wave = Math.sin(t * Math.PI * (type === 'ult' ? 5 : 3)) * width * 0.15;
            points.push({ x: (t - 0.5) * width, y: wave });
        }
        
        this.slashes.push({
            x, y, angle, width, color, type,
            life: duration,
            maxLife: duration,
            points,
            scale: 1
        });
    }
    
    addUltimateSlash(x, y, facing) {
        // 全屏斩击
        for (let i = 0; i < 8; i++) {
            const angle = (Math.PI / 4) * i;
            this.add(x, y, angle, 400, '#ff00ff', 30, 'ult');
        }
    }
    
    update() {
        for (let i = this.slashes.length - 1; i >= 0; i--) {
            const s = this.slashes[i];
            s.life--;
            s.scale = 1 + (1 - s.life / s.maxLife) * 0.5;
            if (s.life <= 0) this.slashes.splice(i, 1);
        }
    }
    
    draw(ctx) {
        for (const s of this.slashes) {
            const alpha = s.life / s.maxLife;
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            ctx.scale(s.scale, s.scale);
            
            const gradient = ctx.createLinearGradient(-s.width/2, 0, s.width/2, 0);
            gradient.addColorStop(0, `rgba(255,255,255,${alpha * 0.1})`);
            gradient.addColorStop(0.5, s.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba'));
            gradient.addColorStop(1, `rgba(255,255,255,${alpha * 0.1})`);
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = s.type === 'ult' ? 8 : 4;
            ctx.lineCap = 'round';
            ctx.shadowBlur = s.type === 'ult' ? 40 : 20;
            ctx.shadowColor = s.color;
            
            ctx.beginPath();
            for (let i = 0; i < s.points.length; i++) {
                const p = s.points[i];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
            
            // 内核白光
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
            ctx.lineWidth = s.type === 'ult' ? 3 : 1.5;
            ctx.shadowBlur = 10;
            ctx.stroke();
            
            ctx.restore();
        }
        ctx.shadowBlur = 0;
    }
}

};

// ==================== 绘制工具 ====================
const DrawUtils = {
    // 绘制带阴影的形状
    drawShadowed(ctx, drawFn, color, glowSize = 10) {
        ctx.save();
        ctx.shadowBlur = glowSize;
        ctx.shadowColor = color;
        drawFn();
        ctx.restore();
    },
    
    // 绘制渐变矩形
    drawGradientRect(ctx, x, y, w, h, color1, color2) {
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0, color1);
        grad.addColorStop(1, color2);
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);
    },
    
    // 绘制武器 - 双刀
    drawDualBlade(ctx, facing, animProgress) {
        const swing = Math.sin(animProgress * Math.PI) * 0.8;
        const baseAngle = facing > 0 ? 0 : Math.PI;
        
        // 左刀
        ctx.save();
        ctx.rotate(baseAngle + swing - 0.3);
        DrawUtils.drawShadowed(ctx, () => {
            // 刀柄
            ctx.fillStyle = '#444';
            ctx.fillRect(-25, -4, 20, 8);
            // 刀刃
            const grad = ctx.createLinearGradient(0, -6, 0, 6);
            grad.addColorStop(0, '#e0e0e0');
            grad.addColorStop(0.5, '#fff');
            grad.addColorStop(1, '#a0a0a0');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(-5, -5);
            ctx.lineTo(45, 0);
            ctx.lineTo(-5, 5);
            ctx.closePath();
            ctx.fill();
            // 刀光
            ctx.strokeStyle = 'rgba(0,255,136,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }, '#00ff88', 15);
        ctx.restore();
        
        // 右刀
        ctx.save();
        ctx.rotate(baseAngle - swing + 0.3);
        DrawUtils.drawShadowed(ctx, () => {
            ctx.fillStyle = '#444';
            ctx.fillRect(-25, -4, 20, 8);
            const grad = ctx.createLinearGradient(0, -6, 0, 6);
            grad.addColorStop(0, '#e0e0e0');
            grad.addColorStop(0.5, '#fff');
            grad.addColorStop(1, '#a0a0a0');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(-5, -5);
            ctx.lineTo(45, 0);
            ctx.lineTo(-5, 5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,136,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }, '#00ff88', 15);
        ctx.restore();
    },
    
    // 绘制武器 - 双匕
    drawDualDagger(ctx, facing, isBackstab) {
        const baseAngle = facing > 0 ? 0.2 : Math.PI - 0.2;
        const color = isBackstab ? '#ff0000' : '#ff4444';
        
        // 左匕
        ctx.save();
        ctx.rotate(baseAngle - 0.4);
        DrawUtils.drawShadowed(ctx, () => {
            // 柄
            ctx.fillStyle = '#333';
            ctx.fillRect(-15, -3, 12, 6);
            // 刃
            ctx.fillStyle = '#ccc';
            ctx.beginPath();
            ctx.moveTo(-3, -4);
            ctx.lineTo(25, 0);
            ctx.lineTo(-3, 4);
            ctx.closePath();
            ctx.fill();
            // 血槽
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(5, 0);
            ctx.lineTo(20, 0);
            ctx.stroke();
        }, color, isBackstab ? 25 : 12);
        ctx.restore();
        
        // 右匕
        ctx.save();
        ctx.rotate(baseAngle + 0.4);
        DrawUtils.drawShadowed(ctx, () => {
            ctx.fillStyle = '#333';
            ctx.fillRect(-15, -3, 12, 6);
            ctx.fillStyle = '#ccc';
            ctx.beginPath();
            ctx.moveTo(-3, -4);
            ctx.lineTo(25, 0);
            ctx.lineTo(-3, 4);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(5, 0);
            ctx.lineTo(20, 0);
            ctx.stroke();
        }, color, isBackstab ? 25 : 12);
        ctx.restore();
    },
    
    // 绘制武器 - 双钩
    drawDualHook(ctx, facing, animProgress) {
        const baseAngle = facing > 0 ? 0 : Math.PI;
        const extend = Math.sin(animProgress * Math.PI) * 20;
        
        // 左钩
        ctx.save();
        ctx.rotate(baseAngle - 0.5);
        ctx.translate(extend, 0);
        DrawUtils.drawShadowed(ctx, () => {
            // 链
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(-10 + i*8, (i%2===0?-3:3));
            }
            ctx.stroke();
            // 钩
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(35, 0, 15, 0.5, -2.5, true);
            ctx.stroke();
            // 钩尖
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(47, -10);
            ctx.lineTo(52, -15);
            ctx.lineTo(45, -8);
            ctx.fill();
        }, '#ffaa00', 18);
        ctx.restore();
        
        // 右钩
        ctx.save();
        ctx.rotate(baseAngle + 0.5);
        ctx.translate(extend, 0);
        DrawUtils.drawShadowed(ctx, () => {
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(-10 + i*8, (i%2===0?3:-3));
            }
            ctx.stroke();
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(35, 0, 15, -0.5, 2.5);
            ctx.stroke();
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(47, 10);
            ctx.lineTo(52, 15);
            ctx.lineTo(45, 8);
            ctx.fill();
        }, '#ffaa00', 18);
        ctx.restore();
    }
};

// ==================== 玩家类 ====================
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 35;
        this.height = 65;
        this.facing = 1;
        
        this.state = 'idle';
        this.stateTimer = 0;
        this.onGround = false;
        
        this.currentWeapon = 'DUAL_BLADE';
        this.attackTimer = 0;
        this.attackCombo = 0;
        this.maxCombo = 6;
        this.canCancel = false;
        
        this.combo = 0;
        this.comboTimer = 0;
        this.comboDecayTime = 200;
        
        this.maxHealth = 100;
        this.health = 100;
        this.moveSpeed = 7;
        this.jumpPower = -16;
        this.dodgeSpeed = 18;
        
        this.dodgeCooldown = 0;
        this.isInvincible = false;
        this.invincibleTimer = 0;
        
        this.animFrame = 0;
        this.airJumps = 0;
        this.maxAirJumps = 2;
        
        // 动画
        this.animations = {
            idle: { frame: 0, speed: 0.1 },
            run: { frame: 0, speed: 0.25 },
            attack: { frame: 0, speed: 0.4 }
        };
    }
    
    update(input, game) {
        this.stateTimer++;
        this.animFrame++;
        if (this.attackTimer > 0) this.attackTimer--;
        if (this.dodgeCooldown > 0) this.dodgeCooldown--;
        if (this.invincibleTimer > 0) {
            this.invincibleTimer--;
            if (this.invincibleTimer <= 0) this.isInvincible = false;
        }
        
        if (this.combo > 0) {
            this.comboTimer++;
            if (this.comboTimer > this.comboDecayTime) {
                this.combo = Math.max(0, this.combo - 1);
                this.comboTimer = 0;
            }
        }
        
        this.vy += 0.7;
        
        switch(this.state) {
            case 'idle':
            case 'run':
                this.handleGroundMovement(input, game);
                break;
            case 'attack':
                this.handleAttack(input, game);
                break;
            case 'jump':
            case 'air_attack':
                this.handleAirState(input, game);
                break;
            case 'dodge':
                this.handleDodge();
                break;
        }
        
        this.x += this.vx;
        this.y += this.vy;
        
        const groundY = game.groundY;
        if (this.y + this.height > groundY) {
            this.y = groundY - this.height;
            this.vy = 0;
            this.onGround = true;
            this.airJumps = 0;
            if (this.state === 'jump' || this.state === 'air_attack') {
                this.state = 'idle';
            }
        } else {
            this.onGround = false;
        }
        
        this.x = Math.max(40, Math.min(game.width - 40, this.x));
        
        if (this.state !== 'dodge' && this.state !== 'attack') {
            this.vx *= 0.88;
        }
    }
    
    handleGroundMovement(input, game) {
        if (input.isDown('KeyA') || input.isDown('ArrowLeft')) {
            this.vx = -this.moveSpeed;
            this.facing = -1;
            this.state = 'run';
        } else if (input.isDown('KeyD') || input.isDown('ArrowRight')) {
            this.vx = this.moveSpeed;
            this.facing = 1;
            this.state = 'run';
        } else {
            this.state = 'idle';
        }
        
        if (input.isPressed('KeyK')) this.jump();
        if (input.isPressed('KeyJ')) this.startAttack(game);
        if ((input.isPressed('KeyL') || input.isPressed('ShiftLeft')) && this.dodgeCooldown <= 0) {
            this.startDodge();
        }
        if (input.isPressed('KeyQ')) this.switchWeapon('DUAL_BLADE', game);
        if (input.isPressed('KeyW')) this.switchWeapon('DUAL_DAGGER', game);
        if (input.isPressed('KeyE')) this.switchWeapon('DUAL_HOOK', game);
        if (input.isPressed('KeyU')) this.tryFinisher(false, game);
        if (input.isPressed('KeyI')) this.tryFinisher(true, game);
    }
    
    handleAttack(input, game) {
        this.vx *= 0.92;
        this.canCancel = this.stateTimer > 4;
        
        if (this.stateTimer === 2) {
            this.performAttackHit(game);
        }
        
        if (this.stateTimer > 6 && this.stateTimer < 18) {
            if (input.isPressed('KeyJ') && this.attackCombo < this.maxCombo) {
                this.attackCombo++;
                this.stateTimer = 0;
                this.canCancel = false;
            }
        }
        
        if ((input.isPressed('KeyL') || input.isPressed('ShiftLeft')) && this.canCancel && this.dodgeCooldown <= 0) {
            this.startDodge();
            return;
        }
        if (input.isPressed('KeyK') && this.canCancel) {
            this.jump();
            return;
        }
        
        if (this.stateTimer > 22) {
            this.state = 'idle';
            this.attackCombo = 0;
        }
    }
    
    handleAirState(input, game) {
        if (input.isDown('KeyA') || input.isDown('ArrowLeft')) {
            this.vx = -this.moveSpeed * 0.85;
            this.facing = -1;
        } else if (input.isDown('KeyD') || input.isDown('ArrowRight')) {
            this.vx = this.moveSpeed * 0.85;
            this.facing = 1;
        }
        
        if (input.isPressed('KeyJ')) this.startAirAttack(game);
        if ((input.isPressed('KeyL') || input.isPressed('ShiftLeft')) && this.dodgeCooldown <= 0) {
            this.startDodge();
        }
    }
    
    handleDodge() {
        this.isInvincible = true;
        this.invincibleTimer = 12;
        this.vx = this.facing * this.dodgeSpeed;
        
        if (this.stateTimer > 10) {
            this.state = this.onGround ? 'idle' : 'jump';
            this.vx *= 0.25;
        }
    }
    
    jump() {
        if (this.onGround) {
            this.vy = this.jumpPower;
            this.state = 'jump';
            this.onGround = false;
        } else if (this.airJumps < this.maxAirJumps) {
            this.vy = this.jumpPower * 0.85;
            this.airJumps++;
            game.particles.emit(this.x, this.y + this.height, '#00ff88', 8, 4, 15);
        }
    }
    
    startAttack(game) {
        this.state = 'attack';
        this.stateTimer = 0;
    }
    
    startAirAttack(game) {
        const weapon = WEAPONS[this.currentWeapon];
        if (!weapon.airCombo) return;
        
        this.state = 'air_attack';
        this.stateTimer = 0;
        this.performAttackHit(game);
        this.vy = Math.max(this.vy, -3);
        
        // 空中悬停效果
        this.vy *= 0.6;
    }
    
    performAttackHit(game) {
        const weapon = WEAPONS[this.currentWeapon];
        const hitX = this.x + this.facing * weapon.range * 0.6;
        const hitY = this.y + this.height * 0.4;
        
        let hitCount = 0;
        let backstabCount = 0;
        
        for (const enemy of game.enemies) {
            const distX = Math.abs(enemy.x - hitX);
            const distY = Math.abs(enemy.y - hitY);
            
            if (distX < weapon.range && distY < 70) {
                let damage = weapon.damage;
                let isBackstab = false;
                
                if (this.currentWeapon === 'DUAL_DAGGER') {
                    const enemyFacingRight = enemy.vx > 0 || enemy.facing > 0;
                    const attackFromBehind = (this.facing === 1 && !enemyFacingRight) || 
                                            (this.facing === -1 && enemyFacingRight);
                    if (attackFromBehind) {
                        damage *= weapon.backstabBonus;
                        isBackstab = true;
                        backstabCount++;
                    }
                }
                
                // 连击加成
                damage *= (1 + this.attackCombo * 0.15);
                
                const killed = enemy.takeDamage(damage, this.facing * weapon.knockback);
                
                if (killed) {
                    this.addCombo(5);
                    game.particles.emit(enemy.x, enemy.y - 30, '#ff0000', 15, 8, 25);
                } else {
                    this.addCombo(1);
                    hitCount++;
                    
                    // 击飞效果
                    if (this.currentWeapon === 'DUAL_BLADE' || enemy.launched) {
                        enemy.vy = -6;
                        enemy.launched = true;
                    }
                    
                    if (weapon.pullEnemy) {
                        enemy.x -= this.facing * 40;
                        enemy.hitStun = 25;
                    }
                }
                
                // 刀光特效
                const slashColor = isBackstab ? '#ff0066' : weapon.color;
                const slashWidth = isBackstab ? 120 : 90;
                game.slash.add(enemy.x, enemy.y - 25, this.facing > 0 ? 0 : Math.PI, slashWidth, slashColor, 10);
                
                // 粒子效果
                game.particles.emit(enemy.x, enemy.y - 30, slashColor, isBackstab ? 12 : 8, 6, 20, 'spark');
                
                game.spawnDamageNumber(enemy.x, enemy.y - 60, Math.floor(damage), isBackstab);
            }
        }
        
        if (hitCount > 0 || backstabCount > 0) {
            game.audio.playHitSound(this.combo);
        }
    }
    
    startDodge() {
        this.state = 'dodge';
        this.stateTimer = 0;
        this.dodgeCooldown = 25;
        this.canCancel = false;
        game.audio.playDodgeSound();
        game.particles.emit(this.x, this.y + 30, '#00ffff', 6, 5, 12);
    }
    
    switchWeapon(type, game) {
        if (this.currentWeapon === type) return;
        this.currentWeapon = type;
        game.audio.playWeaponSwitch();
        game.updateWeaponUI();
        game.particles.emit(this.x, this.y - 20, WEAPONS[type].color, 10, 4, 15);
    }
    
    tryFinisher(isBig, game) {
        const required = isBig ? 100 : 30;
        if (this.combo >= required) {
            this.executeFinisher(isBig, game);
        }
    }
    
    executeFinisher(isBig, game) {
        if (isBig) {
            game.screenShake = 40;
            game.showFinisherText("∞ ULTIMATE FINISHER ∞");
            game.slash.addUltimateSlash(this.x, this.y - 30, this.facing);
            game.particles.emit(this.x, this.y - 40, '#ff00ff', 60, 12, 80);
            
            for (const enemy of game.enemies) {
                const damage = 800;
                enemy.takeDamage(damage, 0);
                enemy.vy = -25;
                enemy.vx = (enemy.x - this.x) * 0.1;
                game.spawnDamageNumber(enemy.x, enemy.y - 60, damage, true);
            }
        } else {
            game.screenShake = 20;
            game.showFinisherText("⚔ COMBO FINISHER ⚔");
            
            const weapon = WEAPONS[this.currentWeapon];
            game.slash.add(this.x, this.y - 30, this.facing > 0 ? 0.3 : Math.PI - 0.3, 250, weapon.color, 20, 'ult');
            game.particles.emit(this.x, this.y - 40, weapon.color, 35, 10, 50);
            
            for (const enemy of game.enemies) {
                const dist = Math.abs(enemy.x - this.x);
                if (dist < 250) {
                    const damage = 150;
                    enemy.takeDamage(damage, this.facing * 15);
                    game.spawnDamageNumber(enemy.x, enemy.y - 60, damage, true);
                }
            }
        }
        
        game.audio.playFinisherSound(isBig);
        this.combo = 0;
    }
    
    addCombo(amount) {
        this.combo += amount;
        this.comboTimer = 0;
    }
    
    takeDamage(damage) {
        if (this.isInvincible) return;
        
        this.health -= damage;
        this.isInvincible = true;
        this.invincibleTimer = 50;
        
        if (this.health <= 0) this.health = 0;
    }
    
    draw(ctx) {
        ctx.save();
        
        if (this.isInvincible && Math.floor(this.animFrame / 3) % 2 === 0) {
            ctx.globalAlpha = 0.4;
        }
        
        ctx.translate(this.x, this.y + this.height);
        
        // 闪避拖尾
        if (this.state === 'dodge') {
            ctx.globalAlpha = 0.3;
            ctx.translate(-this.vx * 3, 0);
            this.drawBody(ctx, true);
            ctx.translate(this.vx * 3, 0);
            ctx.globalAlpha = this.isInvincible ? 0.4 : 1;
        }
        
        this.drawBody(ctx, false);
        
        ctx.restore();
    }
    
    drawBody(ctx, isGhost) {
        const weapon = WEAPONS[this.currentWeapon];
        const isAttacking = this.state === 'attack' || this.state === 'air_attack';
        const animProgress = isAttacking ? this.stateTimer / 22 : 0;
        
        // 身体摆动
        const bobOffset = this.state === 'run' ? Math.sin(this.animFrame * 0.3) * 3 : 
                         this.state === 'idle' ? Math.sin(this.animFrame * 0.1) * 1 : 0;
        
        // 腿部动画
        if (this.state === 'run') {
            const legSwing = Math.sin(this.animFrame * 0.4);
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            
            // 左腿
            ctx.beginPath();
            ctx.moveTo(-8, -15);
            ctx.lineTo(-12 + legSwing * 8, 0);
            ctx.stroke();
            
            // 右腿
            ctx.beginPath();
            ctx.moveTo(8, -15);
            ctx.lineTo(12 - legSwing * 8, 0);
            ctx.stroke();
        } else {
            // 站立腿部
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-8, -15);
            ctx.lineTo(-10, 0);
            ctx.moveTo(8, -15);
            ctx.lineTo(10, 0);
            ctx.stroke();
        }
        
        // 身体
        const bodyY = -35 + bobOffset;
        DrawUtils.drawGradientRect(ctx, -14, bodyY, 28, 30, '#2d3436', '#1a1a2e');
        
        // 装甲细节
        ctx.fillStyle = weapon.color;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(-10, bodyY + 5, 20, 3);
        ctx.globalAlpha = isGhost ? 0.4 : 1;
        
        // 头部
        const headY = -58 + bobOffset;
        ctx.fillStyle = '#ffeaa7';
        ctx.beginPath();
        ctx.arc(0, headY, 11, 0, Math.PI * 2);
        ctx.fill();
        
        // 头发
        ctx.fillStyle = '#2d3436';
        ctx.beginPath();
        ctx.arc(0, headY - 2, 12, Math.PI, 0);
        ctx.fill();
        
        // 眼睛
        ctx.fillStyle = '#000';
        const eyeX = this.facing > 0 ? 4 : -4;
        ctx.beginPath();
        ctx.arc(eyeX, headY + 1, 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        // 围巾/披风
        if (this.state === 'dodge' || this.state === 'jump') {
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 4;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.moveTo(0, bodyY + 5);
            ctx.quadraticCurveTo(-this.facing * 20, bodyY + 10, -this.facing * 30, bodyY + 25);
            ctx.stroke();
            ctx.globalAlpha = isGhost ? 0.4 : 1;
        }
        
        // 武器
        ctx.translate(0, bodyY + 15);
        
        if (this.currentWeapon === 'DUAL_BLADE') {
            DrawUtils.drawDualBlade(ctx, this.facing, isAttacking ? animProgress : 0);
        } else if (this.currentWeapon === 'DUAL_DAGGER') {
            const isBackstab = this.combo > 50;
            DrawUtils.drawDualDagger(ctx, this.facing, isBackstab);
        } else {
            DrawUtils.drawDualHook(ctx, this.facing, isAttacking ? animProgress : 0);
        }
    }
}

// ==================== 敌人类 ====================
class Enemy {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = 45;
        this.height = 55;
        this.type = type;
        
        this.maxHealth = type === 'elite' ? 250 : 100;
        this.health = this.maxHealth;
        this.damage = type === 'elite' ? 25 : 12;
        
        this.vx = 0;
        this.vy = 0;
        
        this.state = 'idle';
        this.stateTimer = 0;
        this.hitStun = 0;
        this.launched = false;
        this.animFrame = 0;
        
        this.facing = -1;
        this.moveSpeed = type === 'elite' ? 1.8 : 2.5;
        
        // 外观
        this.colors = this.generateColors();
    }
    
    generateColors() {
        if (this.type === 'elite') {
            return {
                body: '#6c5ce7',
                dark: '#4834d4',
                accent: '#a29bfe'
            };
        }
        return {
            body: '#e74c3c',
            dark: '#c0392b',
            accent: '#ff7675'
        };
    }
    
    update(player, game) {
        this.animFrame++;
        
        if (this.hitStun > 0) {
            this.hitStun--;
            this.vy += 0.7;
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.y + this.height > game.groundY) {
                this.y = game.groundY - this.height;
                this.vy = -this.vy * 0.5;
                this.launched = false;
            }
            return;
        }
        
        const dist = player.x - this.x;
        const absDist = Math.abs(dist);
        
        if (absDist > 500) {
            this.state = 'idle';
            this.vx *= 0.9;
        } else if (absDist > 55) {
            this.state = 'chase';
            this.facing = dist > 0 ? 1 : -1;
            this.vx = this.facing * this.moveSpeed;
        } else {
            this.state = 'attack';
            this.vx *= 0.5;
            
            if (this.stateTimer % 50 === 0) {
                player.takeDamage(this.damage);
                game.particles.emit(player.x, player.y, '#ff0000', 6, 4, 12);
            }
        }
        
        this.vy += 0.7;
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.y + this.height > game.groundY) {
            this.y = game.groundY - this.height;
            this.vy = 0;
            this.launched = false;
        }
        
        this.stateTimer++;
    }
    
    takeDamage(damage, knockbackX) {
        this.health -= damage;
        this.hitStun = 12;
        this.vx = knockbackX;
        
        if (this.health <= 0) return true;
        return false;
    }
    
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + this.height);
        
        const c = this.colors;
        const bob = Math.sin(this.animFrame * 0.15) * 2;
        
        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(0, 5, 25, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // 腿部
        const legOffset = this.state === 'chase' ? Math.sin(this.animFrame * 0.3) * 6 : 0;
        ctx.strokeStyle = c.dark;
        ctx.lineWidth = 7;
        ctx.lineCap = 'round';
        
        ctx.beginPath();
        ctx.moveTo(-10, -20);
        ctx.lineTo(-12 + legOffset, 0);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(10, -20);
        ctx.lineTo(12 - legOffset, 0);
        ctx.stroke();
        
        // 身体
        const bodyY = -45 + bob;
        DrawUtils.drawGradientRect(ctx, -18, bodyY, 36, 30, c.body, c.dark);
        
        // 装甲纹路
        ctx.strokeStyle = c.accent;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5;
        ctx.strokeRect(-14, bodyY + 5, 28, 20);
        ctx.globalAlpha = 1;
        
        // 头部
        const headY = -65 + bob;
        ctx.fillStyle = c.accent;
        ctx.beginPath();
        ctx.arc(0, headY, 12, 0, Math.PI * 2);
        ctx.fill();
        
        // 角/装饰
        if (this.type === 'elite') {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(-8, headY - 8);
            ctx.lineTo(-12, headY - 20);
            ctx.lineTo(-4, headY - 10);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(8, headY - 8);
            ctx.lineTo(12, headY - 20);
            ctx.lineTo(4, headY - 10);
            ctx.fill();
        }
        
        // 眼睛
        ctx.fillStyle = '#fff';
        const eyeX = this.facing > 0 ? 4 : -4;
        ctx.beginPath();
        ctx.arc(eyeX, headY + 2, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // 瞳孔
        ctx.fillStyle = this.type === 'elite' ? '#ffd700' : '#ff0000';
        ctx.beginPath();
        ctx.arc(eyeX + this.facing * 2, headY + 2, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // 血条背景
        const barY = -85;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(-25, barY, 50, 6);
        
        // 血条
        const healthPct = this.health / this.maxHealth;
        const barColor = healthPct > 0.6 ? '#00ff88' : healthPct > 0.3 ? '#ffaa00' : '#ff3333';
        ctx.fillStyle = barColor;
        ctx.fillRect(-25, barY, 50 * healthPct, 6);
        
        // 血条边框
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(-25, barY, 50, 6);
        
        // 硬直指示
        if (this.hitStun > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('!', 0, bodyY - 10);
        }
        
        ctx.restore();
    }
}

// ==================== 主游戏类 ====================
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = 1280;
        this.height = 720;
        this.groundY = this.height - 100;
        
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        
        this.audio = new AudioSystem();
        this.input = new InputHandler();
        this.particles = new ParticleSystem();
        this.slash = new SlashEffect();
        
        this.player = null;
        this.enemies = [];
        
        this.gameState = 'menu';
        this.screenShake = 0;
        this.frameCount = 0;
        this.bgOffset = 0;
        
        this.setupUI();
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }
    
    setupUI() {
        document.getElementById('startBtn').addEventListener('click', () => {
            this.startGame();
        });
        this.setupMobileControls();
    }
    
    setupMobileControls() {
        const addTouch = (id, code) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                this.input.keys[code] = true;
                this.input.keysPressed[code] = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                this.input.keys[code] = false;
                this.input.keysReleased[code] = true;
            });
        };
        
        addTouch('btnLeft', 'ArrowLeft');
        addTouch('btnRight', 'ArrowRight');
        addTouch('btnAttack', 'KeyJ');
        addTouch('btnJump', 'KeyK');
        addTouch('btnDodge', 'KeyL');
    }
    
    resize() {
        const container = document.getElementById('gameContainer');
        let w = window.innerWidth - 40;
        let h = w * 9 / 16;
        
        if (h > window.innerHeight - 40) {
            h = window.innerHeight - 40;
            w = h * 16 / 9;
        }
        
        container.style.width = w + 'px';
        container.style.height = h + 'px';
    }
    
    startGame() {
        this.audio.init();
        this.gameState = 'playing';
        document.getElementById('menuScreen').style.display = 'none';
        
        this.player = new Player(300, this.groundY - 150);
        this.enemies = [];
        this.spawnWave();
        this.gameLoop();
    }
    
    spawnWave() {
        const count = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
            const x = 700 + Math.random() * 400;
            const type = Math.random() > 0.85 ? 'elite' : 'normal';
            this.enemies.push(new Enemy(x, this.groundY - 100, type));
        }
    }
    
    spawnDamageNumber(x, y, value, isCrit) {
        // 转换为屏幕坐标
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = rect.width / this.width;
        const scaleY = rect.height / this.height;
        
        const el = document.createElement('div');
        el.className = 'damage-number';
        el.textContent = value;
        el.style.left = (x * scaleX) + 'px';
        el.style.top = (y * scaleY) + 'px';
        
        if (isCrit) {
            el.style.fontSize = '42px';
            el.style.color = '#ff00ff';
            el.textContent = value + '!';
        }
        
        document.getElementById('ui').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    
    showFinisherText(text) {
        const el = document.createElement('div');
        el.className = 'finisher-text';
        el.textContent = text;
        document.getElementById('ui').appendChild(el);
        setTimeout(() => el.remove(), 2500);
    }
    
    updateWeaponUI() {
        const weapons = ['DUAL_BLADE', 'DUAL_DAGGER', 'DUAL_HOOK'];
        weapons.forEach((w, i) => {
            const el = document.getElementById('weapon' + (i + 1));
            if (this.player.currentWeapon === w) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }
    
    update() {
        if (this.gameState !== 'playing') return;
        
        this.frameCount++;
        this.bgOffset += 0.5;
        
        if (this.screenShake > 0) this.screenShake *= 0.92;
        if (this.screenShake < 0.5) this.screenShake = 0;
        
        this.player.update(this.input, this);
        
        for (let i = this.enemies.length - 1; i >= 0; i--) {
            const enemy = this.enemies[i];
            enemy.update(this.player, this);
            
            if (enemy.health <= 0) {
                this.particles.emit(enemy.x, enemy.y, '#ff4444', 20, 7, 35);
                this.enemies.splice(i, 1);
            }
        }
        
        if (this.enemies.length === 0 && this.frameCount % 120 === 0) {
            this.spawnWave();
        }
        
        this.particles.update();
        this.slash.update();
        this.updateUI();
    }
    
    updateUI() {
        const healthPct = (this.player.health / this.player.maxHealth) * 100;
        document.getElementById('healthFill').style.width = healthPct + '%';
        
        const comboEl = document.getElementById('comboDisplay');
        const comboNum = document.getElementById('comboNumber');
        
        if (this.player.combo > 0) {
            comboEl.style.opacity = '1';
            comboNum.textContent = this.player.combo;
            
            if (this.player.combo >= 100) {
                comboNum.style.color = '#ff00ff';
                comboNum.style.textShadow = '0 0 30px #ff00ff, 0 0 60px #ff00ff';
                document.querySelector('.finisher-bar').classList.add('finisher-ready');
            } else if (this.player.combo >= 30) {
                comboNum.style.color = '#00ffff';
                comboNum.style.textShadow = '0 0 20px #00ffff';
                document.querySelector('.finisher-bar').classList.remove('finisher-ready');
            } else {
                comboNum.style.color = '#ffdd00';
                comboNum.style.textShadow = '0 0 20px #ff6600';
                document.querySelector('.finisher-bar').classList.remove('finisher-ready');
            }
        } else {
            comboEl.style.opacity = '0';
        }
        
        const finisherPct = Math.min((this.player.combo / 100) * 100, 100);
        document.getElementById('finisherFill').style.width = finisherPct + '%';
    }
    
    draw() {
        this.ctx.fillStyle = '#0a0a12';
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        this.ctx.save();
        if (this.screenShake > 0) {
            this.ctx.translate(
                (Math.random() - 0.5) * this.screenShake,
                (Math.random() - 0.5) * this.screenShake
            );
        }
        
        this.drawBackground();
        
        // 地面
        const groundGrad = this.ctx.createLinearGradient(0, this.groundY, 0, this.height);
        groundGrad.addColorStop(0, '#2d3436');
        groundGrad.addColorStop(1, '#1a1a2e');
        this.ctx.fillStyle = groundGrad;
        this.ctx.fillRect(0, this.groundY, this.width, this.height - this.groundY);
        
        // 地面发光边缘
        this.ctx.shadowBlur = 20;
        this.ctx.shadowColor = '#00ff88';
        this.ctx.strokeStyle = '#00ff88';
        this.ctx.lineWidth = 3;
        this.ctx.beginPath();
        this.ctx.moveTo(0, this.groundY);
        this.ctx.lineTo(this.width, this.groundY);
        this.ctx.stroke();
        this.ctx.shadowBlur = 0;
        
        // 绘制敌人
        for (const enemy of this.enemies) {
            enemy.draw(this.ctx);
        }
        
        // 绘制玩家
        if (this.player) {
            this.player.draw(this.ctx);
        }
        
        // 绘制特效
        this.slash.draw(this.ctx);
        this.particles.draw(this.ctx);
        
        this.ctx.restore();
    }
    
    drawBackground() {
        // 动态网格
        this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.06)';
        this.ctx.lineWidth = 1;
        
        const gridSize = 60;
        const offset = this.bgOffset % gridSize;
        
        for (let x = -offset; x < this.width; x += gridSize) {
            this.ctx.beginPath();
            this.ctx.moveTo(x, 0);
            this.ctx.lineTo(x, this.groundY);
            this.ctx.stroke();
        }
        
        for (let y = 0; y < this.groundY; y += gridSize) {
            this.ctx.beginPath();
            this.ctx.moveTo(0, y);
            this.ctx.lineTo(this.width, y);
            this.ctx.stroke();
        }
        
        // 远景建筑剪影
        this.ctx.fillStyle = 'rgba(0, 30, 40, 0.5)';
        for (let i = 0; i < 8; i++) {
            const x = ((i * 200) - this.bgOffset * 0.3) % (this.width + 300);
            const drawX = x < -150 ? x + this.width + 300 : x;
            const h = 100 + i * 30;
            this.ctx.fillRect(drawX, this.groundY - h, 120, h);
            
            // 建筑窗户
            this.ctx.fillStyle = 'rgba(0, 255, 136, 0.1)';
            for (let wy = 0; wy < h - 30; wy += 40) {
                for (let wx = 10; wx < 100; wx += 30) {
                    if (Math.random() > 0.7) {
                        this.ctx.fillRect(drawX + wx, this.groundY - h + wy + 10, 15, 20);
                    }
                }
            }
            this.ctx.fillStyle = 'rgba(0, 30, 40, 0.5)';
        }
        
        // 月亮/光源
        const moonX = this.width - 150;
        const moonY = 100;
        
        const moonGrad = this.ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
        moonGrad.addColorStop(0, 'rgba(0, 255, 136, 0.2)');
        moonGrad.addColorStop(0.5, 'rgba(0, 255, 136, 0.05)');
        moonGrad.addColorStop(1, 'transparent');
        
        this.ctx.fillStyle = moonGrad;
        this.ctx.beginPath();
        this.ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
        this.ctx.fill();
    }
    
    gameLoop() {
        if (this.gameState !== 'playing') return;
        
        this.update();
        this.draw();
        
        requestAnimationFrame(() => this.gameLoop());
    }
}

// 启动
const game = new Game();
</script>
