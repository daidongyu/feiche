      // ==================== 玩家类 ====================
      class Player {
        constructor(x, y, avatarImg, isMobile) {
          this.x = x
          this.y = y
          this.vx = 0
          this.vy = 0
          // 移动端增大角色
          this.scale = isMobile ? 1.8 : 1.4;  // 更大的大头角色！
          this.width = 45 * this.scale;
          this.height = 78 * this.scale;
          this.facing = 1
          this.avatarImg = avatarImg

          this.state = 'idle'
          this.stateTimer = 0
          this.onGround = false

          this.currentWeapon = 'DUAL_BLADE'
          this.attackCombo = 0

          this.combo = 0
          this.comboTimer = 0

          this.maxHealth = 100
          this.health = 100
          this.moveSpeed = 7
          this.jumpPower = -17

          this.dodgeCooldown = 0
          this.isInvincible = false
          this.invincibleTimer = 0

          this.animFrame = 0
          this.airJumps = 0

          this.skills = {
            spin: { cd: 0, maxCd: 180 },
            dash: { cd: 0, maxCd: 120 },
            grab: { cd: 0, maxCd: 240 },
          }
        }

        update(input, game) {
          this.stateTimer++
          this.animFrame++
          if (this.dodgeCooldown > 0) this.dodgeCooldown--
          if (this.invincibleTimer > 0) {
            this.invincibleTimer--
            if (this.invincibleTimer <= 0) this.isInvincible = false
          }

          for (let key in this.skills) {
            if (this.skills[key].cd > 0) this.skills[key].cd--
          }

          if (this.combo > 0) {
            this.comboTimer++
            if (this.comboTimer > 150) {
              this.combo = Math.max(0, this.combo - 1)
              this.comboTimer = 0
            }
          }

          this.vy += 0.6

          switch (this.state) {
            case 'idle':
            case 'run':
              this.handleGroundMovement(input, game)
              break
            case 'attack':
              this.handleAttack(input, game)
              break
            case 'skill_spin':
              this.handleSpinSkill(game)
              break
            case 'skill_dash':
              this.handleDashSkill(game)
              break
            case 'skill_grab':
              this.handleGrabSkill(game)
              break
            case 'jump':
            case 'air_attack':
              this.handleAirState(input, game)
              break
            case 'dodge':
              this.handleDodge()
              break
          }

          this.x += this.vx
          this.y += this.vy

          const groundY = game.groundY
          if (this.y + this.height > groundY) {
            this.y = groundY - this.height
            this.vy = 0
            this.onGround = true
            this.airJumps = 0
            if (['jump', 'air_attack'].includes(this.state)) {
              this.state = 'idle'
            }
          } else {
            this.onGround = false
          }

          this.x = Math.max(40, Math.min(game.width - 40, this.x))

          if (!['dodge', 'skill_dash'].includes(this.state)) {
            this.vx *= 0.88
          }
        }

        handleGroundMovement(input, game) {
          if (input.isDown('KeyA') || input.isDown('ArrowLeft')) {
            this.vx = -this.moveSpeed
            this.facing = -1
            this.state = 'run'
          } else if (input.isDown('KeyD') || input.isDown('ArrowRight')) {
            this.vx = this.moveSpeed
            this.facing = 1
            this.state = 'run'
          } else {
            this.state = 'idle'
          }

          if (input.isPressed('KeyK')) this.jump()
          if (input.isPressed('KeyJ')) this.startAttack(game)
          if (
            (input.isPressed('KeyL') || input.isPressed('ShiftLeft')) &&
            this.dodgeCooldown <= 0
          ) {
            this.startDodge(game)
          }

          if (input.isPressed('Digit1') && this.skills.spin.cd <= 0)
            this.startSpinSkill(game)
          if (input.isPressed('Digit2') && this.skills.dash.cd <= 0)
            this.startDashSkill(game)
          if (input.isPressed('Digit3') && this.skills.grab.cd <= 0)
            this.startGrabSkill(game)

          if (input.isPressed('KeyQ')) this.switchWeapon('DUAL_BLADE', game)
          if (input.isPressed('KeyW')) this.switchWeapon('DUAL_DAGGER', game)
          if (input.isPressed('KeyE')) this.switchWeapon('DUAL_HOOK', game)

          // 终结技 - 任何状态都可使用（优先检测）
          if (input.isPressed('KeyU') || input.isPressed('Digit4')) {
            if (this.combo >= 30) {
              this.executeFinisher(false, game)
              return
            }
          }
          if (input.isPressed('KeyI') || input.isPressed('Digit5')) {
            if (this.combo >= 100) {
              this.executeFinisher(true, game)
              return
            }
          }
        }

        handleAttack(input, game) {
          this.vx *= 0.92

          if (this.stateTimer === 2) {
            this.performAttackHit(game)
          }

          if (this.stateTimer > 5 && this.stateTimer < 14) {
            if (input.isPressed('KeyJ')) {
              this.attackCombo++
              this.stateTimer = 0
            }
          }

          if (
            (input.isPressed('KeyL') || input.isPressed('ShiftLeft')) &&
            this.dodgeCooldown <= 0
          ) {
            this.startDodge(game)
            return
          }
          if (input.isPressed('KeyK')) {
            this.jump()
            return
          }

          if (this.stateTimer > 16) {
            this.state = 'idle'
            this.attackCombo = 0
          }
        }

        startSpinSkill(game) {
          this.state = 'skill_spin'
          this.stateTimer = 0
          this.skills.spin.cd = this.skills.spin.maxCd
          game.audio.playSkillSound()
        }

        handleSpinSkill(game) {
          this.vx = this.facing * 4

          if (this.stateTimer % 5 === 0) {
            const weapon = WEAPONS[this.currentWeapon]
            for (const enemy of game.enemies) {
              const dist = Math.abs(enemy.x - this.x)
              if (dist < 100) {
                enemy.takeDamage(weapon.damage * 0.7, this.facing * 3)
                game.particles.emit(
                  enemy.x,
                  enemy.y - 30,
                  weapon.color,
                  5,
                  4,
                  12,
                )
                this.addCombo(1)
              }
            }
            game.slash.add(
              this.x,
              this.y - 30,
              this.stateTimer * 0.5,
              150,
              '#00ffff',
              6,
            )
          }

          if (this.stateTimer > 35) this.state = 'idle'
        }

        startDashSkill(game) {
          this.state = 'skill_dash'
          this.stateTimer = 0
          this.skills.dash.cd = this.skills.dash.maxCd
          this.isInvincible = true
          this.invincibleTimer = 15
          game.audio.playSkillSound()
        }

        handleDashSkill(game) {
          this.vx = this.facing * 28

          if (this.stateTimer === 5) {
            const weapon = WEAPONS[this.currentWeapon]
            for (const enemy of game.enemies) {
              const dist = Math.abs(enemy.x - this.x)
              if (dist < 90) {
                enemy.takeDamage(weapon.damage * 2.5, this.facing * 15)
                game.slash.add(
                  enemy.x,
                  enemy.y - 30,
                  this.facing > 0 ? 0 : Math.PI,
                  100,
                  '#ff00ff',
                  10,
                )
                game.spawnDamageNumber(
                  enemy.x,
                  enemy.y - 60,
                  Math.floor(weapon.damage * 2.5),
                  true,
                )
                this.addCombo(2)
              }
            }
            game.particles.emit(this.x, this.y - 30, '#ff00ff', 10, 6, 15)
          }

          if (this.stateTimer > 12) {
            this.state = 'idle'
            this.vx *= 0.3
          }
        }

        startGrabSkill(game) {
          this.state = 'skill_grab';
          this.stateTimer = 0;
          this.skills.grab.cd = this.skills.grab.maxCd;
          game.audio.playSkillSound();
          // 抓取起手特效
          game.particles.emit(this.x + this.facing * 60, this.y - 40, '#ff6600', 25, 5, 25);
        }

        handleGrabSkill(game) {
          if (this.stateTimer === 6) {
            // 抓取向前的特效
            for (let i = 0; i < 8; i++) {
              const dist = i * 15;
              setTimeout(() => {
                game.particles.emit(
                  this.x + this.facing * (40 + dist), 
                  this.y - 40 + Math.sin(i) * 10, 
                  '#ff6600', 3, 2, 10
                );
              }, i * 30);
            }
          }
          
          if (this.stateTimer === 10) {
            for (const enemy of game.enemies) {
              const dist = Math.abs(enemy.x - this.x);
              if (dist < 100 && !enemy.isBoss) {
                const damage = 400;
                enemy.takeDamage(damage, 0);
                enemy.vy = -30;
                enemy.vx = this.facing * 15;
                game.screenShake = 35;
                // 爆炸特效
                game.particles.emit(enemy.x, enemy.y - 30, '#ff6600', 50, 15, 60);
                game.particles.emit(enemy.x, enemy.y - 30, '#ffff00', 30, 12, 40);
                game.particles.emit(enemy.x, enemy.y - 30, '#ffffff', 20, 10, 30);
                // 冲击波
                game.shockwaves.add(enemy.x, enemy.y, '#ff6600', 180);
                game.shockwaves.add(enemy.x, enemy.y - 30, '#ffff00', 120);
                game.spawnDamageNumber(enemy.x, enemy.y - 60, damage, true);
                this.addCombo(8);
                break;
              }
            }
          }

          if (this.stateTimer > 28) this.state = 'idle';
        }

        handleAirState(input, game) {
          if (input.isDown('KeyA') || input.isDown('ArrowLeft')) {
            this.vx = -this.moveSpeed * 0.85
            this.facing = -1
          } else if (input.isDown('KeyD') || input.isDown('ArrowRight')) {
            this.vx = this.moveSpeed * 0.85
            this.facing = 1
          }

          if (input.isPressed('KeyJ')) this.startAirAttack(game)
          if (
            (input.isPressed('KeyL') || input.isPressed('ShiftLeft')) &&
            this.dodgeCooldown <= 0
          ) {
            this.startDodge(game)
          }
        }

        handleDodge() {
          this.isInvincible = true
          this.invincibleTimer = 10
          this.vx = this.facing * 20

          if (this.stateTimer > 8) {
            this.state = this.onGround ? 'idle' : 'jump'
            this.vx *= 0.25
          }
        }

        jump() {
          if (this.onGround) {
            this.vy = this.jumpPower
            this.state = 'jump'
            this.onGround = false
          } else if (this.airJumps < 2) {
            this.vy = this.jumpPower * 0.85
            this.airJumps++
          }
        }

        startAttack(game) {
          this.state = 'attack'
          this.stateTimer = 0
        }

        startAirAttack(game) {
          const weapon = WEAPONS[this.currentWeapon]
          this.state = 'air_attack'
          this.stateTimer = 0
          this.performAttackHit(game)
          this.vy = Math.max(this.vy, -3)
          this.vy *= 0.6
        }

        performAttackHit(game) {
          const weapon = WEAPONS[this.currentWeapon]
          const hitX = this.x + this.facing * weapon.range * 0.5
          
          // 攻击冲击波效果
          if (this.stateTimer === 2) {
            game.shockwaves.add(
              this.x + this.facing * 50,
              this.y + this.height * 0.5,
              weapon.color,
              weapon.range * 0.8
            )
          }

          for (const enemy of game.enemies) {
            const distX = Math.abs(enemy.x - hitX)
            const distY = Math.abs(enemy.y - (this.y + this.height * 0.4))

            if (distX < weapon.range && distY < 60) {
              let damage = weapon.damage
              let isBackstab = false

              if (this.currentWeapon === 'DUAL_DAGGER') {
                const enemyFacingRight = enemy.vx > 0 || enemy.facing > 0
                const attackFromBehind =
                  (this.facing === 1 && !enemyFacingRight) ||
                  (this.facing === -1 && enemyFacingRight)
                if (attackFromBehind) {
                  damage *= weapon.backstabBonus
                  isBackstab = true
                }
              }

              damage *= 1 + this.attackCombo * 0.12
              const killed = enemy.takeDamage(
                damage,
                this.facing * weapon.knockback,
              )

              if (killed) {
                this.addCombo(5)
                game.onEnemyKilled()
              } else {
                this.addCombo(1)
              }

              const slashColor = isBackstab ? '#ff0066' : weapon.color
              game.slash.add(
                enemy.x,
                enemy.y - 25,
                this.facing > 0 ? 0 : Math.PI,
                isBackstab ? 120 : 90,
                slashColor,
                8,
              )
              game.particles.emit(
                enemy.x,
                enemy.y - 30,
                slashColor,
                isBackstab ? 10 : 6,
                5,
                15,
              )
              game.spawnDamageNumber(
                enemy.x,
                enemy.y - 60,
                Math.floor(damage),
                isBackstab,
              )
            }
          }

          game.audio.playHitSound(this.combo)
        }

        startDodge(game) {
          this.state = 'dodge'
          this.stateTimer = 0
          this.dodgeCooldown = 18
          game.particles.emit(this.x, this.y + 30, '#00ffff', 5, 4, 10)
        }

        switchWeapon(type, game) {
          if (this.currentWeapon === type) return
          this.currentWeapon = type
          game.particles.emit(
            this.x,
            this.y - 20,
            WEAPONS[type].color,
            8,
            3,
            12,
          )
        }

        tryFinisher(isBig, game) {
          const required = isBig ? 100 : 30
          if (this.combo >= required) {
            this.executeFinisher(isBig, game)
          }
        }

        executeFinisher(isBig, game) {
          if (isBig) {
            game.screenShake = 80;
            game.showFinisherText('∞ ULTIMATE ∞');
            // 超级炸裂特效
            game.slash.addUltimateSlash(this.x, this.y - 30);
            // 多层粒子爆发
            for (let i = 0; i < 5; i++) {
              setTimeout(() => {
                game.particles.emit(this.x, this.y - 40, '#ff00ff', 40 + i * 10, 15 + i * 3, 60);
                game.particles.emit(this.x, this.y - 40, '#ff0088', 30 + i * 8, 12 + i * 2, 50);
                game.particles.emit(this.x, this.y - 40, '#ffffff', 20 + i * 5, 10 + i * 2, 40);
                game.shockwaves.add(this.x, this.y - 40, '#ff00ff', 100 + i * 80);
              }, i * 100);
            }
            // 全屏伤害
            for (const enemy of game.enemies) {
              enemy.takeDamage(3000, 0);
              enemy.vy = -40;
              game.onEnemyKilled();
            }
          } else {
            game.screenShake = 40;
            game.showFinisherText('⚔ FINISHER ⚔');
            const weapon = WEAPONS[this.currentWeapon];
            // 超级斩击
            game.slash.add(this.x, this.y - 35, this.facing > 0 ? 0.3 : Math.PI - 0.3, 350, weapon.color, 25, 'ult');
            game.slash.add(this.x, this.y - 25, this.facing > 0 ? 0.2 : Math.PI - 0.2, 320, '#ffffff', 20, 'ult');
            // 爆发粒子
            game.particles.emit(this.x + this.facing * 100, this.y - 40, weapon.color, 60, 15, 60);
            game.particles.emit(this.x + this.facing * 100, this.y - 40, '#ffffff', 40, 12, 40);
            game.shockwaves.add(this.x + this.facing * 100, this.y + 10, weapon.color, 250);

            for (const enemy of game.enemies) {
              const dist = Math.abs(enemy.x - this.x);
              if (dist < 350) {
                enemy.takeDamage(400, this.facing * 25);
                game.particles.emit(enemy.x, enemy.y - 30, weapon.color, 15, 8, 25);
                game.spawnDamageNumber(enemy.x, enemy.y - 60, 400, true);
              }
            }
          }

          game.audio.playFinisherSound(isBig);
          this.combo = 0;
        }

        addCombo(amount) {
          this.combo += amount
          this.comboTimer = 0
        }

        takeDamage(damage) {
          if (this.isInvincible) return
          this.health -= damage
          this.isInvincible = true
          this.invincibleTimer = 45
          if (this.health <= 0) this.health = 0
        }

        draw(ctx) {
          ctx.save()

          if (this.isInvincible && Math.floor(this.animFrame / 3) % 2 === 0) {
            ctx.globalAlpha = 0.4
          }

          ctx.translate(this.x, this.y + this.height)
          ctx.scale(this.scale, this.scale)

          if (this.state === 'skill_dash') {
            ctx.globalAlpha = 0.4
            ctx.fillStyle = '#ff00ff'
            ctx.fillRect(-80, -60, 80, 60)
            ctx.globalAlpha = this.isInvincible ? 0.4 : 1
          }

          if (this.state === 'dodge') {
            ctx.globalAlpha = 0.3
            ctx.translate((-this.vx * 1.5) / this.scale, 0)
            this.drawBody(ctx)
            ctx.translate((this.vx * 1.5) / this.scale, 0)
            ctx.globalAlpha = this.isInvincible ? 0.4 : 1
          }

          this.drawBody(ctx)
          ctx.restore()
        }

        drawBody(ctx) {
          const weapon = WEAPONS[this.currentWeapon]
          const isAttacking = ['attack', 'air_attack'].includes(this.state)

          const bobOffset =
            this.state === 'run'
              ? Math.sin(this.animFrame * 0.3) * 3
              : this.state === 'idle'
                ? Math.sin(this.animFrame * 0.1) * 1
                : 0

          // 腿部
          if (this.state === 'run' || this.state === 'skill_spin') {
            const legSwing =
              Math.sin(this.animFrame * 0.5) *
              (this.state === 'skill_spin' ? 1.5 : 1)
            ctx.strokeStyle = '#1a1a2e'
            ctx.lineWidth = 10
            ctx.lineCap = 'round'

            ctx.beginPath()
            ctx.moveTo(-10, -15)
            ctx.lineTo(-14 + legSwing * 10, 0)
            ctx.stroke()

            ctx.beginPath()
            ctx.moveTo(10, -15)
            ctx.lineTo(14 - legSwing * 10, 0)
            ctx.stroke()
          } else {
            ctx.strokeStyle = '#1a1a2e'
            ctx.lineWidth = 10
            ctx.beginPath()
            ctx.moveTo(-10, -15)
            ctx.lineTo(-12, 0)
            ctx.moveTo(10, -15)
            ctx.lineTo(12, 0)
            ctx.stroke()
          }

          // 身体
          const bodyY = -40 + bobOffset
          const grad = ctx.createLinearGradient(-16, bodyY, 16, bodyY + 38)
          grad.addColorStop(0, '#3d3d3d')
          grad.addColorStop(1, '#1a1a1a')
          ctx.fillStyle = grad
          ctx.fillRect(-16, bodyY, 32, 38)

          ctx.strokeStyle = weapon.color
          ctx.lineWidth = 2
          ctx.globalAlpha = 0.5
          ctx.strokeRect(-12, bodyY + 6, 24, 26)
          ctx.globalAlpha = 1

          // ===== 大头儿子风格头像 =====
          const headY = -75 + bobOffset  // 更高的头部位置
          const hasAvatar =
            this.avatarImg &&
            this.avatarImg.complete &&
            this.avatarImg.naturalWidth > 0

          // 头部光晕
          ctx.shadowBlur = 35
          ctx.shadowColor = weapon.color

          if (hasAvatar) {
            // 大圆圈背景
            ctx.beginPath()
            ctx.arc(0, headY, 24, 0, Math.PI * 2)  // 更大的头！
            ctx.fillStyle = '#000'
            ctx.fill()
            ctx.strokeStyle = weapon.color
            ctx.lineWidth = 4
            ctx.stroke()

            // 裁剪绘制头像 - 大头！
            ctx.save()
            ctx.beginPath()
            ctx.arc(0, headY, 21, 0, Math.PI * 2)
            ctx.clip()
            try {
              ctx.drawImage(this.avatarImg, -21, headY - 21, 42, 42)
            } catch (e) {
              ctx.fillStyle = weapon.color
              ctx.fillRect(-21, headY - 21, 42, 42)
            }
            ctx.restore()

            // 外发光
            ctx.strokeStyle = weapon.color
            ctx.lineWidth = 3
            ctx.beginPath()
            ctx.arc(0, headY, 24, 0, Math.PI * 2)
            ctx.stroke()
          } else {
            // 备用大头头像
            ctx.fillStyle = '#2d3436'
            ctx.beginPath()
            ctx.arc(0, headY, 22, 0, Math.PI * 2)
            ctx.fill()

            ctx.fillStyle = '#1a1a2e'
            ctx.beginPath()
            ctx.arc(0, headY - 3, 24, Math.PI, 0)
            ctx.fill()

            ctx.fillStyle = '#f5d0b0'
            ctx.beginPath()
            ctx.arc(0, headY + 4, 18, 0, Math.PI * 2)
            ctx.fill()

            ctx.fillStyle = '#000'
            const eyeDir = this.facing > 0 ? 6 : -6
            ctx.beginPath()
            ctx.arc(eyeDir, headY + 4, 4, 0, Math.PI * 2)
            ctx.fill()

            ctx.strokeStyle = '#c0392b'
            ctx.lineWidth = 3
            ctx.beginPath()
            ctx.arc(0, headY + 9, 9, 0.2, Math.PI - 0.2)
            ctx.stroke()

            ctx.strokeStyle = weapon.color
            ctx.lineWidth = 3
            ctx.beginPath()
            ctx.arc(0, headY, 22, 0, Math.PI * 2)
            ctx.stroke()
          }
          
          ctx.shadowBlur = 0

          // 围巾
          if (['dodge', 'jump', 'skill_dash'].includes(this.state)) {
            ctx.strokeStyle = weapon.color
            ctx.lineWidth = 5
            ctx.globalAlpha = 0.6
            ctx.beginPath()
            ctx.moveTo(0, bodyY + 6)
            ctx.quadraticCurveTo(
              -this.facing * 22,
              bodyY + 14,
              -this.facing * 35,
              bodyY + 32,
            )
            ctx.stroke()
            ctx.globalAlpha = 1
          }

          // 武器攻击光晕
          if (isAttacking) {
            ctx.globalAlpha = 0.4 + Math.sin(this.stateTimer * 0.8) * 0.2;
            const pulseSize = 60 + this.stateTimer * 3;
            const grad = ctx.createRadialGradient(
              this.facing * 40, -15, 0,
              this.facing * 40, -15, pulseSize
            );
            grad.addColorStop(0, weapon.color);
            grad.addColorStop(0.5, weapon.color.replace(')', ', 0.5)').replace('rgb', 'rgba'));
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(this.facing * 40, -15, pulseSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
          
          // 武器
          ctx.translate(0, bodyY + 22)
          this.drawWeapon(ctx, weapon, isAttacking)
        }

        drawWeapon(ctx, weapon, isAttacking) {
          const swing = isAttacking ? Math.sin(this.stateTimer * 0.4) * 0.8 : 0
          const baseAngle = this.facing > 0 ? 0 : Math.PI

          ctx.shadowBlur = 20
          ctx.shadowColor = weapon.color

          if (this.currentWeapon === 'DUAL_BLADE') {
            // 双刀光晕
            ctx.shadowBlur = 30;
            ctx.shadowColor = weapon.color;
            
            // 左刀 - 更帅更大
            ctx.save();
            ctx.rotate(baseAngle + swing - 0.4);
            // 柄
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(-32, -7, 28, 14);
            // 护手
            ctx.fillStyle = '#444';
            ctx.fillRect(-12, -12, 10, 24);
            // 刀刃 - 更大更亮
            const bladeGrad = ctx.createLinearGradient(0, -9, 0, 9);
            bladeGrad.addColorStop(0, '#a0d0ff');
            bladeGrad.addColorStop(0.3, '#ffffff');
            bladeGrad.addColorStop(0.7, '#e0e0e0');
            bladeGrad.addColorStop(1, '#808080');
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-8, -8);
            ctx.lineTo(75, 0);
            ctx.lineTo(-8, 8);
            ctx.closePath();
            ctx.fill();
            // 刀光
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 4;
            ctx.stroke();
            // 能量纹路
            ctx.strokeStyle = 'rgba(0,255,200,0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(5, -3);
            ctx.lineTo(60, 0);
            ctx.lineTo(5, 3);
            ctx.stroke();
            // 尖端闪光
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(72, 0, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            // 右刀
            ctx.save();
            ctx.rotate(baseAngle - swing + 0.4);
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(-32, -7, 28, 14);
            ctx.fillStyle = '#444';
            ctx.fillRect(-12, -12, 10, 24);
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-8, -8);
            ctx.lineTo(75, 0);
            ctx.lineTo(-8, 8);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.strokeStyle = 'rgba(0,255,200,0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(5, -3);
            ctx.lineTo(60, 0);
            ctx.lineTo(5, 3);
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(72, 0, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            ctx.shadowBlur = 0;
          } else if (this.currentWeapon === 'DUAL_DAGGER') {
            const color = this.combo > 30 ? '#ff0044' : weapon.color;
            ctx.shadowBlur = 25;
            ctx.shadowColor = color;

            // 左匕 - 毒刃风格
            ctx.save();
            ctx.rotate(baseAngle - 0.5);
            // 柄
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(-18, -5, 16, 10);
            // 护手 - 蝙蝠翼
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(-6, -10);
            ctx.lineTo(0, 0);
            ctx.lineTo(-6, 10);
            ctx.fill();
            // 刀刃
            const daggerGrad = ctx.createLinearGradient(0, -6, 0, 6);
            daggerGrad.addColorStop(0, '#e0a0a0');
            daggerGrad.addColorStop(0.5, '#fff');
            daggerGrad.addColorStop(1, '#c0c0c0');
            ctx.fillStyle = daggerGrad;
            ctx.beginPath();
            ctx.moveTo(-4, -6);
            ctx.lineTo(48, 0);
            ctx.lineTo(-4, 6);
            ctx.closePath();
            ctx.fill();
            // 毒液光效
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            // 血槽
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.9;
            ctx.fillRect(8, -2, 32, 4);
            ctx.globalAlpha = 1;
            // 滴毒效果
            if (this.combo > 30) {
              ctx.fillStyle = '#ff0044';
              ctx.beginPath();
              ctx.arc(45, 5 + Math.sin(this.animFrame * 0.2) * 3, 3, 0, Math.PI*2);
              ctx.fill();
            }
            ctx.restore();

            // 右匕
            ctx.save();
            ctx.rotate(baseAngle + 0.5);
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(-18, -5, 16, 10);
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(-6, -10);
            ctx.lineTo(0, 0);
            ctx.lineTo(-6, 10);
            ctx.fill();
            ctx.fillStyle = daggerGrad;
            ctx.beginPath();
            ctx.moveTo(-4, -6);
            ctx.lineTo(48, 0);
            ctx.lineTo(-4, 6);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.9;
            ctx.fillRect(8, -2, 32, 4);
            ctx.globalAlpha = 1;
            if (this.combo > 30) {
              ctx.fillStyle = '#ff0044';
              ctx.beginPath();
              ctx.arc(45, 5 + Math.sin(this.animFrame * 0.2 + 1) * 3, 3, 0, Math.PI*2);
              ctx.fill();
            }
            ctx.restore();
            
            ctx.shadowBlur = 0;
          } else if (this.currentWeapon === 'DUAL_HOOK') {
            const extend = isAttacking
              ? Math.sin(this.stateTimer * 0.4) * 40
              : 0;
            
            ctx.shadowBlur = 30;
            ctx.shadowColor = weapon.color;

            // 左钩 - 霸气月牙钩
            ctx.save();
            ctx.rotate(baseAngle - 0.6);
            ctx.translate(extend, 0);
            // 锁链 - 更粗更亮
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 5;
            ctx.beginPath();
            for (let i = 0; i < 7; i++) {
              const cx = -25 + i * 10;
              const cy = (i % 2 === 0 ? -6 : 6);
              ctx.arc(cx, cy, 6, 0, Math.PI*2);
            }
            ctx.stroke();
            // 连接处
            ctx.fillStyle = weapon.color;
            ctx.beginPath();
            ctx.arc(45, 0, 8, 0, Math.PI*2);
            ctx.fill();
            // 钩身
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(65, 0);
            ctx.stroke();
            // 巨大的月牙钩
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.arc(85, 0, 28, 2.3, 5.9, true);
            ctx.stroke();
            // 内刃
            ctx.strokeStyle = '#ffdd00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(85, 0, 24, 2.5, 5.7, true);
            ctx.stroke();
            // 钩尖 - 极锋利
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(110, 12);
            ctx.lineTo(125, 22);
            ctx.lineTo(112, 8);
            ctx.fill();
            ctx.restore();

            // 右钩
            ctx.save();
            ctx.rotate(baseAngle + 0.6);
            ctx.translate(extend, 0);
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 5;
            ctx.beginPath();
            for (let i = 0; i < 7; i++) {
              const cx = -25 + i * 10;
              const cy = (i % 2 === 0 ? 6 : -6);
              ctx.arc(cx, cy, 6, 0, Math.PI*2);
            }
            ctx.stroke();
            ctx.fillStyle = weapon.color;
            ctx.beginPath();
            ctx.arc(45, 0, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = weapon.color;
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(65, 0);
            ctx.stroke();
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.arc(85, 0, 28, -2.3, -5.9);
            ctx.stroke();
            ctx.strokeStyle = '#ffdd00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(85, 0, 24, -2.5, -5.7);
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(110, -12);
            ctx.lineTo(125, -22);
            ctx.lineTo(112, -8);
            ctx.fill();
            ctx.restore();
            
            ctx.shadowBlur = 0;
          }
        }
      }

      // ==================== 敌人类 ====================
      class Enemy {
        constructor(x, y, type, level) {
          this.x = x
          this.y = y
          this.type = type
          this.level = level
          // 根据关卡增大敌人
          const scale = 1 + level * 0.15
          this.width = 50 * scale
          this.height = 60 * scale

          this.maxHealth = (type === 'elite' ? 350 : 140) * (1 + level * 0.3)
          this.health = this.maxHealth
          this.damage = (type === 'elite' ? 22 : 12) * (1 + level * 0.2)

          this.vx = 0
          this.vy = 0
          this.facing = -1
          this.moveSpeed = (type === 'elite' ? 1.8 : 2.8) * (1 + level * 0.1)

          this.state = 'idle'
          this.stateTimer = 0
          this.hitStun = 0
          this.animFrame = 0

          this.colors = this.generateColors(level)
        }

        generateColors(level) {
          if (this.type === 'elite') {
            return { body: '#6c5ce7', dark: '#4834d4', accent: '#a29bfe' }
          }
          const colors = [
            { body: '#e74c3c', dark: '#c0392b', accent: '#ff7675' },
            { body: '#e67e22', dark: '#d35400', accent: '#f39c12' },
            { body: '#8e44ad', dark: '#6c3483', accent: '#bb8fce' },
          ]
          return colors[level % 3]
        }

        update(player, game) {
          this.animFrame++

          if (this.hitStun > 0) {
            this.hitStun--
            this.vy += 0.6
            this.x += this.vx
            this.y += this.vy
            if (this.y + this.height > game.groundY) {
              this.y = game.groundY - this.height
              this.vy = -this.vy * 0.5
            }
            return
          }

          const dist = player.x - this.x
          const absDist = Math.abs(dist)

          if (absDist > 500) {
            this.state = 'idle'
            this.vx *= 0.9
          } else if (absDist > 60) {
            this.state = 'chase'
            this.facing = dist > 0 ? 1 : -1
            this.vx = this.facing * this.moveSpeed
          } else {
            this.state = 'attack'
            this.vx *= 0.5
            if (this.stateTimer % 40 === 0) {
              player.takeDamage(this.damage)
              game.particles.emit(player.x, player.y, '#ff0000', 5, 4, 10)
            }
          }

          this.vy += 0.6
          this.x += this.vx
          this.y += this.vy

          if (this.y + this.height > game.groundY) {
            this.y = game.groundY - this.height
            this.vy = 0
          }

          this.stateTimer++
        }

        takeDamage(damage, knockbackX) {
          this.health -= damage
          this.hitStun = 12
          this.vx = knockbackX
          return this.health <= 0
        }

        draw(ctx) {
          ctx.save()
          ctx.translate(this.x, this.y + this.height)

          const c = this.colors
          const bob = Math.sin(this.animFrame * 0.15) * 2
          const scale = this.width / 50

          ctx.fillStyle = 'rgba(0,0,0,0.3)'
          ctx.beginPath()
          ctx.ellipse(0, 5, 25 * scale, 8 * scale, 0, 0, Math.PI * 2)
          ctx.fill()

          const legOffset =
            this.state === 'chase' ? Math.sin(this.animFrame * 0.3) * 6 : 0
          ctx.strokeStyle = c.dark
          ctx.lineWidth = 8 * scale
          ctx.lineCap = 'round'

          ctx.beginPath()
          ctx.moveTo(-10 * scale, -20)
          ctx.lineTo((-12 + legOffset) * scale, 0)
          ctx.stroke()

          ctx.beginPath()
          ctx.moveTo(10 * scale, -20)
          ctx.lineTo((12 - legOffset) * scale, 0)
          ctx.stroke()

          const bodyY = (-45 + bob) * scale
          const grad = ctx.createLinearGradient(
            -18 * scale,
            bodyY,
            18 * scale,
            bodyY + 30 * scale,
          )
          grad.addColorStop(0, c.body)
          grad.addColorStop(1, c.dark)
          ctx.fillStyle = grad
          ctx.fillRect(-18 * scale, bodyY, 36 * scale, 30 * scale)

          ctx.strokeStyle = c.accent
          ctx.lineWidth = 2
          ctx.strokeRect(-14 * scale, bodyY + 5 * scale, 28 * scale, 20 * scale)

          const headY = (-62 + bob) * scale
          ctx.fillStyle = c.accent
          ctx.beginPath()
          ctx.arc(0, headY, 12 * scale, 0, Math.PI * 2)
          ctx.fill()

          if (this.type === 'elite') {
            ctx.fillStyle = '#ffd700'
            ctx.beginPath()
            ctx.moveTo(-8 * scale, headY - 8 * scale)
            ctx.lineTo(-14 * scale, headY - 22 * scale)
            ctx.lineTo(-3 * scale, headY - 10 * scale)
            ctx.fill()
            ctx.beginPath()
            ctx.moveTo(8 * scale, headY - 8 * scale)
            ctx.lineTo(14 * scale, headY - 22 * scale)
            ctx.lineTo(3 * scale, headY - 10 * scale)
            ctx.fill()
          }

          ctx.fillStyle = '#fff'
          const eyeX = this.facing > 0 ? 4 * scale : -4 * scale
          ctx.beginPath()
          ctx.arc(eyeX, headY + 2 * scale, 4 * scale, 0, Math.PI * 2)
          ctx.fill()

          ctx.fillStyle = this.type === 'elite' ? '#ffd700' : '#ff0000'
          ctx.beginPath()
          ctx.arc(
            eyeX + this.facing * 2 * scale,
            headY + 2 * scale,
            2 * scale,
            0,
            Math.PI * 2,
          )
          ctx.fill()

          // 血条
          const barY = -82 * scale
          ctx.fillStyle = 'rgba(0,0,0,0.6)'
          ctx.fillRect(-28 * scale, barY, 56 * scale, 6 * scale)
          const healthPct = Math.max(0, this.health / this.maxHealth)
          const barColor =
            healthPct > 0.6
              ? '#00ff88'
              : healthPct > 0.3
                ? '#ffaa00'
                : '#ff3333'
          ctx.fillStyle = barColor
          ctx.fillRect(-28 * scale, barY, 56 * scale * healthPct, 6 * scale)

          ctx.restore()
        }
      }

      // ==================== Boss类 ====================
      class Boss {
        constructor(x, y, type, level) {
          this.x = x
          this.y = y
          this.type = type
          this.level = level
          this.isBoss = true

          this.name = type === 'destroyer' ? '毁灭者·泰坦' : '深渊之王'
          this.maxHealth =
            (type === 'destroyer' ? 2500 : 4000) * (1 + level * 0.5)
          this.health = this.maxHealth
          this.damage = (type === 'destroyer' ? 35 : 55) * (1 + level * 0.3)

          this.vx = 0
          this.vy = 0
          this.facing = -1

          this.state = 'idle'
          this.stateTimer = 0
          this.phase = 1
          this.animFrame = 0

          this.width = 100
          this.height = 130
        }

        update(player, game) {
          this.animFrame++

          const healthPct = this.health / this.maxHealth
          if (healthPct < 0.5 && this.phase === 1) {
            this.phase = 2
            this.enterPhase2(game)
          }

          const dist = Math.abs(player.x - this.x)

          switch (this.state) {
            case 'idle':
              if (dist < 600) this.state = 'chase'
              break
            case 'chase':
              this.facing = player.x > this.x ? 1 : -1
              if (dist > 120) {
                this.vx = this.facing * (this.phase === 1 ? 2.2 : 4.5)
              } else {
                this.state = 'attack'
                this.stateTimer = 0
              }
              break
            case 'attack':
              this.vx *= 0.8
              if (this.stateTimer % 35 === 0) {
                if (dist < 140) {
                  player.takeDamage(this.damage)
                  game.screenShake = 12
                  game.particles.emit(player.x, player.y, '#ff0000', 8, 5, 15)
                }
                game.slash.add(
                  this.x + this.facing * 80,
                  this.y - 50,
                  this.facing > 0 ? 0 : Math.PI,
                  180,
                  '#ff4444',
                  12,
                )
              }
              if (this.stateTimer > 50) {
                this.state =
                  this.phase === 2 && Math.random() > 0.4 ? 'skill' : 'chase'
                this.stateTimer = 0
              }
              break
            case 'skill':
              this.performSkill(player, game)
              break
          }

          this.vy += 0.6
          this.x += this.vx
          this.y += this.vy

          if (this.y + this.height > game.groundY) {
            this.y = game.groundY - this.height
            this.vy = 0
          }

          this.x = Math.max(80, Math.min(game.width - 80, this.x))
          this.stateTimer++
        }

        performSkill(player, game) {
          if (this.stateTimer === 20) {
            if (this.type === 'destroyer') {
              game.screenShake = 30
              game.particles.emit(this.x, this.y, '#ff6600', 50, 15, 70)
              if (Math.abs(player.x - this.x) < 280) {
                player.vy = -18
                player.takeDamage(this.damage * 1.5)
              }
            } else {
              game.slash.add(this.x, this.y - 60, 0, 450, '#6600ff', 25)
              game.slash.add(
                this.x,
                this.y - 60,
                Math.PI / 2,
                450,
                '#6600ff',
                25,
              )
              if (Math.abs(player.x - this.x) < 220) {
                player.takeDamage(this.damage * 2)
              }
            }
          }
          if (this.stateTimer > 45) {
            this.state = 'chase'
          }
        }

        enterPhase2(game) {
          game.showFinisherText(`${this.name} 狂暴!`)
          game.screenShake = 35
          game.particles.emit(this.x, this.y - 50, '#ff0000', 60, 18, 90)
        }

        takeDamage(damage, knockbackX) {
          this.health -= damage
          this.vx = knockbackX * 0.3
          return this.health <= 0
        }

        draw(ctx) {
          ctx.save()
          ctx.translate(this.x, this.y + this.height)

          const bob = Math.sin(this.animFrame * 0.1) * 4
          const isPhase2 = this.phase === 2

          ctx.fillStyle = 'rgba(0,0,0,0.4)'
          ctx.beginPath()
          ctx.ellipse(0, 8, 55, 16, 0, 0, Math.PI * 2)
          ctx.fill()

          const legOffset =
            this.state === 'chase' ? Math.sin(this.animFrame * 0.2) * 10 : 0
          ctx.strokeStyle = isPhase2 ? '#440044' : '#2a0000'
          ctx.lineWidth = 18
          ctx.lineCap = 'round'

          ctx.beginPath()
          ctx.moveTo(-28, -45)
          ctx.lineTo(-35 + legOffset, 0)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(28, -45)
          ctx.lineTo(35 - legOffset, 0)
          ctx.stroke()

          const bodyY = -100 + bob
          const bodyGrad = ctx.createLinearGradient(-45, bodyY, 45, bodyY + 80)
          bodyGrad.addColorStop(0, isPhase2 ? '#8800ff' : '#660000')
          bodyGrad.addColorStop(0.5, isPhase2 ? '#440088' : '#440000')
          bodyGrad.addColorStop(1, isPhase2 ? '#220044' : '#220000')
          ctx.fillStyle = bodyGrad
          ctx.fillRect(-45, bodyY, 90, 80)

          ctx.strokeStyle = isPhase2 ? '#ff00ff' : '#ff4444'
          ctx.lineWidth = 4
          ctx.strokeRect(-38, bodyY + 10, 76, 60)

          ctx.fillStyle = isPhase2 ? '#ff00ff' : '#ff0000'
          ctx.shadowBlur = 35
          ctx.shadowColor = isPhase2 ? '#ff00ff' : '#ff0000'
          ctx.beginPath()
          ctx.arc(0, bodyY + 40, 14, 0, Math.PI * 2)
          ctx.fill()
          ctx.shadowBlur = 0

          const headY = -130 + bob
          ctx.fillStyle = isPhase2 ? '#6600aa' : '#440000'
          ctx.beginPath()
          ctx.arc(0, headY, 22, 0, Math.PI * 2)
          ctx.fill()

          ctx.fillStyle = isPhase2 ? '#aa00ff' : '#ff4444'
          ctx.beginPath()
          ctx.moveTo(-18, headY - 15)
          ctx.lineTo(-40, headY - 60)
          ctx.lineTo(-10, headY - 22)
          ctx.fill()
          ctx.beginPath()
          ctx.moveTo(18, headY - 15)
          ctx.lineTo(40, headY - 60)
          ctx.lineTo(10, headY - 22)
          ctx.fill()

          ctx.fillStyle = '#fff'
          ctx.shadowBlur = 25
          ctx.shadowColor = isPhase2 ? '#ff00ff' : '#ff0000'
          const eyeX = this.facing > 0 ? 10 : -10
          ctx.beginPath()
          ctx.arc(eyeX, headY + 3, 7, 0, Math.PI * 2)
          ctx.fill()
          ctx.shadowBlur = 0

          ctx.restore()
        }
      }

      // ==================== 主游戏类 ====================
      class Game {
        constructor() {
          this.canvas = document.getElementById('gameCanvas')
          this.ctx = this.canvas.getContext('2d')
          this.width = 1280
          this.height = 720
          this.groundY = this.height - 100

          this.canvas.width = this.width
          this.canvas.height = this.height

          this.audio = new AudioSystem()
          this.input = new InputHandler()
          this.particles = new ParticleSystem()
          this.slash = new SlashEffect()
          this.shockwaves = new ShockWave()

          this.player = null
          this.enemies = []
          this.boss = null

          this.gameState = 'start'
          this.currentLevel = 0
          this.kills = 0
          this.screenShake = 0
          this.frameCount = 0
          this.bgOffset = 0

          this.isMobile =
            /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
              navigator.userAgent,
            ) ||
            (window.matchMedia &&
              window.matchMedia('(pointer: coarse)').matches)

          this.avatarImg = null

          this.setupUI()
          this.loadAvatar()
        }

        loadAvatar() {
          const img = new Image()
          img.onload = () => {
            this.avatarImg = img
          }
          img.onerror = () => {
            this.avatarImg = null
          }
          img.src = './cuicui.jpg'
        }

        setupUI() {
          // 开始按钮
          document.getElementById('startBtn').addEventListener('click', () => {
            this.startGame()
          })

          // 移动端按钮
          const addTouch = (id, code) => {
            const btn = document.getElementById(id)
            if (!btn) return

            const onStart = (e) => {
              e.preventDefault()
              e.stopPropagation()
              this.input.keys[code] = true
              this.input.keysPressed[code] = true
              btn.style.transform = 'scale(0.92)'
            }

            const onEnd = (e) => {
              e.preventDefault()
              e.stopPropagation()
              this.input.keys[code] = false
              btn.style.transform = 'scale(1)'
            }

            btn.addEventListener('touchstart', onStart, { passive: false })
            btn.addEventListener('touchend', onEnd, { passive: false })
            btn.addEventListener('touchcancel', onEnd, { passive: false })
            btn.addEventListener('mousedown', (e) => {
              e.preventDefault()
            })
          }

          addTouch('btnLeft', 'ArrowLeft')
          addTouch('btnRight', 'ArrowRight')
          addTouch('btnAttack', 'KeyJ')
          addTouch('btnJump', 'KeyK')
          addTouch('btnDodge', 'KeyL')
          addTouch('btnSkill1', 'Digit1')
          addTouch('btnSkill2', 'Digit2')
          addTouch('btnSkill3', 'Digit3')
          addTouch('btnFinisherSmall', 'Digit4')
          addTouch('btnFinisherBig', 'Digit5')

          // 武器切换按钮
          document
            .getElementById('weapon1')
            .addEventListener('click', () =>
              this.player?.switchWeapon('DUAL_BLADE', this),
            )
          document
            .getElementById('weapon2')
            .addEventListener('click', () =>
              this.player?.switchWeapon('DUAL_DAGGER', this),
            )
          document
            .getElementById('weapon3')
            .addEventListener('click', () =>
              this.player?.switchWeapon('DUAL_HOOK', this),
            )
        }

        startGame() {
          this.audio.init()
          this.gameState = 'playing'
          document.getElementById('startScreen').style.display = 'none'

          this.currentLevel = 0
          this.kills = 0
          this.startLevel()
          this.gameLoop()
        }

        startLevel() {
          const level = LEVELS[this.currentLevel]

          this.player = new Player(
            300,
            this.groundY - 150,
            this.avatarImg,
            this.isMobile,
          )
          this.enemies = []
          this.boss = null
          this.frameCount = 0
          this.kills = 0
          this.waveSpawned = false

          document.getElementById('levelBadge').textContent =
            `关卡 ${this.currentLevel + 1} - ${level.name}`
          document.getElementById('targetCount').textContent = level.targetKills
          document.getElementById('killCount').textContent = '0'
          document.getElementById('bossBar').classList.remove('active')

          this.spawnWave(true)
        }

        spawnWave(force = false) {
          const level = LEVELS[this.currentLevel]

          // 检查是否达到击杀目标
          if (this.kills >= level.targetKills && !this.boss && this.enemies.length === 0) {
            if (level.boss) {
              this.boss = new Boss(
                this.width - 350,
                this.groundY - 200,
                level.boss,
                this.currentLevel,
              )
              document.getElementById('bossBar').classList.add('active')
              document.getElementById('bossName').textContent = this.boss.name
              this.showFinisherText(`BOSS出现: ${this.boss.name}`)
            } else {
              this.nextLevel()
            }
            return
          }

          // 强制生成或检查是否可以生成
          if (!force && (this.enemies.length > 0 || this.boss)) return

          const count = level.enemyCount
          for (let i = 0; i < count; i++) {
            const x = 550 + Math.random() * 500
            const isElite = Math.random() < level.eliteChance
            this.enemies.push(
              new Enemy(
                x,
                this.groundY - 100,
                isElite ? 'elite' : 'normal',
                this.currentLevel,
              ),
            )
          }
          this.waveSpawned = true
        }

        nextLevel() {
          if (this.currentLevel < LEVELS.length - 1) {
            this.currentLevel++
            const transition = document.getElementById('levelTransition')
            const title = document.getElementById('transitionTitle')
            const desc = document.getElementById('transitionDesc')

            title.textContent = `关卡 ${this.currentLevel} 完成!`
            desc.textContent = `即将进入: ${LEVELS[this.currentLevel].name}`
            transition.classList.add('active')

            setTimeout(() => {
              transition.classList.remove('active')
              this.startLevel()
            }, 2000)
          } else {
            this.showFinisherText('恭喜通关!')
            setTimeout(() => location.reload(), 3000)
          }
        }

        onEnemyKilled() {
          this.kills++
          document.getElementById('killCount').textContent = this.kills

          const level = LEVELS[this.currentLevel]
          const progress = Math.min((this.kills / level.targetKills) * 100, 100)
          document.getElementById('progressFill').style.width = progress + '%'
          document.getElementById('progressText').textContent =
            `${this.kills}/${level.targetKills}`
        }

        spawnDamageNumber(x, y, value, isCrit) {
          const rect = this.canvas.getBoundingClientRect()
          const scaleX = rect.width / this.width
          const scaleY = rect.height / this.height

          const el = document.createElement('div')
          el.className = 'damage-number'
          el.textContent = isCrit ? value + '!' : value
          el.style.left = x * scaleX + 'px'
          el.style.top = y * scaleY + 'px'

          if (isCrit) {
            el.style.fontSize = '28px'
            el.style.color = '#ff00ff'
          }

          document.getElementById('ui').appendChild(el)
          setTimeout(() => el.remove(), 800)
        }

        showFinisherText(text) {
          const el = document.createElement('div')
          el.className = 'finisher-text'
          el.textContent = text
          document.getElementById('ui').appendChild(el)
          setTimeout(() => el.remove(), 2000)
        }

        update() {
          if (this.gameState !== 'playing') return

          this.frameCount++
          this.bgOffset += 0.5

          if (this.screenShake > 0) this.screenShake *= 0.92
          if (this.screenShake < 0.5) this.screenShake = 0

          this.player.update(this.input, this)

          for (let i = this.enemies.length - 1; i >= 0; i--) {
            const enemy = this.enemies[i]
            enemy.update(this.player, this)

            if (enemy.health <= 0) {
              this.particles.emit(enemy.x, enemy.y, '#ff4444', 18, 6, 30)
              this.enemies.splice(i, 1)
            }
          }

          if (this.boss) {
            this.boss.update(this.player, this)
            if (this.boss.health <= 0) {
              this.particles.emit(
                this.boss.x,
                this.boss.y,
                '#ff00ff',
                50,
                15,
                70,
              )
              this.showFinisherText(`${this.boss.name} 被击败!`)
              this.boss = null
              document.getElementById('bossBar').classList.remove('active')
              this.nextLevel()
            }
          }

          if (
            this.enemies.length === 0 &&
            !this.boss &&
            this.frameCount % 120 === 0
          ) {
            this.spawnWave()
          }

          this.particles.update()
          this.slash.update()
          this.updateUI()
        }

        updateUI() {
          const healthPct = (this.player.health / this.player.maxHealth) * 100
          document.getElementById('healthFill').style.width = healthPct + '%'

          const comboEl = document.getElementById('comboDisplay')
          const comboNum = document.getElementById('comboNumber')

          if (this.player.combo > 0) {
            comboEl.style.opacity = '1'
            comboNum.textContent = this.player.combo
            comboNum.style.color =
              this.player.combo >= 100
                ? '#ff00ff'
                : this.player.combo >= 30
                  ? '#00ffff'
                  : '#ffdd00'
          } else {
            comboEl.style.opacity = '0'
          }

          // 技能冷却UI
          const skills = ['spin', 'dash', 'grab']
          skills.forEach((s, i) => {
            const btn = document.getElementById('btnSkill' + (i + 1))
            const cd = this.player.skills[s].cd
            if (cd > 0) {
              btn.classList.remove('ready')
              btn.innerHTML = `<span class="cd-text">${Math.ceil(cd / 60)}</span>`
            } else {
              btn.classList.add('ready')
              btn.innerHTML = ['⚡', '💨', '💪'][i]
            }
          })

          // 武器激活状态
          const weapons = ['DUAL_BLADE', 'DUAL_DAGGER', 'DUAL_HOOK']
          weapons.forEach((w, i) => {
            const btn = document.getElementById('weapon' + (i + 1))
            if (this.player.currentWeapon === w) {
              btn.classList.add('active')
            } else {
              btn.classList.remove('active')
            }
          })

          // Boss血条
          if (this.boss) {
            const bossPct = (this.boss.health / this.boss.maxHealth) * 100
            document.getElementById('bossHealthFill').style.width =
              bossPct + '%'
          }
          
          // 终结技按钮状态
          const btnSmall = document.getElementById('btnFinisherSmall')
          const btnBig = document.getElementById('btnFinisherBig')
          if (btnSmall && btnBig) {
            if (this.player.combo >= 30) {
              btnSmall.classList.add('ready')
              btnSmall.textContent = 'U'
            } else {
              btnSmall.classList.remove('ready')
              btnSmall.textContent = 'U'
            }
            if (this.player.combo >= 100) {
              btnBig.classList.add('ready')
              btnBig.textContent = 'I'
            } else {
              btnBig.classList.remove('ready')
              btnBig.textContent = 'I'
            }
          }
        }

        draw() {
          const level = LEVELS[this.currentLevel]

          // 背景
          this.ctx.fillStyle = level.colors.bg
          this.ctx.fillRect(0, 0, this.width, this.height)

          this.ctx.save()
          if (this.screenShake > 0) {
            this.ctx.translate(
              (Math.random() - 0.5) * this.screenShake,
              (Math.random() - 0.5) * this.screenShake,
            )
          }

          // 网格
          this.ctx.strokeStyle = `rgba(${this.hexToRgb(level.colors.accent)}, 0.06)`
          this.ctx.lineWidth = 1
          const gridSize = 60
          const offset = this.bgOffset % gridSize

          for (let x = -offset; x < this.width; x += gridSize) {
            this.ctx.beginPath()
            this.ctx.moveTo(x, 0)
            this.ctx.lineTo(x, this.groundY)
            this.ctx.stroke()
          }
          for (let y = 0; y < this.groundY; y += gridSize) {
            this.ctx.beginPath()
            this.ctx.moveTo(0, y)
            this.ctx.lineTo(this.width, y)
            this.ctx.stroke()
          }

          // 远景
          this.ctx.fillStyle = `rgba(${this.hexToRgb(level.colors.accent)}, 0.1)`
          for (let i = 0; i < 8; i++) {
            const x = (i * 200 - this.bgOffset * 0.3) % (this.width + 300)
            const drawX = x < -150 ? x + this.width + 300 : x
            const h = 100 + i * 25
            this.ctx.fillRect(drawX, this.groundY - h, 120, h)
          }

          // 地面
          const groundGrad = this.ctx.createLinearGradient(
            0,
            this.groundY,
            0,
            this.height,
          )
          groundGrad.addColorStop(0, level.colors.ground)
          groundGrad.addColorStop(1, '#1a1a2a')
          this.ctx.fillStyle = groundGrad
          this.ctx.fillRect(
            0,
            this.groundY,
            this.width,
            this.height - this.groundY,
          )

          this.ctx.shadowBlur = 25
          this.ctx.shadowColor = level.colors.accent
          this.ctx.strokeStyle = level.colors.accent
          this.ctx.lineWidth = 3
          this.ctx.beginPath()
          this.ctx.moveTo(0, this.groundY)
          this.ctx.lineTo(this.width, this.groundY)
          this.ctx.stroke()
          this.ctx.shadowBlur = 0

          // 敌人
          for (const enemy of this.enemies) {
            enemy.draw(this.ctx)
          }

          // Boss
          if (this.boss) {
            this.boss.draw(this.ctx)
          }

          // 玩家
          if (this.player) {
            this.player.draw(this.ctx)
          }

          this.slash.draw(this.ctx)
          this.particles.draw(this.ctx)

          this.ctx.restore()
        }

        hexToRgb(hex) {
          const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
          return result
            ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}`
            : '0, 255, 136'
        }

        gameLoop() {
          if (this.gameState !== 'playing') return

          this.update()
          this.draw()

          requestAnimationFrame(() => this.gameLoop())
        }
      }

      // 启动
      const game = new Game()
    </script>
  </body>
